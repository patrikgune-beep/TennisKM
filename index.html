<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Klubbmästerskap – Dalarö Tennisklubb</title>
<style>
  :root{
    --cream:#f4f1e6;
    --paper:#fbf9f1;
    --red:#b5362b;
    --red-dark:#8f2a21;
    --head:#b5362b;
    --sky:#84b6d6;
    --green:#3f6b39;
    --ink:#26211c;
    --line:#d8d1bd;
    --gold:#c9a227;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",Arial,Helvetica,sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.4;
  }
  header.app{
    background:var(--paper);
    border-bottom:4px solid var(--red);
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;
    position:sticky;top:0;z-index:30;
  }
  header.app .logo{width:64px;height:64px;flex:0 0 auto}
  header.app h1{
    margin:0;font-size:22px;letter-spacing:.5px;
    font-family:"Arial Narrow",Arial,sans-serif;text-transform:uppercase;
    color:var(--head);
  }
  header.app .sub{margin:0;font-size:12px;color:#6b6356;text-transform:uppercase;letter-spacing:2px}
  header.app .spacer{flex:1}
  .tabs{display:flex;gap:4px;flex-wrap:wrap}
  .tabs button{
    border:none;background:transparent;padding:10px 16px;cursor:pointer;
    font-size:14px;font-weight:600;color:#6b6356;border-radius:8px 8px 0 0;
  }
  .tabs button.active{background:var(--red);color:#fff}
  .tabs button:hover:not(.active){background:#eee5cf}
  main{max-width:1280px;margin:0 auto;padding:20px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  button.btn{
    background:var(--red);color:#fff;border:none;border-radius:7px;
    padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;
  }
  button.btn:hover{background:var(--red-dark)}
  button.btn.ghost{background:#fff;color:var(--red);border:1.5px solid var(--red)}
  button.btn.ghost:hover{background:#f7ece2}
  button.btn.mini{padding:4px 9px;font-size:12px}
  button.btn.gray{background:#776f60}
  button.btn.gray:hover{background:#5f584c}
  select,input,textarea{font-family:inherit;font-size:13px}
  select,input[type=text]{padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff}
  textarea{width:100%;min-height:160px;padding:10px;border:1px solid var(--line);border-radius:8px;resize:vertical;background:#fff}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .card h2{margin:0 0 10px;font-size:17px;color:var(--head)}
  .grid-classes{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .classcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;transition:.15s}
  .classcard:hover{border-color:var(--red);box-shadow:0 3px 10px rgba(0,0,0,.07)}
  .classcard.active{border-color:var(--red);box-shadow:0 0 0 2px var(--red) inset}
  .classcard .ttl{font-weight:700;font-size:14px}
  .classcard .meta{font-size:12px;color:#6b6356;margin-top:4px}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .badge.youth{background:#e7f0f6;color:#2c6285}
  .badge.adult{background:#f6e9e0;color:var(--red)}
  .badge.done{background:#e3f1de;color:var(--green)}
  /* Bracket – absolut balanserat träd */
  .bracketwrap{overflow-x:auto;padding:6px 4px 20px}
  .bracket{position:relative}
  .bracket .rhead{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#6b6356;text-align:center;font-weight:700}
  .match{
    background:#fff;border:1px solid var(--line);border-radius:9px;
    position:absolute;z-index:1;box-sizing:border-box;
  }
  .match.champbox{border:none;background:transparent}
  .match .slot.swapsel{background:#fff3bf;outline:2px solid #f0a500;border-radius:5px}
  .match.moveable{cursor:pointer}
  .match.moveable:hover{outline:2px dashed #2f80c9}
  .match.movesel{outline:3px solid #2f80c9;background:#eaf4fc}
  .match.numtarget{cursor:pointer}
  .match.numtarget:hover{outline:2px dashed #8e44ad}
  .match.numsel{outline:3px solid #8e44ad;background:#f6eefc}
  /* Färdigspelade matcher (vinnare registrerad) tonas ned så ospelade matcher framträder. */
  .match.played{opacity:.5}
  .match.played:hover{opacity:1}
  .mtile.played{opacity:.55}
  .mtile.played:hover{opacity:1}
  .mno{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:#6b6356;border-radius:4px;padding:0 5px;margin-right:5px;letter-spacing:.5px}
  .match .slot{display:flex;align-items:center;gap:6px;padding:7px 9px;border-bottom:1px dashed var(--line)}
  .match .slot:last-of-type{border-bottom:none}
  .match .slot .nm{flex:1;font-size:13px;cursor:pointer;border-radius:5px;padding:2px 4px}
  .match .slot .nm:hover{background:#f3eada}
  .match .slot.win .nm{font-weight:800;color:var(--green)}
  .match .slot.bye .nm{color:#b3aa98;font-style:italic}
  .match .slot.tbd .nm{color:#b3aa98;font-style:italic}
  .match .scorerow{display:flex;gap:6px;padding:6px 9px;background:#faf6ec;border-top:1px solid var(--line);align-items:center}
  .match .scorerow input{flex:1;min-width:0}
  .match .scorerow .winsel{flex:1;min-width:0;max-width:46%;border:1px solid var(--gold);border-radius:5px;background:#fff;font-weight:600}
  .match .sched-tag{font-size:10px;color:#6b6356;padding:2px 9px 6px}
  .champion{background:linear-gradient(#fff,#fbf4df);border:2px solid var(--gold);text-align:center;padding:14px;border-radius:10px}
  .champion .lbl{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gold)}
  .champion .who{font-size:18px;font-weight:800;margin-top:4px}
  /* Schedule */
  .daybar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .daybar button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;text-align:center;line-height:1.2}
  .daybar button.active{background:var(--red);color:#fff;border-color:var(--red)}
  .daybar button .dow{display:block;font-weight:700}
  .daybar button .dt{display:block;font-size:11px;opacity:.8}
  .daybar button .cnt{display:block;font-size:10px;margin-top:2px;color:var(--gold)}
  .schedtable{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .schedtable th,.schedtable td{border:1px solid var(--line);padding:6px;vertical-align:top;font-size:12px}
  .schedtable th{background:var(--red);color:#fff;font-size:12px}
  .schedtable td.time{background:#faf6ec;font-weight:700;white-space:nowrap;text-align:center}
  .schedtable td.lunch{background:#f0eada;text-align:center;color:#8f8775}
  .slotcell{min-height:34px}
  .mtile{background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--red);border-radius:6px;padding:5px 7px;margin-bottom:4px}
  .mtile.conflict{background:#fde9e9;box-shadow:inset 0 0 0 2px #d11}
  .mtile .conflictmsg{color:#b5362b;font-size:10px;font-weight:600;margin:3px 0 2px;line-height:1.35}
  .mtile .conflictmsg span{display:block}
  .mtile .softreq{color:#a56a00;font-size:10px;font-weight:600;margin:2px 0;line-height:1.3}
  .mtile .cls{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6b6356;display:flex;align-items:center;gap:4px}
  .mtile .cls .stage{margin-left:auto;font-weight:700;color:#8a8270;white-space:nowrap;display:flex;align-items:center;gap:3px}
  .mtile .cls .stage .cup{font-size:12px}
  .mtile.locked{opacity:.92}
  .mtile.locked .lockmark{color:#b5362b;font-weight:700}
  .unschedgroup{width:100%}
  .unschedgroup .ghead{font-size:12px;font-weight:700;color:#26211c;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
  .unschedgroup .ghead .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .unschedgroup .items{display:flex;flex-wrap:wrap;gap:8px}
  .mtile .cdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .schedtable td.pausrow{background:#efe9db;color:#8a8270;text-align:center;font-size:11px;font-style:italic}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin:0 0 12px;padding:10px 12px;background:var(--paper);border:1px solid var(--line);border-radius:8px}
  .legend .item{display:flex;align-items:center;gap:6px;font-size:12px}
  .legend .sw{width:13px;height:13px;border-radius:3px;display:inline-block;flex:0 0 auto}
  .classcard .sw{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:5px}
  .mtile .vs{font-size:12px;font-weight:600;margin:2px 0}
  .mtile .ctrls{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
  .mtile select{font-size:11px;padding:2px 3px}
  .unsched{display:flex;flex-wrap:wrap;gap:8px}
  .empty{color:#8a8270}
  .hint{font-size:12px;color:#6b6356;background:#faf6ec;border:1px dashed var(--line);border-radius:8px;padding:10px 12px;margin-bottom:14px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{font-size:11px;background:#eee5cf;border-radius:20px;padding:2px 9px}
  table.results{width:100%;border-collapse:collapse;background:#fff}
  table.results th,table.results td{border:1px solid var(--line);padding:7px 9px;font-size:13px;text-align:left}
  table.results th{background:#faf6ec}
  .muted{color:#8a8270}
  .small{font-size:12px}
  /* print */
  #printArea{display:none}
  .brpage{position:relative;overflow:hidden;background:#fff}
  /* Publik läsvy: dölj all redigering (admin-delen) */
  body.public .adminonly{ display:none !important; }
  body.public .mtile .ctrls{ display:none !important; }
  body.public .mtile .conflictmsg, body.public .mtile .softreq{ display:none !important; }
  body:not(.public) .publiconly{ display:none !important; }
  /* Startsidan: vit bakgrund, ingen logga, svart text på rubriker */
  body.home, body.home header.app{ background:#fff !important; }
  body.home header.app .logo{ display:none !important; }
  body.home #appTitle, body.home #app .card h2, body.home #app .card h3{ color:#000 !important; }
  body.home #linkBtn{ display:none !important; }   /* Kopiera länk visas ej på startsidan */
  @page land{ size:A4 landscape; margin:6mm }
  @media print{
    header.app,.tabs,.toolbar,.daybar,#app,.no-print{display:none !important}
    html,body{background:#fff !important}
    #printArea{display:block;padding:0;background:#fff}
    #printArea h1{color:#000}
    .mtile .ctrls{display:none}
    /* Stege som träd: en liggande A4 per klass */
    .brpage{width:1040px;height:730px;page:land;break-after:page;page-break-after:always}
    .brpage:last-child{break-after:auto;page-break-after:auto}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<header class="app">
  <div class="logo" id="logoHolder"></div>
  <div>
    <h1 id="appTitle">Klubbmästerskap</h1>
    <p class="sub" id="appSub">Dalarö Tennisklubb</p>
  </div>
  <div class="spacer"></div>
  <button id="linkBtn" class="btn ghost mini no-print publiconly" style="white-space:nowrap"></button>
  <button id="homeBtn" class="btn ghost mini no-print" style="white-space:nowrap;display:none">🏠 Startsida</button>
  <button id="adminBtn" class="btn ghost mini no-print" style="white-space:nowrap"></button>
  <div class="sync-badge no-print js-sync" id="syncBadge" style="font-size:12px;opacity:.95;white-space:nowrap"></div>
  <div class="tabs" id="tabs"></div>
</header>

<main>
  <input type="file" id="importFile" accept="application/json" style="display:none" />
  <div id="app"></div>
</main>

<div id="printArea"></div>

<script>
/* =========================================================
   Dalarö Tennisklubb – Klubbmästerskap. Lokal app (localStorage).
   ========================================================= */

// Delad nyckel för denna app-instans (unik per app). Styr både molnraden (Supabase)
// och de lokala lagringsnycklarna, så två appar på samma domän aldrig delar data.
// TOURN_KEY är numera VALBAR: varje turnering är en egen rad i molnet med sin egen nyckel.
// Aktiv turnering minns per enhet i localStorage ("km_current_tourn").
const DEFAULT_TOURN_KEY = "TennisAppen";       // grundturnering om inget annat valts
const APP_ID = DEFAULT_TOURN_KEY;            // app-namn – turneringar från en annan app (t.ex. TennisKM) döljs
// Läs turneringsnyckel ur adressen: ?t=nyckel (stöder även #t=nyckel för delade hash-länkar).
function tournKeyFromURL(){
  try{
    const u=new URL(location.href);
    const q=u.searchParams.get("t"); if(q) return q;
    const m=(u.hash||"").match(/[#&]t=([^&]+)/); if(m) return decodeURIComponent(m[1]);
  }catch(e){}
  return null;
}
function currentTournKey(){
  const fromUrl=tournKeyFromURL();
  if(fromUrl){ try{ localStorage.setItem("km_current_tourn", fromUrl); }catch(e){} return fromUrl; }
  try{ return localStorage.getItem("km_current_tourn") || DEFAULT_TOURN_KEY; }catch(e){ return DEFAULT_TOURN_KEY; }
}
let TOURN_KEY   = currentTournKey();         // aktiv turnering (byts i Turneringsinformation / via ?t=)
// Hade den ADRESS användaren öppnade en specifik turnering (?t=)? Fångas FÖRE updateTournURL() skriver om adressen.
const BOOT_HAD_TOURN_IN_URL = !!tournKeyFromURL();
// Delbar länk till aktiv turnering, och synka adressfältet så den alltid speglar vald turnering.
function tournShareURL(){ try{ const u=new URL(location.href); u.searchParams.set("t", TOURN_KEY); return u.href; }catch(e){ return location.href; } }
function updateTournURL(){ try{ const u=new URL(location.href); u.searchParams.set("t", TOURN_KEY); history.replaceState(null, "", u.pathname+u.search+u.hash); }catch(e){} }
function clearTournURL(){ try{ const u=new URL(location.href); u.searchParams.delete("t"); history.replaceState(null, "", u.pathname+u.search+u.hash); }catch(e){} }
function lsKey(){ return "km_" + TOURN_KEY; } // lokal cache – per aktiv turnering
const ADMIN_KEY = "km_admin_" + DEFAULT_TOURN_KEY;   // admin-flagga – per app (gäller alla turneringar)

// --- Turneringsdagar beräknas från turneringens start- och slutdatum ---
const SV_DOW = ["Söndag","Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag"];
const SV_MON = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
function parseDate(s){ if(!s) return null; const [y,m,d]=s.split("-").map(Number); const dt=new Date(y,m-1,d); return isNaN(dt)?null:dt; }
function isoDate(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function fmtShort(dt){ return dt.getDate()+" "+SV_MON[dt.getMonth()]; }
function defaultTournament(){ const y=new Date().getFullYear(); return {name:"Klubbmästerskap", start:`${y}-07-04`, end:`${y}-07-11`}; }
// Lista över turneringens dagar {date, dow, short}
function getDays(){
  const t=state.tournament||{};
  const start=parseDate(t.start), end=parseDate(t.end);
  const out=[];
  if(!start||!end||end<start) return out;
  let cur=new Date(start), guard=0;
  while(cur<=end && guard++<120){
    out.push({date:isoDate(cur), dow:SV_DOW[cur.getDay()], short:fmtShort(cur)});
    cur.setDate(cur.getDate()+1);
  }
  return out;
}
function adultFinalDay(){ const d=getDays(); return d.length?d[d.length-1].date:null; }            // sista dagen
function youthFinalDay(){ const d=getDays(); return d.length>1?d[d.length-2].date:(d[0]?d[0].date:null); } // näst sista dagen
function tournamentYear(){ const d=getDays(); return d.length?parseDate(d[0].date).getFullYear():""; }
// Arrangör (visas i rubriken och på utskrifter). Ändras under Turneringsinformation.
function arrangerName(){ return (state.arranger||"").trim() || "Dalarö Tennisklubb"; }
function tournamentRangeText(){
  const d=getDays(); if(!d.length) return "datum ej satt";
  const a=parseDate(d[0].date), b=parseDate(d[d.length-1].date);
  return `${a.getDate()} ${SV_MON[a.getMonth()]} – ${b.getDate()} ${SV_MON[b.getMonth()]} ${b.getFullYear()}`;
}

const DEFAULT_CLASSES = [
  {name:"Damsingel",        type:"adult"},
  {name:"Herrsingel",       type:"adult"},
  {name:"Herrdubbel",       type:"adult"},
  {name:"Damdubbel",        type:"adult"},
  {name:"Mixeddubbel",      type:"adult"},
  {name:"Juniorveteran",    type:"adult"},
  {name:"Veteransingel",    type:"adult"},
  {name:"Generationsdubbel",type:"adult"},
  {name:"Pojksingel Äldre", type:"youth"},
  {name:"Flicksingel Äldre",type:"youth"},
  {name:"Juniordubbel",     type:"youth"},
  {name:"Pojksingel Yngre", type:"youth"},
  {name:"Flicksingel Yngre",type:"youth"},
  {name:"Minidubbel",       type:"youth"},
];

/* ---------- Klasser med seedning (endast top 4) ---------- */
const RANKED_CLASSES = new Set(["Herrsingel","Herrdubbel","Mixeddubbel","Juniorveteran"]);
const MAX_SEEDS = 4;

/* ---------- Tidsluckor (minuter från midnatt) ----------
   Ungdom: 30 min/match, vardagar 9–13, paus 30 min efter 3 matcher.
   Senior: 60 min/match, alla dagar 13–21, paus 60 min efter 3 matcher.
   Helg: seniorer spelar dessutom förmiddag 8–11 (3 matcher à 60 min, paus efter tre).
   Lunch 12–13. */
// Standardvärden för schemaläggningen (kan ändras i Turneringsinformation).
function defaultSched(){
  return {
    hasYouth:true, hasSenior:true,
    youthStart:540, youthEnd:780, youthDur:30,        // junior vardag 9–13, 30 min
    seniorStart:780, seniorEnd:1260, seniorDur:60,    // senior vardag 13–21, 60 min
    seniorWeekendStart:540, seniorWeekendEnd:1260,    // senior helg 9–21
    breakEvery:3,                                     // paus efter var N:e match (0 = ingen)
    lunchStart:720, lunchEnd:780,                     // lunch 12–13 (0/0 = ingen)
    breakName:"Hydration Break", lunchName:"Hydration Break"
  };
}
// Aktuell schemakonfig (med standard som reserv innan state finns).
function SC(){ return (typeof state!=="undefined" && state && state.sched) ? state.sched : defaultSched(); }
// Bygg starttider i en zon: matchlängd, paus efter var N:e match, samt ev. lunchlucka.
function buildZoneSlots(startMin, endMin, matchMin, perBreak, breakMin, lunchStart, lunchEnd){
  const out=[]; let t=startMin, c=0, guard=0;
  while(t+matchMin<=endMin && guard++<600){
    if(lunchStart!=null && lunchEnd>lunchStart && t>=lunchStart && t<lunchEnd){ t=lunchEnd; c=0; continue; }
    out.push(t); t+=matchMin;
    if(perBreak>0){ c++; if(c%perBreak===0) t+=breakMin; }   // paus efter var N:e match
  }
  return out;
}
function youthSlots(){ const s=SC(); return buildZoneSlots(s.youthStart,s.youthEnd,s.youthDur,s.breakEvery,s.youthDur,s.lunchStart,s.lunchEnd); }
function seniorWeekdaySlots(){ const s=SC(); return buildZoneSlots(s.seniorStart,s.seniorEnd,s.seniorDur,s.breakEvery,s.seniorDur,s.lunchStart,s.lunchEnd); }
function seniorWeekendSlots(){ const s=SC(); return buildZoneSlots(s.seniorWeekendStart,s.seniorWeekendEnd,s.seniorDur,s.breakEvery,s.seniorDur,s.lunchStart,s.lunchEnd); }
// Auto-tider för en klasstyp en given dag.
function slotsFor(type, day){
  const s=SC();
  if(type==="youth") return s.hasYouth ? youthSlots() : [];
  if(!s.hasSenior) return [];
  return (day && isWeekend(day)) ? seniorWeekendSlots() : seniorWeekdaySlots();
}
// Alla auto-tider en given dag kan ha (utifrån konfig: helg = senior; vardag = junior + senior).
function daySlots(day){
  const s=SC();
  if(isWeekend(day)) return s.hasSenior ? seniorWeekendSlots() : [];
  return [...(s.hasYouth?youthSlots():[]), ...(s.hasSenior?seniorWeekdaySlots():[])];
}
// MANUELL schemaläggning: 08:00–21:00 i halvtimmessteg (seniorer kan startas på halvtimme).
function manualSlots(type){
  const out=[]; for(let t=480; t<=1260; t+=30) out.push(t); return out;
}
// Överlappar två tidsintervall varandra?
function timeOverlap(s1,e1,s2,e2){ return s1<e2 && s2<e1; }
// Matchens längd i minuter (utifrån klasstyp).
function matchDur(m){ return matchMinFor(getClass(m.classId).type); }
function fmtMin(m){ return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); }
function minToTime(m){ return (m==null||isNaN(m)) ? "" : fmtMin(m); }              // minuter -> "HH:MM"
function timeToMin(str){ if(!str) return null; const a=String(str).split(":"); const h=+a[0]; if(isNaN(h)) return null; return h*60+(+a[1]||0); }
function matchMinFor(type){ const s=SC(); return type==="youth"?s.youthDur:s.seniorDur; }
// Radlängd i rutnätet: helg = seniorlängd; vardag före seniorstart = juniorlängd, annars senior.
function slotDur(t, day){ const s=SC(); if(day && isWeekend(day)) return s.seniorDur; return t < s.seniorStart ? s.youthDur : s.seniorDur; }
// Är luckan mellan prevEnd och t en lunchlucka? Namn på paus/lunch (konfigurerbara).
function isLunchGap(prevEnd,t){ const s=SC(); return s.lunchEnd>s.lunchStart && prevEnd < s.lunchEnd && t > s.lunchStart; }
function breakName(isLunch){ const s=SC(); return (isLunch ? (s.lunchName||s.breakName) : s.breakName) || "Paus"; }
function timeLabel(m, day){ return fmtMin(m)+"–"+fmtMin(m+slotDur(m, day)); }
function hourLabel(m, day){ return timeLabel(m, day); }   // bakåtkompatibelt namn
// Match-specifik tidsetikett (matchlängd utifrån klasstyp – korrekt även vid manuell placering).
function matchLabel(m){ const d=matchMinFor(getClass(m.classId).type); return fmtMin(m.time)+"–"+fmtMin(m.time+d); }

/* ---------- Spelarnamn ---------- */
// Ta bort rank "(n)" i slutet av ett namn (för jämförelse/gruppering).
function stripRank(name){ return String(name).replace(/\s*\(\d+\)\s*$/,"").trim(); }
// Individuella spelarnamn i en match (dubbelpar delas på "/").
function playersOf(m){
  const out=[];
  for(const side of [m.p1,m.p2]){
    if(!side) continue;
    for(const part of String(side).split("/")){
      const nm=stripRank(part);
      if(nm) out.push(nm);
    }
  }
  return out;
}

// Katalog över tävlingsformat. desc = kort beskrivning. est(N,C) = {totalMin, perPlayerMin}.

  { id:"americano", name:"Americano",
    desc:"Socialt dubbelspel. Man byter partner varje rond och spelar korta matcher (t.ex. till 21–24 poäng). Alla poäng räknas individuellt – flest poäng vinner.",
    est:(N,C)=>{ const gm=14, R=Math.max(1,N-1), mpr=Math.max(1,Math.floor(N/4)), active=4*mpr; return { totalMin: R*Math.ceil(mpr/Math.max(1,C))*gm, perPlayerMin: Math.round(R*gm*active/Math.max(1,N)) }; } },
  { id:"mexicano", name:"Mexicano",

  { id:"compass", name:"Kompasslottning",

    est:(N,C)=>{ const mm=40, R=Math.max(1,Math.ceil(Math.log2(Math.max(2,N)))), mpr=Math.floor(N/2); return { totalMin: R*Math.ceil(mpr/Math.max(1,C))*mm, perPlayerMin: R*mm }; } },
  { id:"kingcourt", name:"King of the Court",

];
function matchFormat(id){ return MATCH_FORMATS.find(f=>f.id===id) || MATCH_FORMATS[0]; }
function formatName(id){ return matchFormat(id).name; }
// Formatera minuter → "1 tim 20 min" / "45 min".
function fmtDurationMin(min){ min=Math.max(0,Math.round(min/5)*5); const h=Math.floor(min/60), m=min%60; if(h&&m) return `${h} tim ${m} min`; if(h) return `${h} tim`; return `${m} min`; }

// Säkerställ att äldre/importerade tillstånd har förväntade fält.
function normalize(s){
  if(!s.tournament) s.tournament=defaultTournament();
  if(!s.tournament.start||!s.tournament.end) s.tournament=defaultTournament();
  if(!s.tournament.name) s.tournament.name="Klubbmästerskap";
  if(typeof s.arranger!=="string" || !s.arranger.trim()) s.arranger="Dalarö Tennisklubb";
  if(s.lang!=="en") s.lang="sv";
  if(typeof s.logo!=="string") s.logo=null;
  if(typeof s.bgColor!=="string") s.bgColor=null;
  if(typeof s.headColor!=="string") s.headColor=null;
  if(!Array.isArray(s.requests)) s.requests=[];
  if(!s.organizer || typeof s.organizer!=="object") s.organizer={ name:"", phone:"", email:"" };
  if(typeof s.chairman!=="string") s.chairman="";
  if(!Array.isArray(s.trainers)) s.trainers=[];
  if(!s.diplomaSigns || typeof s.diplomaSigns!=="object") s.diplomaSigns={ director:true, chairman:true, trainers:false };
  { const d=defaultSched(); s.sched = Object.assign(d, (s.sched && typeof s.sched==="object") ? s.sched : {}); }
  if(typeof s.venue!=="string") s.venue="";
  if(typeof s.format!=="string" || !MATCH_FORMATS.some(f=>f.id===s.format)) s.format="classic";
  if(!Array.isArray(s.players)) s.players=[];          // deltagarlista för rond-baserade format
  if(!(s.amPointsTo>0)) s.amPointsTo=24;               // poäng per match (Americano/Mexicano)
  if(!Array.isArray(s.amRounds)) s.amRounds=[];        // genererade ronder
  if(typeof s.amStart!=="string" || !s.amStart) s.amStart="09:00";   // simulering: starttid
  if(!(s.amRoundMin>0)) s.amRoundMin=15;               // simulering: minuter per rond
  if(s.amScoreMode!=="pairs") s.amScoreMode="individual";   // poängräkning: individuellt/par
  if(!(s.amWarmup>=0)) s.amWarmup=0;                    // simulering: uppvärmning före rond 1 (min)
  if(!Array.isArray(s.amBreaks)) s.amBreaks=[];         // simulering: pauser [{after, min}]
  if(!(s.amPlanRounds>0)) s.amPlanRounds=0;             // föreslaget antal ronder från startsidan
  if(s.amRoundBy!=="points") s.amRoundBy="time";        // styr ronden: "time" (min/rond) eller "points" (till X poäng)
  if(!(s.amMinPerPoint>0)) s.amMinPerPoint=0.6;         // uppskattad tid per poäng i poäng-läge
  if(typeof s.amLocked!=="boolean") s.amLocked=false;   // låst inställningsflik (skydd mot oavsiktlig ändring)
  if(!(s.amPlanHours>0)) s.amPlanHours=3;               // speltid (timmar) för generering från simulering
  if(!(s.amTransMin>=0)) s.amTransMin=2;                // kort paus mellan ronder (byte + uppvärmning), min
  if(!Array.isArray(s.kotcLadder)) s.kotcLadder=[];    // King of the Court: stege (ordnad lista av lag)
  if(typeof s.adminPin!=="string") s.adminPin="";
  if(typeof s.updatedAt!=="number") s.updatedAt=0;
  if(typeof s.archived!=="boolean") s.archived=false;
  if(typeof s.archivedAt!=="number") s.archivedAt=0;
  if(typeof s.createdAt!=="number") s.createdAt=0;   // skapad-tidsstämpel (0 = okänt för äldre turneringar)
  if(!s.extraCourts) s.extraCourts={};
  if(!s.lockedDays) s.lockedDays={};
  if(!s.planFinalDays) s.planFinalDays={};
  if(!s.planCourts) s.planCourts={};
  s.classes=s.classes||[];
  // Engångsmigrering (annars återskapas klasser som användaren tagit bort/döpt om).
  if(!s.migratedV2){
    const renameMap={"Pojksingel":"Pojksingel Äldre","Flicksingel":"Flicksingel Äldre"};
    s.classes.forEach(c=>{ if(renameMap[c.name]) c.name=renameMap[c.name]; });
    [["Pojksingel Yngre","youth"],["Flicksingel Yngre","youth"],["Minidubbel","youth"]].forEach(([name,type])=>{
      if(!s.classes.some(c=>c.name===name)){
        s.classes.push({ id:"c"+uid(), name, type, ranked:false, seeds:4, catNo:s.classes.length+1,
          participants:[], matches:[], champion:null });
      }
    });
    s.migratedV2=true;
  }
  (s.classes||[]).forEach((c,ci)=>{
    // Sätt/uppdatera seedningsflaggan utifrån klassnamnet (robust mot gammal data).
    if(c.ranked===undefined) c.ranked = RANKED_CLASSES.has(c.name);
    if(!(c.seeds>0)) c.seeds = 4;   // antal seedade (standard 4)
    if(!(c.catNo>0)) c.catNo = ci+1; // matchnummer-kategori (första siffran)
    if(typeof c.category!=="string") c.category="";   // herr/dam/pojke/flicka/mixed
    if(typeof c.ageLevel!=="string") c.ageLevel="";   // åldersnivå (fritext)
    // Migrera gamla heltimme-tider (9..20) till minuter (540..1200).
    for(const m of (c.matches||[])){
      if(m.time!=null && m.time>0 && m.time<60) m.time=m.time*60;
    }
  });
  return s;
}

function renameClass(cls){
  const nn=(prompt(`Nytt namn för klassen "${cls.name}":`, cls.name)||"").trim();

  if(state.classes.some(c=>c!==cls && c.name===nn)){ alert("Det finns redan en klass med det namnet."); return; }
  cls.name=nn; save(); render();

  if(cls.hidden) cls.matches.forEach(m=>{ m.day=null; m.court=null; m.time=null; });

function deleteClass(cls){
  const extra=cls.participants.length?` Klassen har ${cls.participants.length} deltagare och ${cls.matches.length} matcher som också tas bort.`:"";

// Skriv en rad utan att kräva unik constraint på "key":
// försök UPPDATERA (PATCH) befintlig rad, och INFOGA (POST) bara om ingen fanns.
async function cloudUpsertRow(key, data){
  const fail=(where,r,body)=>{ const e=new Error(`${where} HTTP ${r.status} – ${(body||"").slice(0,180)}`); e.status=r.status; e.body=body||""; cloudLastError=e.message; return e; };

  try{ r = await fetch(`${SUPA_URL}/tournaments?key=eq.${encodeURIComponent(key)}`, {
    method:"PATCH",
    headers: cloudHeaders({ Prefer:"return=representation" }),
    body: JSON.stringify({ data })
  }); }
  catch(e){ cloudLastError="Nätverksfel (PATCH): "+e.message; throw e; }
  if(!r.ok){ throw fail("PATCH", r, await r.text().catch(()=>"" )); }
  let rows=[]; try{ rows=await r.json(); }catch(e){}
  if(Array.isArray(rows) && rows.length){ cloudLastError=""; return; }   // en rad uppdaterades → klart
  // 2) INFOGA (ingen rad fanns)
  let r2;
  try{ r2 = await fetch(`${SUPA_URL}/tournaments`, {
    method:"POST",
    headers: cloudHeaders({ Prefer:"return=minimal" }),
    body: JSON.stringify({ key, data })
  }); }
  catch(e){ cloudLastError="Nätverksfel (POST): "+e.message; throw e; }
  if(!r2.ok){ throw fail("POST", r2, await r2.text().catch(()=>"" )); }
  cloudLastError="";   // lyckad skrivning – nollställ felet
}

    state = normalize(data);

// Felsökning: testar läsning + skrivning mot Supabase och förklarar vad som är fel.
async function cloudDiagnose(){
  const out=[];
  out.push("URL: "+SUPA_URL);
  out.push(`anon-nyckel: …${SUPA_KEY.slice(-6)} (längd ${SUPA_KEY.length} tecken)`);
  out.push("Delad nyckel (rad): "+TOURN_KEY);
  out.push("Sidans adress: "+location.origin);
  out.push("");
  if(!cloudEnabled){ out.push("❌ Molnsynk är inte aktiverad – URL eller nyckel saknas i filen."); return out.join("\n"); }
  const interpret=(status,body)=>{
    const b=(body||"").toLowerCase();
    if(status===401||status===403){
      if(b.includes("row-level security")||b.includes("42501")) return "→ RLS-policy saknas/blockerar. Kör SQL:en som ger 'anon' läs- OCH skrivrätt (se instruktionen).";
      if(b.includes("api key")||b.includes("apikey")) return "→ API-nyckeln saknas eller är fel. Kopiera 'anon public' på nytt från Supabase → Project Settings → API.";
      if(b.includes("jwt")||b.includes("expired")||b.includes("invalid")) return "→ Nyckeln är ogiltig eller utgången. Hämta en ny 'anon public'-nyckel.";
      return "→ Behörighet nekad (oftast RLS-policy som saknas, eller fel nyckel).";
    }
    if(status===404) return "→ 404. Kontrollera att URL:en slutar på /rest/v1 och att tabellen 'tournaments' finns.";
    if(status===0) return "→ Ingen kontakt. Internet nere, fel URL, eller nätverket/brandväggen blockerar supabase.co (CORS).";
    if(b.includes("does not exist")||b.includes("42p01")) return "→ Tabellen 'tournaments' saknas. Skapa den med SQL:en i instruktionen.";
    if((b.includes("could not find")&&b.includes("column"))||(b.includes("column")&&b.includes("does not exist"))) return "→ Fel/saknad kolumn. Tabellen ska ha exakt kolumnerna 'key' (text) och 'data' (jsonb).";
    if(status===400){
      if(b.includes("no unique or exclusion")||b.includes("42p10")) return "→ 'key' saknar unik constraint. Appen är nu uppdaterad för att inte kräva det – ladda om sidan (Ctrl/Cmd+Shift+R).";
      if(b.includes("not-null")||b.includes("23502")) return "→ En obligatorisk kolumn saknar värde. Ta bort extra NOT NULL-kolumner, eller använd bara 'key' och 'data'.";
      return "→ Felaktig begäran (400). Vanligast: tabellen har fel kolumner. Den ska ha 'key' (text) och 'data' (jsonb). Se SQL:en i instruktionen.";
    }
    return "→ Oväntat svar – se texten ovan.";
  };
  // 1) LÄSNING
  try{
    const r=await fetch(`${SUPA_URL}/tournaments?key=eq.${encodeURIComponent(TOURN_KEY)}&select=key`, { headers: cloudHeaders() });
    const body=await r.text();
    if(r.ok){ out.push(`✅ LÄSNING OK (HTTP ${r.status}).`); }
    else { out.push(`❌ LÄSNING misslyckades: HTTP ${r.status}`); out.push("  "+body.slice(0,180)); out.push("  "+interpret(r.status,body)); return out.join("\n"); }
  }catch(e){ out.push("❌ LÄSNING: ingen kontakt med servern – "+e.message); out.push("  "+interpret(0,"")); return out.join("\n"); }
  // 2) SKRIVNING (testrad med egen nyckel – rör inte turneringsdatan). Samma metod som appen (PATCH→INSERT).
  try{
    await cloudUpsertRow("__diag_test__", { ts:Date.now() });
    out.push("✅ SKRIVNING OK.");
    out.push("");
    out.push("🎉 Allt fungerar! Tabellen finns och behörigheten är rätt.");
    out.push("Om det ändå står Offline: ladda om sidan.");
    try{ await fetch(`${SUPA_URL}/tournaments?key=eq.__diag_test__`, { method:"DELETE", headers: cloudHeaders() }); }catch(e){}   // städa bort testraden
  }catch(e){
    out.push("❌ SKRIVNING misslyckades: "+(e.message||e));
    if(e.body) out.push("  "+String(e.body).slice(0,180));
    out.push("  "+interpret(e.status||0, e.body||e.message||""));
  }
  return out.join("\n");
}

// Välj svart eller vit text som syns bäst mot en given bakgrundsfärg (hex).
function contrastText(bg){
  let h=String(bg||"").trim().replace(/^#/,"");
  if(h.length===3) h=h.split("").map(c=>c+c).join("");
  if(!/^[0-9a-fA-F]{6}$/.test(h)) return "#1a1a1a";
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  // Relativ luminans (perception) – ljus bakgrund → mörk text, mörk bakgrund → ljus text.
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.6 ? "#1a1a1a" : "#ffffff";
}

// Distinkt färg per klass (utifrån klassens ordning) för att skilja matcher åt.
const CLASS_COLORS = ["#d1495b","#3f88c5","#2e9e57","#8e44ad","#e07b16","#0e9aa7","#9A6324","#7a2e2e","#7f8c1e","#d81b8c","#5d6d7e"];
function classColor(cls){ const i=state.classes.indexOf(cls); return CLASS_COLORS[(i<0?0:i)%CLASS_COLORS.length]; }
function classColorId(id){ const c=getClass(id); return c?classColor(c):"#888"; }
// Visningsnamn: dölj seedningssiffran "(n)" överallt utom i Klasser & deltagare.
function dispName(x){ return x==null ? x : stripRank(x); }

/* ----- Matchnummer (kategori*100 + löpande) ----- */
function classCatNo(cls){ return cls.catNo>0 ? cls.catNo : state.classes.indexOf(cls)+1; }   // kategori (första siffran)
function isByeMatch(m){ return !m.manual && m.round===0 && (m.p1===null || m.p2===null); }
// Riktiga matcher i en klass i spelordning (byes räknas ej), bracket före manuella.
function orderedRealMatches(cls){
  const br=cls.matches.filter(m=>!m.manual && !isByeMatch(m)).sort((a,b)=>a.round-b.round||a.index-b.index);
  const man=cls.matches.filter(m=>m.manual);
  return [...br, ...man];
}
function matchNumber(m){
  const cls=getClass(m.classId); if(!cls) return null;
  const pos=orderedRealMatches(cls).indexOf(m);
  if(pos<0) return null;
  const seq = (m.seq>0) ? m.seq : (pos+1);   // explicit sekvens (ändrad/bytt) annars spelordning
  return classCatNo(cls)*100 + seq;
}
// Tilldela explicit sekvensnummer (m.seq) till alla numrerade matcher i klassen (om ej satt).
// Används innan man byter matchnummer så att alla har ett fast nummer att byta med.
function assignSeqs(cls){ orderedRealMatches(cls).forEach((m,i)=>{ if(!(m.seq>0)) m.seq=i+1; }); }
// Hitta en (synlig) match utifrån matchnummer.
function findMatchByNumber(no){
  for(const c of visibleClasses()) for(const m of c.matches){ if(!isByeMatch(m) && matchNumber(m)===no) return {m,c}; }
  return null;
}
function matchNoTag(m){ const n=matchNumber(m); return n==null?"":`<span class="mno">#${n}</span>`; }
// Etikett för en matchsida: känd deltagare visas med namn, annars matchnumret på
// matchen vars vinnare fyller platsen (t.ex. "#12" = vinnaren av match 12).
function slotFeedLabel(cls,m,slot){
  const p = slot===0 ? m.p1 : m.p2;
  if(p) return dispName(p);
  const feeder = (cls && m.round>0 && !m.manual) ? matchOf(cls, m.round-1, m.index*2 + slot) : null;
  const n = feeder ? matchNumber(feeder) : null;
  if(n!=null) return `<span class="mno" title="${L('Vinnare av match','Winner of match')} #${n}">#${n}</span>`;
  return `<span class="muted">?</span>`;
}
// Antal riktiga matcher som ska spelas i en klass (deltagare-1 + manuella).
function realMatchCount(cls){
  return Math.max(0, cls.participants.length-1) + cls.matches.filter(m=>m.manual).length;
}
// Ersätt en deltagare i en klass: nya deltagaren tar den gamlas plats i stege och schema.
function replaceParticipant(cls, oldEntry, newBase){
  newBase=(newBase||"").trim(); if(!newBase) return;
  const rm=String(oldEntry).match(/\s*(\(\d+\))\s*$/);   // behåll ev. seedning "(n)"
  const newEntry = newBase + (rm ? (" "+rm[1]) : "");
  const i=cls.participants.indexOf(oldEntry);
  if(i>=0) cls.participants[i]=newEntry;
  for(const m of cls.matches){
    if(m.p1===oldEntry) m.p1=newEntry;
    if(m.p2===oldEntry) m.p2=newEntry;
    if(m.winner===oldEntry) m.winner=newEntry;
  }
  if(cls.champion===oldEntry) cls.champion=newEntry;
  save(); render();
}

/* ---------------- Bracket / stege ---------------- */
function seedOrder(size){
  let s=[1];
  while(s.length<size){
    const len=s.length*2, n=[];
    for(const x of s){ n.push(x); n.push(len+1-x); }
    s=n;
  }
  return s;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function buildBracket(cls){
  const manuals = cls.matches.filter(m=>m.manual); // behåll manuellt inlagda matcher
  cls.matches=[]; cls.champion=null;
  // Rensa ev. tidigare rank, behåll ordning. Seedning (top 4) endast i utvalda klasser.
  let names = cls.participants.map(stripRank).filter(Boolean);
  const ranked = isRanked(cls);
  const nSeeds = ranked ? Math.min(seedCountOf(cls), names.length) : 0;
  // Notera rankade med siffra inom parentes bakom namnet och spara i deltagarlistan.
  for(let i=0;i<nSeeds;i++) names[i] = names[i] + ` (${i+1})`;
  cls.participants = names.slice();
  const n=names.length;
  if(n<2){ cls.matches.push(...manuals); return; }
  let size=1; while(size<n) size*=2;
  const order=seedOrder(size);              // slot-index -> seed-nummer (1..size)
  const slots=new Array(size).fill(null);   // null = BYE
  // Seeds på standardpositioner (1 & 2 i motsatta halvor osv) -> kan ej mötas tidigt.
  for(let s=1;s<=nSeeds;s++) slots[order.indexOf(s)] = names[s-1];
  // Byes ges till de högst seedade (slots med högst seed-nummer, ej seedplatser).
  const byes=size-n;
  const byeSlots=new Set();
  const byOrderDesc=[...Array(size).keys()].sort((a,b)=>order[b]-order[a]);
  for(const idx of byOrderDesc){
    if(byeSlots.size>=byes) break;
    if(order[idx]<=nSeeds) continue;        // seedplats får inte vara bye
    byeSlots.add(idx);
  }
  // Övriga (oseedade) spelare lottas slumpmässigt in i resterande platser.
  const rest=shuffle(names.slice(nSeeds));
  const emptyIdx=[...Array(size).keys()].filter(idx=>order[idx]>nSeeds && !byeSlots.has(idx));
  emptyIdx.forEach((idx,i)=>{ slots[idx]=rest[i] ?? null; });
  // Bygg ronderna.
  const rounds=Math.log2(size);
  for(let r=0;r<rounds;r++){
    const cnt=size/Math.pow(2,r+1);
    for(let i=0;i<cnt;i++){
      const m={ id:uid(), classId:cls.id, round:r, index:i,
        p1:null,p2:null, winner:null, score:"", day:null, court:null, time:null };
      if(r===0){ m.p1=slots[i*2]; m.p2=slots[i*2+1]; }
      cls.matches.push(m);
    }
  }
  cls.matches.push(...manuals);
  resolveByes(cls);
}
function matchOf(cls,r,i){ return cls.matches.find(m=>m.round===r&&m.index===i); }
// Skicka vinnaren till rätt plats i nästa omgång. Returnerar true om något ändrades.
function propagateSlot(cls,m){
  if(!m.winner) return false;
  const nr=m.round+1, ni=Math.floor(m.index/2), slot=m.index%2;
  const next=matchOf(cls,nr,ni);
  if(!next){ // finalen
    if(cls.champion!==m.winner){ cls.champion=m.winner; return true; }
    return false;
  }
  if(slot===0){ if(next.p1!==m.winner){ next.p1=m.winner; return true; } }
  else        { if(next.p2!==m.winner){ next.p2=m.winner; return true; } }
  return false;
}
// Iterativ upplösning: auto-vinst på BYE i omgång 0 + framåtflyttning av vinnare.
function resolveByes(cls){
  let changed=true, guard=0;
  while(changed && guard++<200){
    changed=false;
    for(const m of cls.matches){
      if(m.manual) continue;
      if(m.round===0 && !m.winner){
        if(m.p1!==null && m.p2===null){ m.winner=m.p1; m.score="WO"; changed=true; }
        else if(m.p2!==null && m.p1===null){ m.winner=m.p2; m.score="WO"; changed=true; }
      }
      if(m.winner && propagateSlot(cls,m)) changed=true;
    }
  }
}
function recompChampion(cls){
  cls.champion=null;
  const fm=cls.matches.find(x=>x.round===totalRounds(cls)-1);
  if(fm&&fm.winner) cls.champion=fm.winner;
}
function setWinner(cls,m,winner){
  m.winner=winner; m._wo=false;
  if(m.manual){ save(); render(); return; }   // manuell match: ingen stege-framflyttning
  clearDownstream(cls,m);   // ta bort ev. felaktig nedströms-placering
  resolveByes(cls);         // flytta vinnaren framåt -> nästa match blir spelklar
  recompChampion(cls);
  save(); render();
}
// Registrera/ändra resultat via vinnar-väljaren. key = 'p1' | 'p2' | '' (rensa).
function registerWinner(cls,m,key){
  if(key===""){                 // rensa vinnare
    m.winner=null;
    if(!m.manual){ clearDownstream(cls,m); resolveByes(cls); recompChampion(cls); }
    save(); render(); return;
  }
  setWinner(cls, m, key==="p1"?m.p1:m.p2);
}
function clearDownstream(cls,m){
  const nr=m.round+1, ni=Math.floor(m.index/2), slot=m.index%2;
  const next=matchOf(cls,nr,ni);
  if(!next) return;
  const cur = slot===0?next.p1:next.p2;
  // töm platsen och eventuell vinnare nedströms
  if(slot===0) next.p1=null; else next.p2=null;
  if(next.winner){ const w=next.winner; next.winner=null; next.score=""; clearDownstream(cls,next); }
}
function roundName(r,total){
  const fromEnd=total-1-r;
  if(fromEnd===0) return "Final";
  if(fromEnd===1) return "Semifinal";
  if(fromEnd===2) return "Kvartsfinal";
  return "Omgång "+(r+1);
}
function totalRounds(cls){
  const br=cls.matches.filter(m=>!m.manual);
  if(!br.length) return 0;
  return Math.max(...br.map(m=>m.round))+1;
}
function isReady(m){ return m.p1 && m.p2 && !m.winner; }
function isFinal(cls,m){ return !m.manual && m.round===totalRounds(cls)-1; }
// Kort etikett för vilken omgång/final en match avser (t.ex. "Omgång 2", "Semifinal", "Final").
function stageName(cls,m){ return m.manual ? "Manuell" : roundName(m.round, totalRounds(cls)); }
// Etikett-HTML för matchrubriken: omgång/final till höger, pokal längst till höger för finaler.
function stageTag(cls,m){
  return `<span class="stage">${stageName(cls,m)}${isFinal(cls,m)?' <span class="cup">🏆</span>':''}</span>`;
}
// Skapa en manuell match (ej del av stegen) och placera den på dagen.
function createManualMatch(cls,p1,p2,day){
  const m={id:uid(),classId:cls.id,manual:true,round:null,index:null,
           p1,p2,winner:null,score:"",day:null,court:null,time:null};
  cls.matches.push(m);
  const res=manualPlace(m,day);
  if(!res.ok) alert(res.msg+' Matchen lades under "Ej schemalagda".');
  else if(res.warn) alert(res.warn);
  save(); render();
}
function deleteMatch(id){
  for(const c of state.classes){
    const i=c.matches.findIndex(x=>x.id===id);
    if(i>=0){ c.matches.splice(i,1); break; }
  }
  save(); render();
}

function L(sv,en){ return state.lang==="en" ? en : sv; }
const _MONTHS_EN = {jan:"Jan",feb:"Feb",mar:"Mar",apr:"Apr",maj:"May",jun:"Jun",jul:"Jul",aug:"Aug",sep:"Sep",okt:"Oct",nov:"Nov",dec:"Dec"};
const _DOW_EN = {"Söndag":"Sunday","Måndag":"Monday","Tisdag":"Tuesday","Onsdag":"Wednesday","Torsdag":"Thursday","Fredag":"Friday","Lördag":"Saturday",
  "Sön":"Sun","Mån":"Mon","Tis":"Tue","Ons":"Wed","Tor":"Thu","Fre":"Fri","Lör":"Sat"};
// Dynamiska strängar (antal, veckodagar, datum) som inte finns exakt i ordlistan.
function translateDynamic(s){
  let m, out=s;
  if(m=s.match(/^(\d+) deltagare$/)) return m[1]+" players";
  if(m=s.match(/^(\d+) delt\.$/)) return m[1]+" players";
  if(m=s.match(/^(\d+) omgångar$/)) return m[1]+" rounds";
  if(m=s.match(/^(\d+) match(?:er)?$/)) return m[1]+(m[1]==="1"?" match":" matches");
  if(m=s.match(/^(\d+) banor totalt$/)) return m[1]+" courts total";
  if(m=s.match(/^🗑 Rensa stege & schema för (.+)$/)) return "🗑 Clear bracket & schedule for "+m[1];
  if(m=s.match(/^➕ Lägg in (.+)$/)) return "➕ Add "+m[1];
  if(m=s.match(/^(\d+) omg\.$/)) return m[1]+" rounds";
  // veckodagar (hela ord)
  for(const [sv,en] of Object.entries(_DOW_EN)) out=out.replace(new RegExp("\\b"+sv+"\\b","g"), en);
  // månadsförkortningar i datum ("3 aug" -> "3 Aug")
  out=out.replace(/(\d+)\s+(jan|feb|mar|apr|maj|jun|jul|aug|sep|okt|nov|dec)\b/g,(_,d,mo)=>d+" "+_MONTHS_EN[mo]);
  return out;
}
// Översätt allt textinnehåll i ett DOM-träd till engelska.
function translateDOM(root){
  const w=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes=[]; let node; while(node=w.nextNode()) nodes.push(node);
  for(const nd of nodes){
    const raw=nd.nodeValue, key=raw.trim(); if(!key) continue;
    let val = EN[key];
    if(val==null){ const dyn=translateDynamic(key); if(dyn!==key) val=dyn; }
    if(val!=null && val!==key) nd.nodeValue = raw.replace(key, val);
  }
  root.querySelectorAll("[placeholder]").forEach(el=>{ const v=EN[el.getAttribute("placeholder").trim()]; if(v) el.setAttribute("placeholder", v); });
  root.querySelectorAll("[title]").forEach(el=>{ const v=EN[el.getAttribute("title").trim()]; if(v) el.setAttribute("title", v); });
}
function applyLang(){
  if(state.lang!=="en") return;
  const tabs=document.getElementById("tabs"), a=document.getElementById("app");
  if(tabs) translateDOM(tabs);
  if(a) translateDOM(a);
}

/* Upplägg & förslag på startsidan: konkret plan för valt format inom tidsfönstret. */
// availMin = speltid i minuter; opt = {mode:'time'|'points', dur, pointsTo, trans}
function homePlanHTML(fmt, N, C, availMin, opt){
  opt=opt||{mode:'time', dur:12, trans:0};
  const dur=Math.max(1, Math.round(opt.dur||12)), trans=Math.max(0, Math.round(opt.trans||0)), slot=dur+trans;
  const transTxt = trans>0 ? ` + ${trans} ${L('min byte','min changeover')}` : '';
  const govTxt = opt.mode==='points'
    ? `${L('styrs av poäng','governed by points')}: ${L('till','to')} ${opt.pointsTo} ${L('poäng','points')} ≈ ${dur} ${L('min/rond','min/round')}${transTxt}`
    : `${L('styrs av tid','governed by time')}: ${dur} ${L('min/rond','min/round')}${transTxt}`;
  const availTxt = availMin>0 ? ` <span class="muted">(${L('speltid','play time')} ${fmtDurationMin(availMin)})</span>` : '';
  const fits=(total)=> availMin<=0 ? '' : (total<=availMin
      ? ` <span class="pill" style="background:#e3f1de;color:var(--green)">✓ ${L('ryms i speltiden','fits the play time')}</span>`
      : ` <span class="pill" style="background:#fbe4e0;color:#c0392b">⚠ ${L('längre än speltiden','longer than play time')} (+${fmtDurationMin(total-availMin)})</span>`);
  const head=`<div class="hint" style="border-color:var(--gold);background:#fbf4df">`;
  if(fmt==="americano"||fmt==="mexicano"||fmt==="kingcourt"){
    const s=amSuggestPlan(fmt, N, C, availMin, slot); if(!s) return '';
    const total=s.rounds*slot, gamesEach=Math.round(s.rounds*s.ppr/Math.max(1,N)), perPlayer=gamesEach*dur;
    const blockNote = (fmt==="americano" && s.block>1) ? ` <span class="muted">(${L('multipel av','multiple of')} ${s.block} → ${L('lika antal matcher','equal games')})</span>` : '';
    return `${head}<b>🧮 ${L('Förslag','Suggestion')} · ${matchFormat(fmt).name}</b>${availTxt}
      <ul class="small" style="margin:8px 0 0;padding-left:18px">
        <li>${N} ${L('deltagare','players')} · ${C} ${C==1?L('bana','court'):L('banor','courts')} · ${govTxt}</li>
        <li>${L('Ryms','Fits')}: <b>${s.rounds}</b> ${L('ronder','rounds')} × <b>${dur}</b> ${L('min/rond','min/round')}${blockNote}</li>
        <li>${s.ppr/4} ${L('matcher per rond','matches per round')}${s.rest>0?` · ${s.rest} ${L('vilar varje rond','rest each round')}`:''} · ${L('speltid/deltagare','play/player')} ≈ <b>${fmtDurationMin(perPlayer)}</b></li>
        <li>${L('Total speltid','Total play time')}: <b>${fmtDurationMin(total)}</b>${fits(total)}</li>
      </ul>
      <p class="small muted" style="margin:8px 0 0">${L('Val, ronder, rondlängd och byte förifylls i turneringen och kan ändras där.','The choice, rounds, round length and changeover are prefilled into the tournament and can be changed there.')}</p></div>`;
  }
  if(fmt==="compass"){
    const s=amSuggestPlan(fmt, N, C, availMin, slot), total=s.rounds*slot;
    return `${head}<b>🧮 ${L('Förslag','Suggestion')} · ${matchFormat(fmt).name}</b>${availTxt}
      <ul class="small" style="margin:8px 0 0;padding-left:18px">
        <li>${N} ${L('deltagare','players')} · ${C} ${C==1?L('bana','court'):L('banor','courts')} · ${L('ca','approx')} <b>${s.rounds}</b> ${L('spelomgångar','play-rounds')} × ${dur} ${L('min','min')} (${govTxt})</li>
        <li>${L('Öst är huvudlottning; förlorare spelar vidare i Väst/Nord/Syd.','East is the main draw; losers continue in West/North/South.')}</li>
        <li>${L('Total speltid','Total play time')}: <b>${fmtDurationMin(total)}</b>${fits(total)}</li>
      </ul></div>`;
  }
  // classic
  const e=(N>=2)?matchFormat("classic").est(N,C):null;
  const total=e?e.totalMin:0;
  return `${head}<b>🧮 ${L('Förslag','Suggestion')} · ${matchFormat("classic").name}</b>${availTxt}
    <ul class="small" style="margin:8px 0 0;padding-left:18px">
      <li>${N} ${L('deltagare','players')} · ${L('utslagsspel (cup)','single elimination')}</li>
      <li>${L('Uppskattad speltid','Estimated play time')}: <b>${e?fmtDurationMin(total):'–'}</b>${e?fits(total):''}</li>
    </ul>
    <p class="small muted" style="margin:8px 0 0">${L('Klassisk KM planeras klass för klass inne i turneringen.','Classic KM is planned class by class inside the tournament.')}</p></div>`;
}

async function deleteTournamentFromHome(key, name){
  if(!isAdmin() || !cloudEnabled) return;
  let list=[]; try{ list=await cloudListTournaments(); }catch(e){ alert(L("Kunde inte läsa turneringslistan","Could not read tournament list")+": "+(e.message||e)); return; }
  const row=list.find(x=>x.key===key);
  if(row && row.archived){ alert(L("Arkiverade turneringar kan inte tas bort härifrån. Öppna turneringen, lås upp den och ta bort den därifrån.","Archived tournaments can't be deleted here. Open it, unlock it, and delete from there.")); return; }
  if(list.length<=1){ alert(L("Det går inte att ta bort den enda turneringen. Skapa en ny först.","Can't delete the only tournament. Create a new one first.")); return; }
  const nm=name||(row&&row.name)||key;
  // Kräver DEN AKTUELLA turneringens PIN (eller MasterAdmin-koden).
  let targetPin=adminPin();
  if(key!==TOURN_KEY){ try{ const d=await cloudGetKey(key); if(d && typeof d.adminPin==="string" && d.adminPin.trim()) targetPin=d.adminPin.trim(); else targetPin=ADMIN_PIN; }catch(e){ targetPin=ADMIN_PIN; } }
  const pin=prompt(`${L('Ta bort turneringen','Delete the tournament')} "${nm}" ${L('permanent ur molnet? Detta kan INTE ångras. Ange admin-koden (PIN) för att bekräfta:','permanently from the cloud? This canNOT be undone. Enter the admin code (PIN) to confirm:')}`);
  if(pin==null) return;
  if(!pinOK(pin, targetPin)){ alert(L("Fel admin-kod – avbryter.","Wrong admin code – aborting.")); return; }
  let deleted=[];
  try{
    const r=await fetch(`${SUPA_URL}/tournaments?key=eq.${encodeURIComponent(key)}`, { method:"DELETE", headers: cloudHeaders({ Prefer:"return=representation" }) });
    if(!r.ok){ const b=await r.text().catch(()=>""); throw new Error("HTTP "+r.status+" "+b.slice(0,140)); }
    try{ deleted=await r.json(); }catch(e){ deleted=[]; }
  }catch(e){ alert(L("Kunde inte ta bort i molnet","Could not delete in the cloud")+": "+(e.message||e)); return; }
  if(Array.isArray(deleted) && deleted.length===0){
    alert(L("Turneringen kunde inte tas bort – servern nekade (0 rader togs bort). Kontrollera DELETE-behörighet (RLS).","Could not delete – server refused (0 rows). Check DELETE permission (RLS).")); return;
  }
  try{ localStorage.removeItem("km_"+key); }catch(e){}
  // Tog vi bort den AKTIVA turneringen? Peka om till en kvarvarande så appen inte pekar på en raderad rad.
  if(key===TOURN_KEY){
    const other=list.find(x=>x.key!==key);
    const nk=(other&&other.key)||DEFAULT_TOURN_KEY;
    localStorage.setItem("km_current_tourn", nk); TOURN_KEY=nk; updateTournURL();
    try{ const d=await cloudGet(); state=d?normalize(d):newState(); }catch(e){ state=newState(); }
    saveLocal(); ensureDay();
  }
  renderHome();   // stanna kvar på startsidan och uppdatera listan
}
// Hämta en specifik turnerings data ur molnet (för kopiering).
async function cloudGetKey(key){
  const r=await fetch(`${SUPA_URL}/tournaments?key=eq.${encodeURIComponent(key)}&select=data`, { headers: cloudHeaders() });
  if(!r.ok) throw new Error("HTTP "+r.status);
  const rows=await r.json();
  return (Array.isArray(rows)&&rows.length)?rows[0].data:null;
}
// Bygg ett nytt turneringstillstånd; kopiera valfria delar (layout/info/klasser/deltagare) från en källa.
function buildTournamentState(name, src, opts){
  opts=opts||{};
  const s=newState();
  s.tournament.name=name;
  // Namn, arrangör, PIN, format och banantal sätts av formuläret (inte kopierade).
  if(typeof opts.arranger==="string" && opts.arranger.trim()) s.arranger=opts.arranger.trim();
  s.adminPin = (typeof opts.pin==="string" && opts.pin.trim()) ? opts.pin.trim() : "0000";
  if(typeof opts.format==="string" && MATCH_FORMATS.some(f=>f.id===opts.format)) s.format=opts.format;
  // LAYOUT: kopiera eller "tom layout" (vit bakgrund, svart rubriktext, ingen logga).
  if(src && opts.copyLayout){
    if(typeof src.logo==="string"||src.logo===null) s.logo=src.logo;
    if(typeof src.bgColor==="string"||src.bgColor===null) s.bgColor=src.bgColor;
    if(typeof src.headColor==="string"||src.headColor===null) s.headColor=src.headColor;
  } else {
    s.logo=DEFAULT_LOGO; s.bgColor="#ffffff"; s.headColor="#000000";   // standardlogga: tennispokal
  }
  // Datum: nya turneringar startar med dagens datum (start = slut = idag). Admin kan ändra sedan.
  { const t=new Date(), p=n=>String(n).padStart(2,"0"), today=`${t.getFullYear()}-${p(t.getMonth()+1)}-${p(t.getDate())}`;
    s.tournament.start=today; s.tournament.end=today; }
  // TURNERINGSINFORMATION (ej namn/arrangör/PIN/layout).
  if(src && opts.copyInfo){
    if(src.tournament){ s.tournament.start=src.tournament.start||s.tournament.start; s.tournament.end=src.tournament.end||s.tournament.end; }
    if(src.organizer && typeof src.organizer==="object") s.organizer={...src.organizer};
    if(typeof src.chairman==="string") s.chairman=src.chairman;
    if(Array.isArray(src.trainers)) s.trainers=src.trainers.slice();
    if(src.diplomaSigns && typeof src.diplomaSigns==="object") s.diplomaSigns={...src.diplomaSigns};
    if(typeof src.venue==="string") s.venue=src.venue;
    if(src.sched && typeof src.sched==="object") s.sched={...src.sched};
    if(src.courts>0) s.courts=src.courts;
    if(src.lang) s.lang=src.lang;
  }
  // KLASSER (+ ev. DELTAGARE). Deltagare kopieras bara om även klasser kopieras.
  if(src && opts.copyClasses && Array.isArray(src.classes) && src.classes.length){
    s.classes=src.classes.map(c=>({
      id:"c"+uid(), name:c.name, type:c.type,
      ranked:!!c.ranked, seeds:(c.seeds>0?c.seeds:4), catNo:(c.catNo>0?c.catNo:1),
      category:c.category||"", ageLevel:c.ageLevel||"", hidden:!!c.hidden,
      participants:(opts.copyParticipants && Array.isArray(c.participants))?c.participants.slice():[],
      matches:[], champion:null                       // resultat/stegar kopieras aldrig
    }));
  }
  if(opts.courts>0) s.courts=opts.courts;   // angivet banantal vinner (även över kopierad info)
  // Startsidans förslag: förifyll styrning (tid/poäng), rondlängd/poäng, byte och planerat antal ronder.
  if(opts.roundBy==="points"||opts.roundBy==="time") s.amRoundBy=opts.roundBy;
  if(opts.roundMin>0) s.amRoundMin=opts.roundMin;
  if(opts.points>0) s.amPointsTo=opts.points;
  if(opts.minPerPoint>0) s.amMinPerPoint=opts.minPerPoint;
  if(opts.transMin>=0) s.amTransMin=opts.transMin;
  if(opts.planHours>0) s.amPlanHours=opts.planHours;
  if(opts.planRounds>0) s.amPlanRounds=opts.planRounds;
  s.createdAt=Date.now();   // tidsstämpel för när turneringen skapades
  return normalize(s);
}

// Får användas även från publik startsida (kopia kräver källans PIN).
async function createTournamentAdvanced(name, srcKey, opts){
  name=(name||"").trim();
  if(!name){ alert(L("Ange ett namn på turneringen.","Enter a tournament name.")); return; }
  opts=opts||{};
  if(isAdmin()) await cloudForcePush();                // spara pågående turnering först (om admin)
  let src=null;
  const wantsCopy = srcKey && (opts.copyLayout||opts.copyInfo||opts.copyClasses||opts.copyParticipants);
  if(wantsCopy && cloudEnabled){
    try{ src=await cloudGetKey(srcKey); }catch(e){ alert(L("Kunde inte läsa källturneringen","Could not read the source tournament")+": "+(e.message||e)); return; }
    // OBS: normalisera INTE källan – det skulle trigga engångsmigreringen som lägger till standardklasser.
    if(!src){ alert(L("Källturneringen hittades inte i molnet.","The source tournament was not found in the cloud.")); return; }
    // Kopiering från en (ev. arkiverad) turnering kräver KÄLLTURNERINGENS PIN-kod.
    const srcPin = (typeof src.adminPin==="string" && src.adminPin.trim()) ? src.adminPin.trim() : ADMIN_PIN;
    const srcName = (src.tournament && src.tournament.name) || srcKey;
    const entered = prompt(L(`Kopiera från "${srcName}" kräver den turneringens admin-PIN. Ange PIN:`,`Copying from "${srcName}" requires that tournament's admin PIN. Enter PIN:`));
    if(entered==null) return;
    if(!pinOK(entered, srcPin)){ alert(L("Fel PIN för källturneringen – kopiering avbruten.","Wrong PIN for the source tournament – copy aborted.")); return; }
  }
  const st=buildTournamentState(name, src, opts);
  const key=(fileSafe(name).toLowerCase()||"turnering")+"-"+Date.now().toString(36);
  setAdminFlag(true);                                  // den nya turneringen öppnas i adminläge
  localStorage.setItem("km_current_tourn", key); TOURN_KEY=key; updateTournURL();
  state=st; state.updatedAt=Date.now();
  saveLocal();
  ui={ tab:"info", classId: state.classes[0].id, day:null }; ensureDay();
  if(cloudEnabled){ try{ cloudSetStatus("saving"); await cloudPut(state); cloudLastSync=Date.now(); cloudSetStatus("ok"); }catch(e){ cloudSetStatus("offline"); } }
  render();
}

/* ===================== Americano ===================== */
function amEnsure(){ if(!Array.isArray(state.players)) state.players=[]; if(!(state.amPointsTo>0)) state.amPointsTo=24; if(!Array.isArray(state.amRounds)) state.amRounds=[]; }
// Ställning: summera poäng per spelare över alla spelade matcher.
function amStandings(){
  amEnsure();
  const st=state.players.map((name,i)=>({i,name,pts:0,pf:0,pa:0,games:0,wins:0}));
  for(const rd of state.amRounds) for(const mt of (rd.matches||[])){
    if(mt.s1==null||mt.s2==null) continue;
    const s1=+mt.s1||0, s2=+mt.s2||0;
    for(const pi of mt.a){ const o=st[pi]; if(o){ o.pts+=s1; o.pf+=s1; o.pa+=s2; o.games++; if(s1>s2)o.wins++; } }
    for(const pi of mt.b){ const o=st[pi]; if(o){ o.pts+=s2; o.pf+=s2; o.pa+=s1; o.games++; if(s2>s1)o.wins++; } }
  }
  st.sort((a,b)=> b.pts-a.pts || (b.pf-b.pa)-(a.pf-a.pa) || b.wins-a.wins || a.name.localeCompare(b.name,"sv"));
  return st;
}
// Ställning per PAR (par = deltagare 1&2, 3&4, …).
function amPairStandings(){
  amEnsure();
  const N=state.players.length, P=Math.floor(N/2), st=[];
  for(let k=0;k<P;k++) st.push({k, name:(state.players[2*k]||'?')+" & "+(state.players[2*k+1]||'?'), pts:0,pf:0,pa:0,games:0,wins:0});
  for(const rd of state.amRounds) for(const mt of (rd.matches||[])){
    if(mt.s1==null||mt.s2==null) continue;
    const s1=+mt.s1||0,s2=+mt.s2||0, kA=Math.floor(mt.a[0]/2), kB=Math.floor(mt.b[0]/2);
    if(st[kA]){ st[kA].pts+=s1; st[kA].pf+=s1; st[kA].pa+=s2; st[kA].games++; if(s1>s2)st[kA].wins++; }
    if(st[kB]){ st[kB].pts+=s2; st[kB].pf+=s2; st[kB].pa+=s1; st[kB].games++; if(s2>s1)st[kB].wins++; }
  }
  st.sort((a,b)=>b.pts-a.pts||(b.pf-b.pa)-(a.pf-a.pa)||b.wins-a.wins||a.k-b.k);
  return st;
}
// Par-schema: fasta par (1&2, 3&4 …) spelar mot varandra (round-robin), begränsat av banor.
function amGeneratePairs(numRounds, courts){
  const N=state.players.length, P=Math.floor(N/2);
  if(P<2) return false;
  const C=Math.max(1,courts);
  const all=[]; for(let i=0;i<P;i++) for(let j=i+1;j<P;j++) all.push([i,j]);
  for(let i=all.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [all[i],all[j]]=[all[j],all[i]]; }
  const rounds=[]; let remaining=all; const cap=numRounds>0?numRounds:9999;
  while(remaining.length && rounds.length<cap){
    const used=new Set(), matches=[], leftover=[];
    for(const mu of remaining){
      if(matches.length<C && !used.has(mu[0]) && !used.has(mu[1])){
        used.add(mu[0]); used.add(mu[1]);
        matches.push({ court:matches.length+1, a:[2*mu[0],2*mu[0]+1], b:[2*mu[1],2*mu[1]+1], s1:null, s2:null });
      } else leftover.push(mu);
    }
    if(!matches.length) break;
    const active=new Set(); matches.forEach(m=>m.a.concat(m.b).forEach(i=>active.add(i)));
    rounds.push({ matches, rest:[...Array(N).keys()].filter(i=>!active.has(i)) });
    remaining=leftover;
  }
  state.amRounds=rounds; return true;
}
// --- Americano-hjälpare (enligt americano.html) ---
function amGcd(a,b){ return b?amGcd(b,a%b):a; }
function amActivePerRound(n,c){ return Math.max(4, Math.floor(Math.min(c*4,n)/4)*4); }   // aktiva/rond (multipel av 4)
function amEqualBlock(n,c){ const ppr=amActivePerRound(n,c); return n/amGcd(n,ppr); }     // minsta antal ronder för lika antal matcher
// Kanoniskt schema för 16 spelare / 2 banor / 8 ronder (från americano.html, 1-indexerat).
const AM_SCHED16=[
  {courts:[{t1:[1,4],t2:[6,10]},{t1:[3,12],t2:[8,9]}],   rest:[2,5,7,11,13,14,15,16]},
  {courts:[{t1:[13,16],t2:[14,15]},{t1:[2,5],t2:[7,11]}], rest:[1,3,4,6,8,9,10,12]},
  {courts:[{t1:[1,6],t2:[14,16]},{t1:[4,10],t2:[13,15]}], rest:[2,3,5,7,8,9,11,12]},
  {courts:[{t1:[5,11],t2:[8,12]},{t1:[2,7],t2:[3,9]}],    rest:[1,4,6,10,13,14,15,16]},
  {courts:[{t1:[1,10],t2:[2,11]},{t1:[4,6],t2:[5,7]}],    rest:[3,8,9,12,13,14,15,16]},
  {courts:[{t1:[9,12],t2:[13,14]},{t1:[3,8],t2:[15,16]}], rest:[1,2,4,5,6,7,10,11]},
  {courts:[{t1:[1,12],t2:[3,4]},{t1:[6,8],t2:[9,10]}],    rest:[2,5,7,11,13,14,15,16]},
  {courts:[{t1:[7,15],t2:[11,14]},{t1:[2,13],t2:[5,16]}], rest:[1,3,4,6,8,9,10,12]},
];
// Föreslå antal ronder utifrån deltagare, banor, speltid (min) och tid per rond inkl. byte (slotMin).
// slotMin = rondlängd + byte/uppvärmning mellan ronder.
function amSuggestPlan(fmt, N, C, availMin, slotMin){
  if(N<2) return null;
  slotMin=Math.max(1, Math.round(slotMin||14));
  if(fmt==="compass"){ const rounds=Math.ceil(Math.log2(Math.max(2,N)))+1; return {rounds, slotMin, rest:0, ppr:0, block:1}; }
  const ppr=amActivePerRound(N,C), rest=N-ppr, block=amEqualBlock(N,C);
  let rounds;
  if(availMin>0) rounds=Math.max(block, Math.round((availMin/slotMin)/block)*block);   // snäpp till block → lika antal matcher
  else rounds=Math.max(block, Math.min(N-1, 8));
  return {rounds, slotMin, ppr, rest, block};
}
// Uppskatta total tid + speltid per deltagare utifrån valda inställningar (för formattabellen).
function formatEstimate(id, N, C, opt){
  opt=opt||{};
  if(id==="classic") return matchFormat("classic").est(N,C);
  const dur=Math.max(1, Math.round(opt.dur||12)), slot=dur+Math.max(0, Math.round(opt.trans||0));
  const s=amSuggestPlan(id, N, C, opt.availMin||0, slot); if(!s) return {totalMin:0, perPlayerMin:0};
  const total=s.rounds*slot;
  let per;
  if(id==="compass") per = Math.min(s.rounds, Math.ceil(Math.log2(Math.max(2,N))))*dur;    // ca antal matcher i huvudlottningen
  else { const ppr=amActivePerRound(N,C); per = Math.round(s.rounds*ppr/Math.max(1,N))*dur; }
  return { totalMin: total, perPlayerMin: per };
}
// Formatbeskrivning uppdaterad efter aktuell funktionalitet.
function formatDesc(id){
  switch(id){
    case "americano": return L('Socialt dubbelspel – byt partner varje rond. Välj individuell poäng eller par, och om ronden styrs av tid eller poäng. Leaderboard och matchlappar ingår.','Social doubles – change partner every round. Choose individual or pairs scoring and whether time or points govern the round. Leaderboard and match slips included.');

// Slumphjälpare för "Slumpa nytt schema".
let _amShuffleFirst=false;   // signalerar att nästa rond 1 (dynamiska format) ska lottas slumpmässigt
function amShuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function amShuffledOrder(n){ return amShuffle([...Array(n).keys()]); }
// Generera Americano-schema enligt americano.html: lika antal matcher, rättvis vila, greedy-parning.

function amGenerate(numRounds, courts, randomize){
  amEnsure();
  if(state.amScoreMode==="pairs") return amGeneratePairs(numRounds, courts);
  const N=state.players.length; if(N<4) return false;
  const C=Math.max(1,courts||1);
  const ppr=amActivePerRound(N,C), actualCourts=ppr/4, restPer=N-ppr, block=amEqualBlock(N,C);
  let rounds = numRounds>0 ? numRounds : (restPer<=0 ? Math.max(block, Math.min(N-1,8)) : Math.ceil(4*N/ppr));
  rounds = Math.max(block, Math.round(rounds/block)*block);   // snäpp till block → lika antal matcher för alla
  // Kanoniskt schema för standardfallet 16p/2 banor/8 ronder (ej vid slumpning).
  if(!randomize && N===16 && C===2 && rounds===8){
    state.amRounds=AM_SCHED16.map(r=>({
      matches:r.courts.map((c,ci)=>({court:ci+1, a:c.t1.map(id=>id-1), b:c.t2.map(id=>id-1), s1:null, s2:null})),
      rest:r.rest.map(id=>id-1)
    }));
    return true;
  }
  const partnerCount={}, playCount=Array(N).fill(0);
  const pkey=(a,b)=>a<b?a+"_"+b:b+"_"+a;
  const getPC=(a,b)=>partnerCount[pkey(a,b)]||0, incPC=(a,b)=>{ const k=pkey(a,b); partnerCount[k]=(partnerCount[k]||0)+1; };
  const out=[];
  for(let r=0;r<rounds;r++){
    let active, rest;
    let all=[...Array(N).keys()];
    if(randomize) amShuffle(all);
    if(restPer<=0){ active=all; rest=[]; }
    else { all.sort((a,b)=>playCount[a]-playCount[b] || (randomize?0:a-b)); active=all.slice(0,ppr); rest=all.slice(ppr).sort((a,b)=>a-b); }  // cirkulär vila (minst spelade vilar sist)
    const rem=[...active]; if(randomize) amShuffle(rem);
    const pairs=[];
    while(rem.length>=2){                                        // greedy-parning: minimera upprepade par
      const a=rem.shift(); let bi=0, mc=Infinity;
      for(let i=0;i<rem.length;i++){ const c=getPC(a,rem[i]); if(c<mc || (c===mc && rem[i]<rem[bi])){ mc=c; bi=i; } }
      const b=rem.splice(bi,1)[0]; pairs.push([a,b]);
    }
    for(const [a,b] of pairs) incPC(a,b);
    for(const pl of active) playCount[pl]++;

    for(let c=0;c<actualCourts;c++){ const i=c*2; if(i+1<pairs.length) matches.push({court:c+1, a:pairs[i], b:pairs[i+1], s1:null, s2:null}); }
    out.push({matches, rest});
  }

}
// Har alla matcher i ronden fått resultat?
function amRoundScored(rd){ return !!rd && Array.isArray(rd.matches) && rd.matches.length>0 && rd.matches.every(m=>m.s1!=null && m.s2!=null); }
// Tidssimulering med uppvärmning och pauser.
function amBreaksList(){ return (Array.isArray(state.amBreaks)?state.amBreaks:[]).filter(b=>b&&b.after>0&&b.min>0).sort((a,b)=>a.after-b.after); }
function amBreakMinBefore(round1){ return amBreaksList().filter(b=>b.after<round1).reduce((s,b)=>s+(+b.min||0),0); }   // pauser som ligger före rond nr (1-indexerad)
// Effektiv rondlängd i minuter: styrs av tid (min/rond) eller poäng (poäng × min/poäng).
function amRoundDurationMin(){ return state.amRoundBy==="points" ? Math.max(1, Math.round((state.amPointsTo||21)*(state.amMinPerPoint||0.6))) : Math.max(1, state.amRoundMin||15); }
// Byte/uppvärmning mellan ronder (min).
function amTransMin(){ return Math.max(0, +state.amTransMin||0); }
// Total tid en rond tar (speltid + byte) – används för att placera nästa rond.
function amRoundSlotMin(){ return amRoundDurationMin() + amTransMin(); }
function amRoundStartMin(ri){ const t0=timeToMin(state.amStart); if(t0==null) return null; const w=Math.max(0,+state.amWarmup||0); return t0 + w + ri*amRoundSlotMin() + amBreakMinBefore(ri+1); }
function amRoundEndMin(ri){ const s=amRoundStartMin(ri); return s==null?null:s+amRoundDurationMin(); }   // spelets slut (exkl. bytet efteråt)
// Mexicano: lägg till NÄSTA rond utifrån aktuell ställning (rond 1 = seedningsordning = spellistan).
function mexNextRound(courts){
  amEnsure();
  const N=state.players.length; if(N<4) return false;
  const C=Math.max(1,courts||1);
  const mpr=Math.min(C, Math.floor(N/4));
  const playN=4*mpr, restN=N-playN;
  const restCount=Array(N).fill(0);
  for(const rd of state.amRounds) for(const i of (rd.rest||[])) restCount[i]++;
  const roundNo=state.amRounds.length;
  let order;
  if(roundNo===0) order = _amShuffleFirst ? amShuffledOrder(N) : [...Array(N).keys()];   // rond 1: seedning (eller slumpad)
  else order=amStandings().map(s=>s.i);                        // rankad efter aktuell ställning
  const rank=new Map(order.map((i,pos)=>[i,pos]));
  let resting=[];
  if(restN>0){
    const cand=[...Array(N).keys()].sort((a,b)=> restCount[a]-restCount[b] || rank.get(b)-rank.get(a));
    resting=cand.slice(0,restN);
  }
  const restSet=new Set(resting);
  const playing=order.filter(i=>!restSet.has(i));             // i rankordning
  const matches=[];
  for(let g=0; g+4<=playing.length; g+=4){
    const q=playing.slice(g,g+4);                             // q[0] bäst rankad på banan
    matches.push({ court:matches.length+1, a:[q[0],q[3]], b:[q[1],q[2]], s1:null, s2:null }); // 1&4 mot 2&3
  }
  if(!matches.length) return false;
  state.amRounds.push({ matches, rest:resting });
  return true;
}
// King of the Court: bana 1 = kungsbanan. Lägg till NÄSTA rond – vinnare flyttas upp, förlorare ned.
function kotcTeamPlayers(k){ return [2*k, 2*k+1]; }   // lag/par k = spelare 2k och 2k+1
// King of the Court med robust "stege" (ladder) av lag – tål att antal banor ändras mellan ronder.
function kotcNextRound(courts){
  amEnsure();
  const N=state.players.length, pairsMode=state.amScoreMode==="pairs";
  const P=Math.floor(N/2);                              // antal lag (par)
  const K=Math.min(Math.max(1,courts||1), Math.floor(N/4));
  if(K<1 || P<2) return false;
  const mk=(court,a,b)=>({court, a, b, s1:null, s2:null});
  const compose=(court, top, bot)=> pairsMode
     ? mk(court, top.slice(), bot.slice())                                  // fasta par flyttas hela
     : (function(){ const g=[top[0],top[1],bot[0],bot[1]]; return mk(court,[g[0],g[2]],[g[1],g[3]]); })();  // ny partner varje rond
  // 1) Initiera eller uppdatera stegen (ordnad lista av alla lag, topp → botten).
  if(state.amRounds.length===0 || !Array.isArray(state.kotcLadder) || state.kotcLadder.length!==P){
    let ladder;
    if(pairsMode){ const ord=_amShuffleFirst?amShuffledOrder(P):[...Array(P).keys()]; ladder=ord.map(k=>kotcTeamPlayers(k)); }
    else { const pl=_amShuffleFirst?amShuffledOrder(N):[...Array(N).keys()]; ladder=[]; for(let k=0;k<P;k++) ladder.push([pl[2*k],pl[2*k+1]]); }
    state.kotcLadder=ladder;
    if(state.amRounds.length>0 && state.kotcLadder.length===P){ /* spelarantal ändrat → stegen byggd om */ }
  } else {
    const prev=state.amRounds[state.amRounds.length-1];
    if(!amRoundScored(prev)) return false;
    const wl=[];                                        // {w,l} per bana i banordning
    prev.matches.slice().sort((a,b)=>a.court-b.court).forEach(mt=>{
      const aWon=(+mt.s1||0)>=(+mt.s2||0);
      wl.push({ w:(aWon?mt.a:mt.b).slice(), l:(aWon?mt.b:mt.a).slice() });
    });
    const Kp=wl.length, rest=state.kotcLadder.slice(2*Kp);   // lag som vilade
    const nl=[];
    nl.push(wl[0].w);                                   // kungsbanans vinnare stannar överst
    for(let c=1;c<Kp;c++){ nl.push(wl[c].w); nl.push(wl[c-1].l); }   // vinnare upp, förlorare ned
    rest.forEach(t=>nl.push(t));                        // vilande lag rycker upp (ett kommer in på understa banan)
    nl.push(wl[Kp-1].l);                                // understa banans förlorare hamnar sist (vilar)
    state.kotcLadder=nl;
  }
  // 2) Skapa ronden: topp 2K lag i stegen fördelas på K banor (2 lag/bana), resten vilar.
  const lad=state.kotcLadder, matches=[];
  for(let c=1;c<=K;c++){ const ti=2*(c-1); if(ti+1>=lad.length) break; matches.push(compose(c, lad[ti], lad[ti+1])); }
  if(!matches.length) return false;
  state.amRounds.push({ matches, rest: lad.slice(2*matches.length).flat() });
  return true;
}
/* ---- Kompasslottning (compass draw): Öst = huvudlottning, förlorare matas till Väst/Nord/Syd ---- */
function cmpDrawLabel(d){ return {east:L('Öst','East'),west:L('Väst','West'),north:L('Nord','North'),south:L('Syd','South')}[d]||d; }
function cmpSideOf(ci){ return state.amScoreMode==='pairs' ? [2*ci,2*ci+1] : [ci]; }
function cmpCompOf(side){ return state.amScoreMode==='pairs' ? Math.floor(side[0]/2) : side[0]; }
function cmpCompName(ci){ return state.amScoreMode==='pairs' ? (state.players[2*ci]||'?')+' & '+(state.players[2*ci+1]||'?') : (state.players[ci]||'?'); }
function compassNumComps(){ const N=state.players.length; return state.amScoreMode==='pairs'?Math.floor(N/2):N; }
function compassFeed(draw, round){
  if(draw==='east'&&round===1) return 'west';   // förlorare i Öst rond 1 → Väst
  if(draw==='east'&&round===2) return 'north';  // förlorare i Öst rond 2 → Nord
  if(draw==='west'&&round===1) return 'south';  // förlorare i Väst rond 1 → Syd
  return null;                                   // övriga slås ut
}
function compassEnsure(){
  if(!state.cmp){
    const n=compassNumComps();
    const seed=_amShuffleFirst?amShuffledOrder(n):[...Array(n).keys()];   // Öst-lottningens startordning (ev. slumpad)
    state.cmp={ draws:{ east:{waiting:seed,round:0}, west:{waiting:[],round:0}, north:{waiting:[],round:0}, south:{waiting:[],round:0} }, processed:0, done:false };
  }
}
function compassProcessRound(rd){
  for(const mt of rd.matches){
    if(mt.s1==null||mt.s2==null) continue;
    const aWon=(+mt.s1||0)>=(+mt.s2||0);
    const wComp=cmpCompOf(aWon?mt.a:mt.b), lComp=cmpCompOf(aWon?mt.b:mt.a);
    state.cmp.draws[mt.draw].waiting.push(wComp);
    const dest=compassFeed(mt.draw, mt.round);
    if(dest) state.cmp.draws[dest].waiting.push(lComp);
  }
}
function compassBuildRound(){
  const matches=[];
  for(const d of ['east','west','north','south']){
    const dr=state.cmp.draws[d];
    if(dr.waiting.length<2) continue;
    const round=dr.round+1; dr.round=round;
    let list=dr.waiting.slice(), bye=null;
    if(list.length%2===1) bye=list.shift();            // toppseed får frilott
    for(let i=0;i+1<list.length;i+=2)
      matches.push({ court:cmpDrawLabel(d)+' R'+round, draw:d, round, a:cmpSideOf(list[i]), b:cmpSideOf(list[i+1]), s1:null, s2:null });
    dr.waiting = bye!=null?[bye]:[];                    // frilottad går vidare, spelande ligger nu i matcher
  }
  return matches;
}
function compassNextRound(){
  amEnsure(); compassEnsure();
  if(state.cmp.processed<state.amRounds.length){
    const rd=state.amRounds[state.amRounds.length-1];
    if(!amRoundScored(rd)) return false;
    compassProcessRound(rd);
    state.cmp.processed=state.amRounds.length;
  }
  const matches=compassBuildRound();
  if(!matches.length){ if(state.amRounds.length) state.cmp.done=true; return false; }
  state.amRounds.push({ matches, rest:[] });
  return true;
}

// Generera nästa rond (rond-baserade format) – delad av Inställningar/Spelschema/Resultat.
function amGenerateNextRound(){
  const isCompass=state.format==="compass", isKotC=state.format==="kingcourt", pairsMode=state.amScoreMode==="pairs";
  const comps=pairsMode?Math.floor(state.players.length/2):state.players.length, minComps=isCompass?2:(pairsMode?2:4);
  if(comps<minComps){ alert(L("För få deltagare för detta format.","Too few players for this format.")); return; }
  let ok;
  if(isCompass) ok=compassNextRound();
  else if(isKotC) ok=kotcNextRound(state.courts);
  else ok=mexNextRound(state.courts);
  if(!ok){ if(isCompass && state.cmp && state.cmp.done){ save(); render(); return; } alert(L("Kunde inte skapa ronden.","Could not create the round.")); return; }
  save(); render();
}
// Slumpa fram ett nytt schema: hela schemat (fullschema-format) eller ny rond 1 (dynamiska format).
function amReshuffle(){
  const N=state.players.length, pairsMode=state.amScoreMode==="pairs";
  const isCompass=state.format==="compass", isKotC=state.format==="kingcourt", isMex=state.format==="mexicano";
  const roundByRound=(isMex && !pairsMode) || isKotC || isCompass;
  const comps=pairsMode?Math.floor(N/2):N, minComps=isCompass?2:(pairsMode?2:4);
  if(comps<minComps){ alert(L("För få deltagare för detta format.","Too few players for this format.")); return; }
  if(state.amRounds.length && !confirm(roundByRound
      ? L("Slumpa en ny rond 1? Nuvarande schema och alla resultat ersätts.","Draw a new round 1? The current schedule and all results are replaced.")
      : L("Slumpa ett nytt schema? Nuvarande schema och alla resultat ersätts.","Draw a new schedule? The current schedule and all results are replaced."))) return;
  if(roundByRound){
    state.amRounds=[]; state.cmp=null; state.kotcLadder=[];
    _amShuffleFirst=true;
    let ok; try{ ok = isCompass?compassNextRound() : isKotC?kotcNextRound(state.courts) : mexNextRound(state.courts); } finally { _amShuffleFirst=false; }
    if(!ok){ alert(L("Kunde inte skapa ronden.","Could not create the round.")); return; }
  } else {
    const nr = state.amRounds.length || state.amPlanRounds || Math.max(1, N-1);
    if(pairsMode) amGeneratePairs(nr, state.courts); else amGenerate(nr, state.courts, true);
  }
  save(); render();
}

      li(L('Vinnare = flest poäng totalt.','Winner = most points overall.'))

      li(L('Vinnande lag <b>flyttas upp</b> mot kungsbanan, förlorande lag <b>flyttas ned</b>.','Winning teams <b>move up</b> toward the king court, losing teams <b>move down</b>.')),
      li(L('Finns fler deltagare än platser roterar det: understa banans förlorare går till en <b>vilokö</b> och ett vilande lag kommer in underifrån.','With more players than slots it rotates: the bottom court’s loser goes to a <b>waiting queue</b> and a resting team enters from the bottom.')),
      li(L('Individuellt läge: ny partner varje rond. Parläge: fasta par flyttas hela.','Individual mode: new partner each round. Pairs mode: fixed pairs move as a unit.'))
    ]);
    case "compass": return wrap([
      li(L('Utslagsspel med sidolottningar. <b>Öst</b> är huvudlottningen.','Knockout with side draws. <b>East</b> is the main draw.')),
      li(L('Förlorare i Öst rond 1 flyttas till <b>Väst</b>, i rond 2 till <b>Nord</b>. Förlorare i Väst rond 1 flyttas till <b>Syd</b>.','East round 1 losers move to <b>West</b>, round 2 losers to <b>North</b>. West round 1 losers move to <b>South</b>.')),
      li(L('Så får alla flera matcher. En vinnare koras per lottning (Öst = huvudvinnare).','So everyone gets several matches. A winner is crowned per draw (East = main winner).')),
      li(L('Nästa spelomgång genereras efter att resultaten registrerats.','The next play-round is generated after the results are entered.'))
    ]);
    default: return wrap([li(L('Utslagsturnering (cupspel) med seedning, stegar och klubbmästare.','Single-elimination cup with seeding, brackets and club champions.'))]);
  }
}
