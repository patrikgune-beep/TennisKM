<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Klubbmästerskap – Dalarö Tennisklubb</title>
<style>
  :root{
    --cream:#f4f1e6;
    --paper:#fbf9f1;
    --red:#b5362b;
    --red-dark:#8f2a21;
    --head:#b5362b;
    --sky:#84b6d6;
    --green:#3f6b39;
    --ink:#26211c;
    --line:#d8d1bd;
    --gold:#c9a227;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:"Segoe UI",Arial,Helvetica,sans-serif;
    background:var(--cream);
    color:var(--ink);
    line-height:1.4;
  }
  header.app{
    background:var(--paper);
    border-bottom:4px solid var(--red);
    display:flex;align-items:center;gap:18px;
    padding:14px 22px;
    position:sticky;top:0;z-index:30;
  }
  header.app .logo{width:64px;height:64px;flex:0 0 auto}
  header.app h1{
    margin:0;font-size:22px;letter-spacing:.5px;
    font-family:"Arial Narrow",Arial,sans-serif;text-transform:uppercase;
    color:var(--head);
  }
  header.app .sub{margin:0;font-size:12px;color:#6b6356;text-transform:uppercase;letter-spacing:2px}
  header.app .spacer{flex:1}
  .tabs{display:flex;gap:4px;flex-wrap:wrap}
  .tabs button{
    border:none;background:transparent;padding:10px 16px;cursor:pointer;
    font-size:14px;font-weight:600;color:#6b6356;border-radius:8px 8px 0 0;
  }
  .tabs button.active{background:var(--red);color:#fff}
  .tabs button:hover:not(.active){background:#eee5cf}
  main{max-width:1280px;margin:0 auto;padding:20px}
  .toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
  button.btn{
    background:var(--red);color:#fff;border:none;border-radius:7px;
    padding:9px 14px;font-size:13px;font-weight:600;cursor:pointer;
  }
  button.btn:hover{background:var(--red-dark)}
  button.btn.ghost{background:#fff;color:var(--red);border:1.5px solid var(--red)}
  button.btn.ghost:hover{background:#f7ece2}
  button.btn.mini{padding:4px 9px;font-size:12px}
  button.btn.gray{background:#776f60}
  button.btn.gray:hover{background:#5f584c}
  select,input,textarea{font-family:inherit;font-size:13px}
  select,input[type=text]{padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff}
  textarea{width:100%;min-height:160px;padding:10px;border:1px solid var(--line);border-radius:8px;resize:vertical;background:#fff}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:16px}
  .card h2{margin:0 0 10px;font-size:17px;color:var(--head)}
  .grid-classes{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
  .classcard{background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;transition:.15s}
  .classcard:hover{border-color:var(--red);box-shadow:0 3px 10px rgba(0,0,0,.07)}
  .classcard.active{border-color:var(--red);box-shadow:0 0 0 2px var(--red) inset}
  .classcard .ttl{font-weight:700;font-size:14px}
  .classcard .meta{font-size:12px;color:#6b6356;margin-top:4px}
  .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .badge.youth{background:#e7f0f6;color:#2c6285}
  .badge.adult{background:#f6e9e0;color:var(--red)}
  .badge.done{background:#e3f1de;color:var(--green)}
  /* Bracket – absolut balanserat träd */
  .bracketwrap{overflow-x:auto;padding:6px 4px 20px}
  .bracket{position:relative}
  .bracket .rhead{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#6b6356;text-align:center;font-weight:700}
  .match{
    background:#fff;border:1px solid var(--line);border-radius:9px;
    position:absolute;z-index:1;box-sizing:border-box;
  }
  .match.champbox{border:none;background:transparent}
  .match .slot.swapsel{background:#fff3bf;outline:2px solid #f0a500;border-radius:5px}
  .match.moveable{cursor:pointer}
  .match.moveable:hover{outline:2px dashed #2f80c9}
  .match.movesel{outline:3px solid #2f80c9;background:#eaf4fc}
  .match.numtarget{cursor:pointer}
  .match.numtarget:hover{outline:2px dashed #8e44ad}
  .match.numsel{outline:3px solid #8e44ad;background:#f6eefc}
  /* Färdigspelade matcher (vinnare registrerad) tonas ned så ospelade matcher framträder. */
  .match.played{opacity:.5}
  .match.played:hover{opacity:1}
  .mtile.played{opacity:.55}
  .mtile.played:hover{opacity:1}
  .mno{display:inline-block;font-size:10px;font-weight:700;color:#fff;background:#6b6356;border-radius:4px;padding:0 5px;margin-right:5px;letter-spacing:.5px}
  .match .slot{display:flex;align-items:center;gap:6px;padding:7px 9px;border-bottom:1px dashed var(--line)}
  .match .slot:last-of-type{border-bottom:none}
  .match .slot .nm{flex:1;font-size:13px;cursor:pointer;border-radius:5px;padding:2px 4px}
  .match .slot .nm:hover{background:#f3eada}
  .match .slot.win .nm{font-weight:800;color:var(--green)}
  .match .slot.bye .nm{color:#b3aa98;font-style:italic}
  .match .slot.tbd .nm{color:#b3aa98;font-style:italic}
  .match .scorerow{display:flex;gap:6px;padding:6px 9px;background:#faf6ec;border-top:1px solid var(--line);align-items:center}
  .match .scorerow input{flex:1;min-width:0}
  .match .scorerow .winsel{flex:1;min-width:0;max-width:46%;border:1px solid var(--gold);border-radius:5px;background:#fff;font-weight:600}
  .match .sched-tag{font-size:10px;color:#6b6356;padding:2px 9px 6px}
  .champion{background:linear-gradient(#fff,#fbf4df);border:2px solid var(--gold);text-align:center;padding:14px;border-radius:10px}
  .champion .lbl{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--gold)}
  .champion .who{font-size:18px;font-weight:800;margin-top:4px}
  /* Schedule */
  .daybar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .daybar button{border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:13px;text-align:center;line-height:1.2}
  .daybar button.active{background:var(--red);color:#fff;border-color:var(--red)}
  .daybar button .dow{display:block;font-weight:700}
  .daybar button .dt{display:block;font-size:11px;opacity:.8}
  .daybar button .cnt{display:block;font-size:10px;margin-top:2px;color:var(--gold)}
  .schedtable{width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .schedtable th,.schedtable td{border:1px solid var(--line);padding:6px;vertical-align:top;font-size:12px}
  .schedtable th{background:var(--red);color:#fff;font-size:12px}
  .schedtable td.time{background:#faf6ec;font-weight:700;white-space:nowrap;text-align:center}
  .schedtable td.lunch{background:#f0eada;text-align:center;color:#8f8775}
  .slotcell{min-height:34px}
  .mtile{background:var(--paper);border:1px solid var(--line);border-left:5px solid var(--red);border-radius:6px;padding:5px 7px;margin-bottom:4px}
  .mtile.conflict{background:#fde9e9;box-shadow:inset 0 0 0 2px #d11}
  .mtile .conflictmsg{color:#b5362b;font-size:10px;font-weight:600;margin:3px 0 2px;line-height:1.35}
  .mtile .conflictmsg span{display:block}
  .mtile .softreq{color:#a56a00;font-size:10px;font-weight:600;margin:2px 0;line-height:1.3}
  .mtile .cls{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#6b6356;display:flex;align-items:center;gap:4px}
  .mtile .cls .stage{margin-left:auto;font-weight:700;color:#8a8270;white-space:nowrap;display:flex;align-items:center;gap:3px}
  .mtile .cls .stage .cup{font-size:12px}
  .mtile.locked{opacity:.92}
  .mtile.locked .lockmark{color:#b5362b;font-weight:700}
  .unschedgroup{width:100%}
  .unschedgroup .ghead{font-size:12px;font-weight:700;color:#26211c;margin:10px 0 6px;display:flex;align-items:center;gap:6px}
  .unschedgroup .ghead .sw{width:12px;height:12px;border-radius:3px;display:inline-block}
  .unschedgroup .items{display:flex;flex-wrap:wrap;gap:8px}
  .mtile .cdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .schedtable td.pausrow{background:#efe9db;color:#8a8270;text-align:center;font-size:11px;font-style:italic}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin:0 0 12px;padding:10px 12px;background:var(--paper);border:1px solid var(--line);border-radius:8px}
  .legend .item{display:flex;align-items:center;gap:6px;font-size:12px}
  .legend .sw{width:13px;height:13px;border-radius:3px;display:inline-block;flex:0 0 auto}
  .classcard .sw{width:12px;height:12px;border-radius:3px;display:inline-block;vertical-align:middle;margin-right:5px}
  .mtile .vs{font-size:12px;font-weight:600;margin:2px 0}
  .mtile .ctrls{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
  .mtile select{font-size:11px;padding:2px 3px}
  .unsched{display:flex;flex-wrap:wrap;gap:8px}
  .empty{color:#8a8270}
  .hint{font-size:12px;color:#6b6356;background:#faf6ec;border:1px dashed var(--line);border-radius:8px;padding:10px 12px;margin-bottom:14px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{font-size:11px;background:#eee5cf;border-radius:20px;padding:2px 9px}
  table.results{width:100%;border-collapse:collapse;background:#fff}
  table.results th,table.results td{border:1px solid var(--line);padding:7px 9px;font-size:13px;text-align:left}
  table.results th{background:#faf6ec}
  .muted{color:#8a8270}
  .small{font-size:12px}
  /* print */
  #printArea{display:none}
  .brpage{position:relative;overflow:hidden;background:#fff}
  /* Publik läsvy: dölj all redigering (admin-delen) */
  body.public .adminonly{ display:none !important; }
  body.public .mtile .ctrls{ display:none !important; }
  body.public .mtile .conflictmsg, body.public .mtile .softreq{ display:none !important; }
  body:not(.public) .publiconly{ display:none !important; }
  @page land{ size:A4 landscape; margin:6mm }
  @media print{
    header.app,.tabs,.toolbar,.daybar,#app,.no-print{display:none !important}
    html,body{background:#fff !important}
    #printArea{display:block;padding:0;background:#fff}
    #printArea h1{color:#000}
    .mtile .ctrls{display:none}
    /* Stege som träd: en liggande A4 per klass */
    .brpage{width:1040px;height:730px;page:land;break-after:page;page-break-after:always}
    .brpage:last-child{break-after:auto;page-break-after:auto}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  }
</style>
</head>
<body>
<header class="app">
  <div class="logo" id="logoHolder"></div>
  <div>
    <h1 id="appTitle">Klubbmästerskap</h1>
    <p class="sub" id="appSub">Dalarö Tennisklubb</p>
  </div>
  <div class="spacer"></div>
  <button id="adminBtn" class="btn ghost mini no-print" style="white-space:nowrap"></button>
  <div class="sync-badge no-print js-sync" id="syncBadge" style="font-size:12px;opacity:.95;white-space:nowrap"></div>
  <div class="tabs" id="tabs"></div>
</header>

<main>
  <input type="file" id="importFile" accept="application/json" style="display:none" />
  <div id="app"></div>
</main>

<div id="printArea"></div>

<script>
/* =========================================================
   Dalarö Tennisklubb – Klubbmästerskap. Lokal app (localStorage).
   ========================================================= */

// Delad nyckel för denna app-instans (unik per app). Styr både molnraden (Supabase)
// och de lokala lagringsnycklarna, så två appar på samma domän aldrig delar data.
// TOURN_KEY är numera VALBAR: varje turnering är en egen rad i molnet med sin egen nyckel.
// Aktiv turnering minns per enhet i localStorage ("km_current_tourn").
const DEFAULT_TOURN_KEY = "TennisAppen";     // grundturnering om inget annat valts
// Läs turneringsnyckel ur adressen: ?t=nyckel (stöder även #t=nyckel för delade hash-länkar).
function tournKeyFromURL(){
  try{
    const u=new URL(location.href);
    const q=u.searchParams.get("t"); if(q) return q;
    const m=(u.hash||"").match(/[#&]t=([^&]+)/); if(m) return decodeURIComponent(m[1]);
  }catch(e){}
  return null;
}
function currentTournKey(){
  const fromUrl=tournKeyFromURL();
  if(fromUrl){ try{ localStorage.setItem("km_current_tourn", fromUrl); }catch(e){} return fromUrl; }
  try{ return localStorage.getItem("km_current_tourn") || DEFAULT_TOURN_KEY; }catch(e){ return DEFAULT_TOURN_KEY; }
}
let TOURN_KEY   = currentTournKey();         // aktiv turnering (byts i Turneringsinformation / via ?t=)
// Delbar länk till aktiv turnering, och synka adressfältet så den alltid speglar vald turnering.
function tournShareURL(){ try{ const u=new URL(location.href); u.searchParams.set("t", TOURN_KEY); return u.href; }catch(e){ return location.href; } }
function updateTournURL(){ try{ const u=new URL(location.href); u.searchParams.set("t", TOURN_KEY); history.replaceState(null, "", u.pathname+u.search+u.hash); }catch(e){} }
function lsKey(){ return "km_" + TOURN_KEY; } // lokal cache – per aktiv turnering
const ADMIN_KEY = "km_admin_" + DEFAULT_TOURN_KEY;   // admin-flagga – per app (gäller alla turneringar)

// --- Turneringsdagar beräknas från turneringens start- och slutdatum ---
const SV_DOW = ["Söndag","Måndag","Tisdag","Onsdag","Torsdag","Fredag","Lördag"];
const SV_MON = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
function parseDate(s){ if(!s) return null; const [y,m,d]=s.split("-").map(Number); const dt=new Date(y,m-1,d); return isNaN(dt)?null:dt; }
function isoDate(dt){ return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0"); }
function fmtShort(dt){ return dt.getDate()+" "+SV_MON[dt.getMonth()]; }
function defaultTournament(){ const y=new Date().getFullYear(); return {name:"Klubbmästerskap", start:`${y}-07-04`, end:`${y}-07-11`}; }
// Lista över turneringens dagar {date, dow, short}
function getDays(){
  const t=state.tournament||{};
  const start=parseDate(t.start), end=parseDate(t.end);
  const out=[];
  if(!start||!end||end<start) return out;
  let cur=new Date(start), guard=0;
  while(cur<=end && guard++<120){
    out.push({date:isoDate(cur), dow:SV_DOW[cur.getDay()], short:fmtShort(cur)});
    cur.setDate(cur.getDate()+1);
  }
  return out;
}
function adultFinalDay(){ const d=getDays(); return d.length?d[d.length-1].date:null; }            // sista dagen
function youthFinalDay(){ const d=getDays(); return d.length>1?d[d.length-2].date:(d[0]?d[0].date:null); } // näst sista dagen
function tournamentYear(){ const d=getDays(); return d.length?parseDate(d[0].date).getFullYear():""; }
// Arrangör (visas i rubriken och på utskrifter). Ändras under Turneringsinformation.
function arrangerName(){ return (state.arranger||"").trim() || "Dalarö Tennisklubb"; }
function tournamentRangeText(){
  const d=getDays(); if(!d.length) return "datum ej satt";
  const a=parseDate(d[0].date), b=parseDate(d[d.length-1].date);
  return `${a.getDate()} ${SV_MON[a.getMonth()]} – ${b.getDate()} ${SV_MON[b.getMonth()]} ${b.getFullYear()}`;
}

const DEFAULT_CLASSES = [
  {name:"Damsingel",        type:"adult"},
  {name:"Herrsingel",       type:"adult"},
  {name:"Herrdubbel",       type:"adult"},
  {name:"Damdubbel",        type:"adult"},
  {name:"Mixeddubbel",      type:"adult"},
  {name:"Juniorveteran",    type:"adult"},
  {name:"Veteransingel",    type:"adult"},
  {name:"Generationsdubbel",type:"adult"},
  {name:"Pojksingel Äldre", type:"youth"},
  {name:"Flicksingel Äldre",type:"youth"},
  {name:"Juniordubbel",     type:"youth"},
  {name:"Pojksingel Yngre", type:"youth"},
  {name:"Flicksingel Yngre",type:"youth"},
  {name:"Minidubbel",       type:"youth"},
];

/* ---------- Klasser med seedning (endast top 4) ---------- */
const RANKED_CLASSES = new Set(["Herrsingel","Herrdubbel","Mixeddubbel","Juniorveteran"]);
const MAX_SEEDS = 4;

/* ---------- Tidsluckor (minuter från midnatt) ----------
   Ungdom: 30 min/match, vardagar 9–13, paus 30 min efter 3 matcher.
   Senior: 60 min/match, alla dagar 13–21, paus 60 min efter 3 matcher.
   Helg: seniorer spelar dessutom förmiddag 8–11 (3 matcher à 60 min, paus efter tre).
   Lunch 12–13. */
// Standardvärden för schemaläggningen (kan ändras i Turneringsinformation).
function defaultSched(){
  return {
    hasYouth:true, hasSenior:true,
    youthStart:540, youthEnd:780, youthDur:30,        // junior vardag 9–13, 30 min
    seniorStart:780, seniorEnd:1260, seniorDur:60,    // senior vardag 13–21, 60 min
    seniorWeekendStart:540, seniorWeekendEnd:1260,    // senior helg 9–21
    breakEvery:3,                                     // paus efter var N:e match (0 = ingen)
    lunchStart:720, lunchEnd:780,                     // lunch 12–13 (0/0 = ingen)
    breakName:"Hydration Break", lunchName:"Hydration Break"
  };
}
// Aktuell schemakonfig (med standard som reserv innan state finns).
function SC(){ return (typeof state!=="undefined" && state && state.sched) ? state.sched : defaultSched(); }
// Bygg starttider i en zon: matchlängd, paus efter var N:e match, samt ev. lunchlucka.
function buildZoneSlots(startMin, endMin, matchMin, perBreak, breakMin, lunchStart, lunchEnd){
  const out=[]; let t=startMin, c=0, guard=0;
  while(t+matchMin<=endMin && guard++<600){
    if(lunchStart!=null && lunchEnd>lunchStart && t>=lunchStart && t<lunchEnd){ t=lunchEnd; c=0; continue; }
    out.push(t); t+=matchMin;
    if(perBreak>0){ c++; if(c%perBreak===0) t+=breakMin; }   // paus efter var N:e match
  }
  return out;
}
function youthSlots(){ const s=SC(); return buildZoneSlots(s.youthStart,s.youthEnd,s.youthDur,s.breakEvery,s.youthDur,s.lunchStart,s.lunchEnd); }
function seniorWeekdaySlots(){ const s=SC(); return buildZoneSlots(s.seniorStart,s.seniorEnd,s.seniorDur,s.breakEvery,s.seniorDur,s.lunchStart,s.lunchEnd); }
function seniorWeekendSlots(){ const s=SC(); return buildZoneSlots(s.seniorWeekendStart,s.seniorWeekendEnd,s.seniorDur,s.breakEvery,s.seniorDur,s.lunchStart,s.lunchEnd); }
// Auto-tider för en klasstyp en given dag.
function slotsFor(type, day){
  const s=SC();
  if(type==="youth") return s.hasYouth ? youthSlots() : [];
  if(!s.hasSenior) return [];
  return (day && isWeekend(day)) ? seniorWeekendSlots() : seniorWeekdaySlots();
}
// Alla auto-tider en given dag kan ha (utifrån konfig: helg = senior; vardag = junior + senior).
function daySlots(day){
  const s=SC();
  if(isWeekend(day)) return s.hasSenior ? seniorWeekendSlots() : [];
  return [...(s.hasYouth?youthSlots():[]), ...(s.hasSenior?seniorWeekdaySlots():[])];
}
// MANUELL schemaläggning: 08:00–21:00 i halvtimmessteg (seniorer kan startas på halvtimme).
function manualSlots(type){
  const out=[]; for(let t=480; t<=1260; t+=30) out.push(t); return out;
}
// Överlappar två tidsintervall varandra?
function timeOverlap(s1,e1,s2,e2){ return s1<e2 && s2<e1; }
// Matchens längd i minuter (utifrån klasstyp).
function matchDur(m){ return matchMinFor(getClass(m.classId).type); }
function fmtMin(m){ return String(Math.floor(m/60)).padStart(2,"0")+":"+String(m%60).padStart(2,"0"); }
function minToTime(m){ return (m==null||isNaN(m)) ? "" : fmtMin(m); }              // minuter -> "HH:MM"
function timeToMin(str){ if(!str) return null; const a=String(str).split(":"); const h=+a[0]; if(isNaN(h)) return null; return h*60+(+a[1]||0); }
function matchMinFor(type){ const s=SC(); return type==="youth"?s.youthDur:s.seniorDur; }
// Radlängd i rutnätet: helg = seniorlängd; vardag före seniorstart = juniorlängd, annars senior.
function slotDur(t, day){ const s=SC(); if(day && isWeekend(day)) return s.seniorDur; return t < s.seniorStart ? s.youthDur : s.seniorDur; }
// Är luckan mellan prevEnd och t en lunchlucka? Namn på paus/lunch (konfigurerbara).
function isLunchGap(prevEnd,t){ const s=SC(); return s.lunchEnd>s.lunchStart && prevEnd < s.lunchEnd && t > s.lunchStart; }
function breakName(isLunch){ const s=SC(); return (isLunch ? (s.lunchName||s.breakName) : s.breakName) || "Paus"; }
function timeLabel(m, day){ return fmtMin(m)+"–"+fmtMin(m+slotDur(m, day)); }
function hourLabel(m, day){ return timeLabel(m, day); }   // bakåtkompatibelt namn
// Match-specifik tidsetikett (matchlängd utifrån klasstyp – korrekt även vid manuell placering).
function matchLabel(m){ const d=matchMinFor(getClass(m.classId).type); return fmtMin(m.time)+"–"+fmtMin(m.time+d); }

/* ---------- Spelarnamn ---------- */
// Ta bort rank "(n)" i slutet av ett namn (för jämförelse/gruppering).
function stripRank(name){ return String(name).replace(/\s*\(\d+\)\s*$/,"").trim(); }
// Individuella spelarnamn i en match (dubbelpar delas på "/").
function playersOf(m){
  const out=[];
  for(const side of [m.p1,m.p2]){
    if(!side) continue;
    for(const part of String(side).split("/")){
      const nm=stripRank(part);

function normalize(s){
  if(!s.tournament) s.tournament=defaultTournament();

  if(!s.tournament.name) s.tournament.name="Klubbmästerskap";

  if(s.lang!=="en") s.lang="sv";
  if(typeof s.logo!=="string") s.logo=null;
  if(typeof s.bgColor!=="string") s.bgColor=null;
  if(typeof s.headColor!=="string") s.headColor=null;
  if(!Array.isArray(s.requests)) s.requests=[];
  if(!s.organizer || typeof s.organizer!=="object") s.organizer={ name:"", phone:"", email:"" };
  if(typeof s.chairman!=="string") s.chairman="";
  if(!Array.isArray(s.trainers)) s.trainers=[];
  if(!s.diplomaSigns || typeof s.diplomaSigns!=="object") s.diplomaSigns={ director:true, chairman:true, trainers:false };
  { const d=defaultSched(); s.sched = Object.assign(d, (s.sched && typeof s.sched==="object") ? s.sched : {}); }
  if(typeof s.venue!=="string") s.venue="";
  if(typeof s.adminPin!=="string") s.adminPin="";
  if(typeof s.updatedAt!=="number") s.updatedAt=0;
  if(typeof s.archived!=="boolean") s.archived=false;
  if(typeof s.archivedAt!=="number") s.archivedAt=0;
  if(!s.extraCourts) s.extraCourts={};
  if(!s.lockedDays) s.lockedDays={};
  if(!s.planFinalDays) s.planFinalDays={};
  if(!s.planCourts) s.planCourts={};
  s.classes=s.classes||[];
  // Engångsmigrering (annars återskapas klasser som användaren tagit bort/döpt om).
  if(!s.migratedV2){
    const renameMap={"Pojksingel":"Pojksingel Äldre","Flicksingel":"Flicksingel Äldre"};
    s.classes.forEach(c=>{ if(renameMap[c.name]) c.name=renameMap[c.name]; });
    [["Pojksingel Yngre","youth"],["Flicksingel Yngre","youth"],["Minidubbel","youth"]].forEach(([name,type])=>{
      if(!s.classes.some(c=>c.name===name)){
        s.classes.push({ id:"c"+uid(), name, type, ranked:false, seeds:4, catNo:s.classes.length+1,
          participants:[], matches:[], champion:null });
      }
    });
    s.migratedV2=true;
  }
  (s.classes||[]).forEach((c,ci)=>{
    // Sätt/uppdatera seedningsflaggan utifrån klassnamnet (robust mot gammal data).
    if(c.ranked===undefined) c.ranked = RANKED_CLASSES.has(c.name);
    if(!(c.seeds>0)) c.seeds = 4;   // antal seedade (standard 4)
    if(!(c.catNo>0)) c.catNo = ci+1; // matchnummer-kategori (första siffran)
    if(typeof c.category!=="string") c.category="";   // herr/dam/pojke/flicka/mixed
    if(typeof c.ageLevel!=="string") c.ageLevel="";   // åldersnivå (fritext)
    // Migrera gamla heltimme-tider (9..20) till minuter (540..1200).
    for(const m of (c.matches||[])){
      if(m.time!=null && m.time>0 && m.time<60) m.time=m.time*60;
    }
  });
  return s;
}

// Skriv en rad utan att kräva unik constraint på "key":
// försök UPPDATERA (PATCH) befintlig rad, och INFOGA (POST) bara om ingen fanns.
async function cloudUpsertRow(key, data){
  const fail=(where,r,body)=>{ const e=new Error(`${where} HTTP ${r.status} – ${(body||"").slice(0,180)}`); e.status=r.status; e.body=body||""; cloudLastError=e.message; return e; };
  // 1) UPPDATERA
  let r;
  try{ r = await fetch(`${SUPA_URL}/tournaments?key=eq.${encodeURIComponent(key)}`, {
    method:"PATCH",
    headers: cloudHeaders({ Prefer:"return=representation" }),
    body: JSON.stringify({ data })
  }); }
  catch(e){ cloudLastError="Nätverksfel (PATCH): "+e.message; throw e; }
  if(!r.ok){ throw fail("PATCH", r, await r.text().catch(()=>"" )); }
  let rows=[]; try{ rows=await r.json(); }catch(e){}
  if(Array.isArray(rows) && rows.length){ cloudLastError=""; return; }   // en rad uppdaterades → klart
  // 2) INFOGA (ingen rad fanns)
  let r2;
  try{ r2 = await fetch(`${SUPA_URL}/tournaments`, {
    method:"POST",
    headers: cloudHeaders({ Prefer:"return=minimal" }),
    body: JSON.stringify({ key, data })
  }); }
  catch(e){ cloudLastError="Nätverksfel (POST): "+e.message; throw e; }
  if(!r2.ok){ throw fail("POST", r2, await r2.text().catch(()=>"" )); }
  cloudLastError="";   // lyckad skrivning – nollställ felet
}

      if(b.includes("api key")||b.includes("apikey")) return "→ API-nyckeln saknas eller är fel. Kopiera 'anon public' på nytt från Supabase → Project Settings → API.";

      return "→ Behörighet nekad (oftast RLS-policy som saknas, eller fel nyckel).";
    }
    if(status===404) return "→ 404. Kontrollera att URL:en slutar på /rest/v1 och att tabellen 'tournaments' finns.";
    if(status===0) return "→ Ingen kontakt. Internet nere, fel URL, eller nätverket/brandväggen blockerar supabase.co (CORS).";
    if(b.includes("does not exist")||b.includes("42p01")) return "→ Tabellen 'tournaments' saknas. Skapa den med SQL:en i instruktionen.";
    if((b.includes("could not find")&&b.includes("column"))||(b.includes("column")&&b.includes("does not exist"))) return "→ Fel/saknad kolumn. Tabellen ska ha exakt kolumnerna 'key' (text) och 'data' (jsonb).";
    if(status===400){
      if(b.includes("no unique or exclusion")||b.includes("42p10")) return "→ 'key' saknar unik constraint. Appen är nu uppdaterad för att inte kräva det – ladda om sidan (Ctrl/Cmd+Shift+R).";
      if(b.includes("not-null")||b.includes("23502")) return "→ En obligatorisk kolumn saknar värde. Ta bort extra NOT NULL-kolumner, eller använd bara 'key' och 'data'.";
      return "→ Felaktig begäran (400). Vanligast: tabellen har fel kolumner. Den ska ha 'key' (text) och 'data' (jsonb). Se SQL:en i instruktionen.";
    }
    return "→ Oväntat svar – se texten ovan.";
  };
  // 1) LÄSNING
  try{
    const r=await fetch(`${SUPA_URL}/tournaments?key=eq.${encodeURIComponent(TOURN_KEY)}&select=key`, { headers: cloudHeaders() });
    const body=await r.text();
    if(r.ok){ out.push(`✅ LÄSNING OK (HTTP ${r.status}).`); }
    else { out.push(`❌ LÄSNING misslyckades: HTTP ${r.status}`); out.push("  "+body.slice(0,180)); out.push("  "+interpret(r.status,body)); return out.join("\n"); }
  }catch(e){ out.push("❌ LÄSNING: ingen kontakt med servern – "+e.message); out.push("  "+interpret(0,"")); return out.join("\n"); }
  // 2) SKRIVNING (testrad med egen nyckel – rör inte turneringsdatan). Samma metod som appen (PATCH→INSERT).
  try{
    await cloudUpsertRow("__diag_test__", { ts:Date.now() });
    out.push("✅ SKRIVNING OK.");
    out.push("");
    out.push("🎉 Allt fungerar! Tabellen finns och behörigheten är rätt.");
    out.push("Om det ändå står Offline: ladda om sidan.");
    try{ await fetch(`${SUPA_URL}/tournaments?key=eq.__diag_test__`, { method:"DELETE", headers: cloudHeaders() }); }catch(e){}   // städa bort testraden
  }catch(e){
    out.push("❌ SKRIVNING misslyckades: "+(e.message||e));
    if(e.body) out.push("  "+String(e.body).slice(0,180));
    out.push("  "+interpret(e.status||0, e.body||e.message||""));
  }
  return out.join("\n");
}
function cloudStatusText(){
  if(!cloudEnabled) return L("Molnsynk av (endast denna enhet)","Cloud sync off (this device only)");
  const map={ connecting:L("Ansluter…","Connecting…"), saving:L("Sparar till molnet…","Saving to cloud…"),
    ok:L("Synkad","Synced"), offline:L("Offline – sparat lokalt","Offline – saved locally"), off:L("Av","Off") };
  let s=map[cloudStatus]||cloudStatus;
  if(cloudStatus==="ok" && cloudLastSync){ const d=new Date(cloudLastSync); const p=n=>String(n).padStart(2,"0"); s+=` ${p(d.getHours())}:${p(d.getMinutes())}`; }
  if(cloudStatus==="offline" && cloudLastError){ s+=` (${cloudLastError.split(" – ")[0]})`; }   // t.ex. "HTTP 401"
  return s;
}
// Välj svart eller vit text som syns bäst mot en given bakgrundsfärg (hex).
function contrastText(bg){
  let h=String(bg||"").trim().replace(/^#/,"");
  if(h.length===3) h=h.split("").map(c=>c+c).join("");
  if(!/^[0-9a-fA-F]{6}$/.test(h)) return "#1a1a1a";
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  // Relativ luminans (perception) – ljus bakgrund → mörk text, mörk bakgrund → ljus text.
  const lum=(0.299*r+0.587*g+0.114*b)/255;
  return lum>0.6 ? "#1a1a1a" : "#ffffff";
}

// Distinkt färg per klass (utifrån klassens ordning) för att skilja matcher åt.
const CLASS_COLORS = ["#d1495b","#3f88c5","#2e9e57","#8e44ad","#e07b16","#0e9aa7","#9A6324","#7a2e2e","#7f8c1e","#d81b8c","#5d6d7e"];
function classColor(cls){ const i=state.classes.indexOf(cls); return CLASS_COLORS[(i<0?0:i)%CLASS_COLORS.length]; }
function classColorId(id){ const c=getClass(id); return c?classColor(c):"#888"; }
// Visningsnamn: dölj seedningssiffran "(n)" överallt utom i Klasser & deltagare.
function dispName(x){ return x==null ? x : stripRank(x); }

/* ----- Matchnummer (kategori*100 + löpande) ----- */
function classCatNo(cls){ return cls.catNo>0 ? cls.catNo : state.classes.indexOf(cls)+1; }   // kategori (första siffran)
function isByeMatch(m){ return !m.manual && m.round===0 && (m.p1===null || m.p2===null); }
// Riktiga matcher i en klass i spelordning (byes räknas ej), bracket före manuella.
function orderedRealMatches(cls){
  const br=cls.matches.filter(m=>!m.manual && !isByeMatch(m)).sort((a,b)=>a.round-b.round||a.index-b.index);
  const man=cls.matches.filter(m=>m.manual);
  return [...br, ...man];
}
function matchNumber(m){
  const cls=getClass(m.classId); if(!cls) return null;
  const pos=orderedRealMatches(cls).indexOf(m);
  if(pos<0) return null;
  const seq = (m.seq>0) ? m.seq : (pos+1);   // explicit sekvens (ändrad/bytt) annars spelordning
  return classCatNo(cls)*100 + seq;
}
// Tilldela explicit sekvensnummer (m.seq) till alla numrerade matcher i klassen (om ej satt).
// Används innan man byter matchnummer så att alla har ett fast nummer att byta med.
function assignSeqs(cls){ orderedRealMatches(cls).forEach((m,i)=>{ if(!(m.seq>0)) m.seq=i+1; }); }
// Hitta en (synlig) match utifrån matchnummer.
function findMatchByNumber(no){
  for(const c of visibleClasses()) for(const m of c.matches){ if(!isByeMatch(m) && matchNumber(m)===no) return {m,c}; }
  return null;
}
function matchNoTag(m){ const n=matchNumber(m); return n==null?"":`<span class="mno">#${n}</span>`; }
// Etikett för en matchsida: känd deltagare visas med namn, annars matchnumret på
// matchen vars vinnare fyller platsen (t.ex. "#12" = vinnaren av match 12).
function slotFeedLabel(cls,m,slot){
  const p = slot===0 ? m.p1 : m.p2;
  if(p) return dispName(p);
  const feeder = (cls && m.round>0 && !m.manual) ? matchOf(cls, m.round-1, m.index*2 + slot) : null;
  const n = feeder ? matchNumber(feeder) : null;
  if(n!=null) return `<span class="mno" title="${L('Vinnare av match','Winner of match')} #${n}">#${n}</span>`;
  return `<span class="muted">?</span>`;
}
// Antal riktiga matcher som ska spelas i en klass (deltagare-1 + manuella).
function realMatchCount(cls){
  return Math.max(0, cls.participants.length-1) + cls.matches.filter(m=>m.manual).length;
}
// Ersätt en deltagare i en klass: nya deltagaren tar den gamlas plats i stege och schema.
function replaceParticipant(cls, oldEntry, newBase){
  newBase=(newBase||"").trim(); if(!newBase) return;
  const rm=String(oldEntry).match(/\s*(\(\d+\))\s*$/);   // behåll ev. seedning "(n)"
  const newEntry = newBase + (rm ? (" "+rm[1]) : "");
  const i=cls.participants.indexOf(oldEntry);
  if(i>=0) cls.participants[i]=newEntry;
  for(const m of cls.matches){
    if(m.p1===oldEntry) m.p1=newEntry;
    if(m.p2===oldEntry) m.p2=newEntry;
    if(m.winner===oldEntry) m.winner=newEntry;
  }
  if(cls.champion===oldEntry) cls.champion=newEntry;
  save(); render();
}

/* ---------------- Bracket / stege ---------------- */
function seedOrder(size){
  let s=[1];
  while(s.length<size){
    const len=s.length*2, n=[];
    for(const x of s){ n.push(x); n.push(len+1-x); }
    s=n;
  }
  return s;
}
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function buildBracket(cls){
  const manuals = cls.matches.filter(m=>m.manual); // behåll manuellt inlagda matcher
  cls.matches=[]; cls.champion=null;
  // Rensa ev. tidigare rank, behåll ordning. Seedning (top 4) endast i utvalda klasser.
  let names = cls.participants.map(stripRank).filter(Boolean);
  const ranked = isRanked(cls);
  const nSeeds = ranked ? Math.min(seedCountOf(cls), names.length) : 0;
  // Notera rankade med siffra inom parentes bakom namnet och spara i deltagarlistan.
  for(let i=0;i<nSeeds;i++) names[i] = names[i] + ` (${i+1})`;
  cls.participants = names.slice();
  const n=names.length;
  if(n<2){ cls.matches.push(...manuals); return; }
  let size=1; while(size<n) size*=2;
  const order=seedOrder(size);              // slot-index -> seed-nummer (1..size)
  const slots=new Array(size).fill(null);   // null = BYE
  // Seeds på standardpositioner (1 & 2 i motsatta halvor osv) -> kan ej mötas tidigt.
  for(let s=1;s<=nSeeds;s++) slots[order.indexOf(s)] = names[s-1];
  // Byes ges till de högst seedade (slots med högst seed-nummer, ej seedplatser).
  const byes=size-n;
  const byeSlots=new Set();
  const byOrderDesc=[...Array(size).keys()].sort((a,b)=>order[b]-order[a]);
  for(const idx of byOrderDesc){
    if(byeSlots.size>=byes) break;
    if(order[idx]<=nSeeds) continue;        // seedplats får inte vara bye
    byeSlots.add(idx);
  }
  // Övriga (oseedade) spelare lottas slumpmässigt in i resterande platser.
  const rest=shuffle(names.slice(nSeeds));
  const emptyIdx=[...Array(size).keys()].filter(idx=>order[idx]>nSeeds && !byeSlots.has(idx));
  emptyIdx.forEach((idx,i)=>{ slots[idx]=rest[i] ?? null; });
  // Bygg ronderna.
  const rounds=Math.log2(size);
  for(let r=0;r<rounds;r++){
    const cnt=size/Math.pow(2,r+1);
    for(let i=0;i<cnt;i++){
      const m={ id:uid(), classId:cls.id, round:r, index:i,
        p1:null,p2:null, winner:null, score:"", day:null, court:null, time:null };
      if(r===0){ m.p1=slots[i*2]; m.p2=slots[i*2+1]; }
      cls.matches.push(m);
    }
  }
  cls.matches.push(...manuals);
  resolveByes(cls);
}
function matchOf(cls,r,i){ return cls.matches.find(m=>m.round===r&&m.index===i); }
// Skicka vinnaren till rätt plats i nästa omgång. Returnerar true om något ändrades.
function propagateSlot(cls,m){
  if(!m.winner) return false;
  const nr=m.round+1, ni=Math.floor(m.index/2), slot=m.index%2;
  const next=matchOf(cls,nr,ni);
  if(!next){ // finalen
    if(cls.champion!==m.winner){ cls.champion=m.winner; return true; }
    return false;
  }
  if(slot===0){ if(next.p1!==m.winner){ next.p1=m.winner; return true; } }
  else        { if(next.p2!==m.winner){ next.p2=m.winner; return true; } }
  return false;
}
// Iterativ upplösning: auto-vinst på BYE i omgång 0 + framåtflyttning av vinnare.
function resolveByes(cls){
  let changed=true, guard=0;
  while(changed && guard++<200){
    changed=false;
    for(const m of cls.matches){
      if(m.manual) continue;
      if(m.round===0 && !m.winner){
        if(m.p1!==null && m.p2===null){ m.winner=m.p1; m.score="WO"; changed=true; }
        else if(m.p2!==null && m.p1===null){ m.winner=m.p2; m.score="WO"; changed=true; }
      }
      if(m.winner && propagateSlot(cls,m)) changed=true;
    }
  }
}
function recompChampion(cls){
  cls.champion=null;
  const fm=cls.matches.find(x=>x.round===totalRounds(cls)-1);
  if(fm&&fm.winner) cls.champion=fm.winner;
}
function setWinner(cls,m,winner){
  m.winner=winner; m._wo=false;
  if(m.manual){ save(); render(); return; }   // manuell match: ingen stege-framflyttning
  clearDownstream(cls,m);   // ta bort ev. felaktig nedströms-placering
  resolveByes(cls);         // flytta vinnaren framåt -> nästa match blir spelklar
  recompChampion(cls);
  save(); render();
}
// Registrera/ändra resultat via vinnar-väljaren. key = 'p1' | 'p2' | '' (rensa).
function registerWinner(cls,m,key){
  if(key===""){                 // rensa vinnare
    m.winner=null;
    if(!m.manual){ clearDownstream(cls,m); resolveByes(cls); recompChampion(cls); }
    save(); render(); return;
  }
  setWinner(cls, m, key==="p1"?m.p1:m.p2);
}
function clearDownstream(cls,m){
  const nr=m.round+1, ni=Math.floor(m.index/2), slot=m.index%2;
  const next=matchOf(cls,nr,ni);
  if(!next) return;
  const cur = slot===0?next.p1:next.p2;
  // töm platsen och eventuell vinnare nedströms
  if(slot===0) next.p1=null; else next.p2=null;
  if(next.winner){ const w=next.winner; next.winner=null; next.score=""; clearDownstream(cls,next); }
}
function roundName(r,total){
  const fromEnd=total-1-r;
  if(fromEnd===0) return "Final";
  if(fromEnd===1) return "Semifinal";
  if(fromEnd===2) return "Kvartsfinal";
  return "Omgång "+(r+1);
}
function totalRounds(cls){
  const br=cls.matches.filter(m=>!m.manual);
  if(!br.length) return 0;
  return Math.max(...br.map(m=>m.round))+1;
}
function isReady(m){ return m.p1 && m.p2 && !m.winner; }
function isFinal(cls,m){ return !m.manual && m.round===totalRounds(cls)-1; }
// Kort etikett för vilken omgång/final en match avser (t.ex. "Omgång 2", "Semifinal", "Final").
function stageName(cls,m){ return m.manual ? "Manuell" : roundName(m.round, totalRounds(cls)); }

function stageTag(cls,m){

function createManualMatch(cls,p1,p2,day){

  save(); render();
}

};

// Välj text efter språk – används för längre instruktionstexter (svensk / engelsk).
function L(sv,en){ return state.lang==="en" ? en : sv; }
const _MONTHS_EN = {jan:"Jan",feb:"Feb",mar:"Mar",apr:"Apr",maj:"May",jun:"Jun",jul:"Jul",aug:"Aug",sep:"Sep",okt:"Oct",nov:"Nov",dec:"Dec"};
const _DOW_EN = {"Söndag":"Sunday","Måndag":"Monday","Tisdag":"Tuesday","Onsdag":"Wednesday","Torsdag":"Thursday","Fredag":"Friday","Lördag":"Saturday",
  "Sön":"Sun","Mån":"Mon","Tis":"Tue","Ons":"Wed","Tor":"Thu","Fre":"Fri","Lör":"Sat"};
// Dynamiska strängar (antal, veckodagar, datum) som inte finns exakt i ordlistan.
function translateDynamic(s){
  let m, out=s;
  if(m=s.match(/^(\d+) deltagare$/)) return m[1]+" players";
  if(m=s.match(/^(\d+) delt\.$/)) return m[1]+" players";
  if(m=s.match(/^(\d+) omgångar$/)) return m[1]+" rounds";
  if(m=s.match(/^(\d+) match(?:er)?$/)) return m[1]+(m[1]==="1"?" match":" matches");
  if(m=s.match(/^(\d+) banor totalt$/)) return m[1]+" courts total";
  if(m=s.match(/^🗑 Rensa stege & schema för (.+)$/)) return "🗑 Clear bracket & schedule for "+m[1];
  if(m=s.match(/^➕ Lägg in (.+)$/)) return "➕ Add "+m[1];
  if(m=s.match(/^(\d+) omg\.$/)) return m[1]+" rounds";
  // veckodagar (hela ord)
  for(const [sv,en] of Object.entries(_DOW_EN)) out=out.replace(new RegExp("\\b"+sv+"\\b","g"), en);
  // månadsförkortningar i datum ("3 aug" -> "3 Aug")
  out=out.replace(/(\d+)\s+(jan|feb|mar|apr|maj|jun|jul|aug|sep|okt|nov|dec)\b/g,(_,d,mo)=>d+" "+_MONTHS_EN[mo]);
  return out;
}
// Översätt allt textinnehåll i ett DOM-träd till engelska.
function translateDOM(root){
  const w=document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const nodes=[]; let node; while(node=w.nextNode()) nodes.push(node);
  for(const nd of nodes){
    const raw=nd.nodeValue, key=raw.trim(); if(!key) continue;
    let val = EN[key];
    if(val==null){ const dyn=translateDynamic(key); if(dyn!==key) val=dyn; }
    if(val!=null && val!==key) nd.nodeValue = raw.replace(key, val);
  }
  root.querySelectorAll("[placeholder]").forEach(el=>{ const v=EN[el.getAttribute("placeholder").trim()]; if(v) el.setAttribute("placeholder", v); });
  root.querySelectorAll("[title]").forEach(el=>{ const v=EN[el.getAttribute("title").trim()]; if(v) el.setAttribute("title", v); });
}
function applyLang(){
  if(state.lang!=="en") return;
  const tabs=document.getElementById("tabs"), a=document.getElementById("app");
  if(tabs) translateDOM(tabs);
  if(a) translateDOM(a);
}

/* ----- Tab: Statistik ----- */
function renderStats(){
  const days=getDays(), classes=visibleClasses();
  if(!days.length){ app.innerHTML=`<div class="card"><h2>Statistik</h2><p class="muted">Ange turneringens datum under <b>Klasser &amp; deltagare</b> först.</p></div>`; return; }
  const all=realMatches();
  const schedOf=(cid,date)=> all.filter(m=>m.classId===cid && m.day===date).length;

  // Fördela klassens kvarvarande (oschemalagda) matcher jämnt över dagarna t.o.m. finalen.
  function suggestPerDay(cls){
    const arr=days.map(()=>0);
    const fd=cls.type==="youth"?youthFinalDay():adultFinalDay();
    const fi=days.findIndex(d=>d.date===fd);
    const D=fi<0?days.length:fi+1;
    const kvar=Math.max(0, realMatchCount(cls) - all.filter(m=>m.classId===cls.id && m.day).length);
    if(D<=0 || kvar<=0) return arr;
    const base=Math.floor(kvar/D), extra=kvar%D;
    for(let di=0; di<Math.min(D,days.length); di++) arr[di]=base + (di >= D-extra ? 1 : 0);
    return arr;
  }
  // 1) Matris kategori × dag (schemalagda matcher) + Kvar + förslag/dag (rött inom parentes)
  let colTot=days.map(()=>0), grand=0, tKvar=0;
  let rowsHtml="";
  classes.forEach(c=>{
    let rowTot=0, cells="";
    const sugg=suggestPerDay(c);
    days.forEach((d,di)=>{
      const n=schedOf(c.id,d.date); rowTot+=n; colTot[di]+=n;
      const s=sugg[di];
      cells+=`<td>${n||''}${s>0?` <span style="color:#c0392b;font-weight:700">(${s})</span>`:''}</td>`;
    });
    grand+=rowTot;
    const kvar=Math.max(0, realMatchCount(c) - rowTot); tKvar+=kvar;
    rowsHtml+=`<tr><td style="text-align:left"><span class="cdot" style="background:${classColor(c)}"></span>${c.name}</td>${cells}<td><b>${rowTot||''}</b></td><td><b>${kvar||''}</b></td></tr>`;
  });
  let html=`<div class="card"><h2>Matcher per kategori och dag (schemalagda)</h2>
    <p class="small muted">Antal schemalagda matcher per dag och kategori. <b>Kvar</b> = matcher kvar att schemalägga t.o.m. finalen.
    Röd siffra <span style="color:#c0392b;font-weight:700">(n)</span> = förslag på hur många kvarvarande matcher som bör läggas den dagen fram till finalen.</p>
    <div style="overflow-x:auto"><table class="results"><thead><tr><th style="text-align:left">Kategori</th>${days.map(d=>`<th>${d.dow.slice(0,3)}<br>${d.short}</th>`).join("")}<th>Totalt</th><th>Kvar</th></tr></thead><tbody>
    ${rowsHtml}
    <tr style="background:#faf6ec"><td style="text-align:left"><b>Totalt/dag</b></td>${colTot.map(n=>`<td><b>${n||''}</b></td>`).join("")}<td><b>${grand}</b></td><td><b>${tKvar||''}</b></td></tr>
    </tbody></table></div></div>`;

  // 2) Totalt i turneringen och per kategori
  let tPlay=0,tSched=0,tDone=0, r2="";
  classes.forEach(c=>{
    const play=realMatchCount(c);
    const s=all.filter(m=>m.classId===c.id && m.day).length;
    const done=all.filter(m=>m.classId===c.id && m.winner && m.p1 && m.p2 && !isByeMatch(m)).length;
    tPlay+=play;tSched+=s;tDone+=done;
    if(play>0||s>0) r2+=`<tr><td style="text-align:left"><span class="cdot" style="background:${classColor(c)}"></span>${c.name}</td><td>${play}</td><td>${s}</td><td>${done}</td><td>${Math.max(0,play-done)}</td></tr>`;
  });
  html+=`<div class="card"><h2>Antal matcher totalt</h2>
    <p class="small muted">"Att spela" = totalt antal matcher i kategorin (deltagare − 1 + manuella).</p>
    <table class="results"><thead><tr><th style="text-align:left">Kategori</th><th>Att spela</th><th>Schemalagda</th><th>Spelade</th><th>Kvar</th></tr></thead><tbody>
    ${r2}
    <tr style="background:#faf6ec"><td style="text-align:left"><b>Hela turneringen</b></td><td><b>${tPlay}</b></td><td><b>${tSched}</b></td><td><b>${tDone}</b></td><td><b>${Math.max(0,tPlay-tDone)}</b></td></tr>
    </tbody></table></div>`;

  // 3) Matcher/dag som krävs till finalerna
  let r3="";
  classes.forEach(c=>{
    const play=realMatchCount(c); if(play===0) return;
    const fd=c.type==="youth"?youthFinalDay():adultFinalDay();
    const idx=days.findIndex(d=>d.date===fd);
    const daysBefore=idx<0?days.length:idx;
    const beforeFinal=Math.max(0,play-1);
    const perDay=daysBefore>0?Math.ceil(beforeFinal/daysBefore):beforeFinal;
    r3+=`<tr><td style="text-align:left">${c.name}</td><td>${play}</td><td>${idx<0?'–':dayLong(fd)}</td><td>${daysBefore}</td><td><b>${perDay}</b></td></tr>`;
  });
  const totalDays=days.length;
  html+=`<div class="card"><h2>Matcher/dag som krävs till finalerna</h2>
    <p class="small muted">Antal matcher per dag (summa över alla banor) som behöver spelas för att hinna klart före respektive finaldag.</p>
    <table class="results"><thead><tr><th style="text-align:left">Kategori</th><th>Matcher totalt</th><th>Final</th><th>Dagar före final</th><th>Matcher/dag som krävs</th></tr></thead><tbody>
    ${r3}
    <tr style="background:#faf6ec"><td style="text-align:left"><b>Hela turneringen (snitt)</b></td><td><b>${tPlay}</b></td><td>–</td><td><b>${totalDays}</b></td><td><b>${totalDays>0?Math.ceil(tPlay/totalDays):tPlay}</b></td></tr>
    </tbody></table></div>`;

  app.innerHTML=html;
}

// Läs in en uppladdad logga; rasterbilder skalas ned (max 512 px), SVG behålls som vektor.
function loadLogoFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    const src=reader.result;
    if(file.type==="image/svg+xml"){ state.logo=src; save(); render(); return; }
    const img=new Image();
    img.onload=()=>{
      const MAX=512, scale=Math.min(1, MAX/Math.max(img.width,img.height));
      const w=Math.max(1,Math.round(img.width*scale)), h=Math.max(1,Math.round(img.height*scale));
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      try{ state.logo=cv.toDataURL("image/png"); }catch(err){ state.logo=src; }
      save(); render();
    };
    img.onerror=()=>alert("Kunde inte läsa bilden.");
    img.src=src;
  };
  reader.onerror=()=>alert("Kunde inte läsa filen.");
  reader.readAsDataURL(file);
}

  };

  // Bakgrundsfärg
  document.getElementById("bgColor").oninput=e=>{ state.bgColor=e.target.value; save(); applyTheme(); };
  document.getElementById("bgColor").onchange=e=>{ state.bgColor=e.target.value; save(); render(); };
  document.getElementById("bgReset").onclick=()=>{ state.bgColor=null; save(); render(); };
  // Rubrikfärg
  document.getElementById("headColor").oninput=e=>{ state.headColor=e.target.value; save(); applyTheme(); };
  document.getElementById("headColor").onchange=e=>{ state.headColor=e.target.value; save(); render(); };
  document.getElementById("headReset").onclick=()=>{ state.headColor=null; save(); render(); };
  // Spara namn/datum/banor
  document.getElementById("saveInfo").onclick=()=>{
    const name=document.getElementById("tName").value.trim();
    const s=document.getElementById("tStart").value, e=document.getElementById("tEnd").value;
    if(!s||!e){ alert("Ange både start- och slutdatum."); return; }
    if(parseDate(e) < parseDate(s)){ alert("Slutdatum måste vara samma dag eller efter startdatum."); return; }
    let c=parseInt(document.getElementById("tCourts").value,10); if(isNaN(c)||c<1)c=1; if(c>8)c=8;
    const arr=document.getElementById("tArranger").value.trim();
    state.tournament={ ...state.tournament, name:name||"Klubbmästerskap", start:s, end:e };
    state.arranger=arr||"Dalarö Tennisklubb";
    state.courts=c;
    ensureDay(); save(); render();
  };

  const liveTitle=()=>{
    document.title = `${state.tournament.name||"Klubbmästerskap"} – ${arrangerName()}`;
    const at=document.getElementById("appTitle"); if(at) at.textContent = state.tournament.name || "Klubbmästerskap";
    const as=document.getElementById("appSub"); if(as) as.textContent = `${arrangerName()} · ${tournamentRangeText()}`;
  };
  // --- Turneringar: skapa / byt / ta bort ---
  { const b=document.getElementById("tournNewBtn"); if(b) b.onclick=()=>{ const nm=prompt("Namn på den nya turneringen:"); if(nm!=null) createTournament(nm); }; }
  { const b=document.getElementById("tournDelBtn"); if(b) b.onclick=()=>deleteTournament(TOURN_KEY); }
  { const b=document.getElementById("tournArchiveBtn");   if(b) b.onclick=archiveTournament; }
  { const b=document.getElementById("tournUnarchiveBtn"); if(b) b.onclick=unarchiveTournament; }
  { const b=document.getElementById("tournCopyBtn"); if(b) b.onclick=async ()=>{
      const url=tournShareURL(); const msg=document.getElementById("tournMsg");
      try{ await navigator.clipboard.writeText(url); if(msg) msg.textContent="Länk kopierad: "+url; }
      catch(e){ prompt("Kopiera länken till turneringen:", url); }
    }; }
  { const sel=document.getElementById("tournSwitch");
    if(sel && cloudEnabled){
      sel.onchange=()=>{ if(sel.value!==TOURN_KEY) switchTournament(sel.value); };
      cloudListTournaments().then(list=>{
        if(!Array.isArray(list)) list=[];
        if(!list.some(x=>x.key===TOURN_KEY)) list.push({key:TOURN_KEY, name:state.tournament.name});   // aktiv finns alltid med
        list.sort((a,b)=>String(a.name||a.key).localeCompare(String(b.name||b.key),"sv"));
        sel.innerHTML=list.map(x=>`<option value="${String(x.key).replace(/"/g,'&quot;')}"${x.key===TOURN_KEY?" selected":""}>${(x.name||x.key)}</option>`).join("");
        const msg=document.getElementById("tournMsg"); if(msg) msg.textContent=`${list.length} turnering(ar) i molnet.`;
      }).catch(e=>{ const msg=document.getElementById("tournMsg"); if(msg) msg.textContent="Kunde inte läsa turneringslistan: "+(e.message||e); });
    }
  }
  { const el=document.getElementById("tName");     if(el) el.oninput=()=>{ state.tournament.name=el.value; liveTitle(); save(); }; }
  { const el=document.getElementById("tArranger"); if(el) el.oninput=()=>{ state.arranger=el.value;      liveTitle(); save(); }; }
  // Tävlingsledare + spelplats sparas löpande
  const bindSave=(id,fn)=>{ const el=document.getElementById(id); if(el) el.oninput=()=>{ fn(el.value); save(); }; };
  bindSave("oName", v=>{ state.organizer.name=v; });
  bindSave("oPhone", v=>{ state.organizer.phone=v; });
  bindSave("oMail", v=>{ state.organizer.email=v; });
  bindSave("oChair", v=>{ state.chairman=v; });
  bindSave("venue", v=>{ state.venue=v; });
  document.getElementById("exportBtn").onclick=exportBackup;
  document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("newTournament").onclick=resetEverything;
  // Admin-PIN
  { const b=document.getElementById("savePinBtn"); if(b) b.onclick=()=>{
      const v=document.getElementById("adminPinInput").value.trim();
      if(!v){ alert(L("PIN får inte vara tom.","PIN cannot be empty.")); return; }
      state.adminPin=v; save();
      alert(L("Admin-PIN sparad och synkad.","Admin PIN saved and synced."));
    }; }
  // Molnsynk
  updateSyncBadge();
  { const b=document.getElementById("cloudPullBtn"); if(b) b.onclick=cloudForcePull; }
  { const b=document.getElementById("cloudPushBtn"); if(b) b.onclick=cloudForcePush; }
  // Tränare
  document.getElementById("addTrainer").onclick=()=>{ state.trainers.push(""); save(); render(); };
  document.querySelectorAll("#trainerList input[data-tr]").forEach(el=>el.oninput=()=>{ state.trainers[+el.dataset.tr]=el.value; save(); });
  document.querySelectorAll("[data-trdel]").forEach(b=>b.onclick=()=>{ state.trainers.splice(+b.dataset.trdel,1); save(); render(); });
  // Diplom – vilka namn som visas
  const dsBind=(id,key)=>{ const el=document.getElementById(id); if(el) el.onchange=()=>{ state.diplomaSigns[key]=el.checked; save(); }; };
  dsBind("dsDirector","director"); dsBind("dsChairman","chairman"); dsBind("dsTrainers","trainers");
  // Schemaläggning
  document.getElementById("scHasYouth").onchange=e=>{ state.sched.hasYouth=e.target.checked; save(); };
  document.getElementById("scHasSenior").onchange=e=>{ state.sched.hasSenior=e.target.checked; save(); };
  document.getElementById("saveSched").onclick=()=>{
    const s=state.sched, gv=id=>document.getElementById(id), tm=id=>timeToMin(gv(id).value), nv=(id,def)=>{ const v=parseInt(gv(id).value,10); return v>0?v:def; };
    const set={ youthStart:tm("scYouthStart"), youthEnd:tm("scYouthEnd"), youthDur:nv("scYouthDur",30),
      seniorStart:tm("scSeniorStart"), seniorEnd:tm("scSeniorEnd"), seniorWeekendStart:tm("scSenWStart"), seniorWeekendEnd:tm("scSenWEnd"),
      seniorDur:nv("scSeniorDur",60), breakEvery:Math.max(0,parseInt(gv("scBreakEvery").value,10)||0),
      lunchStart:tm("scLunchStart"), lunchEnd:tm("scLunchEnd"), breakName:gv("scBreakName").value.trim()||"Paus", lunchName:gv("scLunchName").value.trim()||"Paus" };
    if(set.youthEnd<=set.youthStart || set.seniorEnd<=set.seniorStart || set.seniorWeekendEnd<=set.seniorWeekendStart){ alert(L("Sluttiden måste vara efter starttiden.","End time must be after start time.")); return; }
    Object.assign(state.sched, set); save(); render();
  };
  document.getElementById("resetSched").onclick=()=>{ if(confirm(L("Återställ schemaläggningen till standard?","Reset scheduling to default?"))){ state.sched=defaultSched(); save(); render(); } };
}

// Publik "Sök deltagare": klasser, schemalagda matcher och resultat för en person.
function renderPlayerSearch(){
  const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nameOnSide=(side,name)=> side!=null && String(side).split("/").some(pp=>stripRank(pp)===name);
  const q=(ui.psearch||"").trim().toLowerCase();
  const idx=participantIndex("");                        // alla synliga klasser
  const matched = q ? idx.filter(r=>r.name.toLowerCase().includes(q)) : [];
  let html=`
   <div class="hint no-print">
     👁 <b>${L('Sök deltagare','Player search')}</b> – ${L('skriv ett namn för att se klasser, schemalagda matcher och resultat.','type a name to see classes, scheduled matches and results.')}
   </div>
   <div class="card">
     <h2>${L('Sök deltagare','Player search')}</h2>
     <div class="row">
       <input type="text" id="pSearchInput" placeholder="🔎 ${L('Skriv ett namn…','Type a name…')}" value="${esc(ui.psearch||'')}" style="min-width:240px">
       ${q?`<button class="btn ghost mini" id="pClr">✕ ${L('Rensa','Clear')}</button>`:''}
       <span class="pill">${idx.length} ${L('deltagare totalt','players total')}</span>
     </div>
   </div>`;
  if(!q){
    html+=`<div class="card"><p class="muted">${L('Skriv ett namn i sökrutan ovan för att söka.','Type a name in the search box above.')}</p></div>`;
  } else if(!matched.length){
    html+=`<div class="card"><p class="muted">${L('Ingen deltagare matchar','No player matches')} "${esc(ui.psearch)}".</p></div>`;
  } else {
    for(const r of matched){
      const pm=playerMatches(r.name,"");
      const played=pm.filter(x=>x.m.winner);
      const wins=played.filter(x=>nameOnSide(x.m.winner,r.name)).length;
      const losses=played.length-wins;
      html+=`<div class="card">
        <h2 style="margin:0 0 6px">${esc(r.name)}</h2>
        <div class="row" style="gap:6px;margin:0 0 4px">
          <span class="small muted">${L('Anmäld i','Registered in')}:</span>
          ${r.classes.map(cn=>`<span class="pill">${esc(cn)}</span>`).join("")}
        </div>
        ${played.length?`<p class="small" style="margin:6px 0 10px">${L('Spelade matcher','Played matches')}: <b>${played.length}</b> · <span style="color:var(--green)">${wins} ${L('vinster','wins')}</span> · ${losses} ${L('förluster','losses')}</p>`:''}`;
      if(!pm.length){
        html+=`<p class="small muted">${L('Inga matcher ännu.','No matches yet.')}</p></div>`;
        continue;
      }
      html+=`<div style="overflow-x:auto"><table class="results"><thead><tr>
          <th>${L('Nr','No')}</th><th>${L('Klass','Class')}</th><th>${L('Omgång','Round')}</th>
          <th>${L('Dag','Day')}</th><th>${L('Tid','Time')}</th><th>${L('Bana','Court')}</th>
          <th>${L('Motståndare','Opponent')}</th><th>${L('Resultat','Result')}</th></tr></thead><tbody>`;
      for(const {m,c} of pm){
        const oppSide = nameOnSide(m.p1,r.name) ? m.p2 : m.p1;
        const opp = oppSide!=null ? esc(dispName(oppSide)) : `<i style="color:#b3aa98">${L('väntar på motståndare','awaiting opponent')}</i>`;
        let result;
        if(m.winner){
          const won=nameOnSide(m.winner,r.name);
          result=`${esc(m.score||'WO')} · ${won?`<b style="color:var(--green)">✅ ${L('vinst','win')}</b>`:`<span class="muted">${L('förlust','loss')}</span>`}`;
        } else {
          result=`<span class="muted">${m.day?L('kommande','upcoming'):'–'}</span>`;
        }
        html+=`<tr>
          <td>${matchNumber(m)??'-'}</td>
          <td><span class="cdot" style="background:${classColor(c)}"></span>${esc(c.name)}</td>
          <td class="small">${m.manual?L('match','match'):esc(roundName(m.round,totalRounds(c)))}</td>
          <td>${m.day?esc(dayShort(m.day)):`<i>${L('ej schemalagd','not scheduled')}</i>`}</td>
          <td>${m.time!=null?matchLabel(m):'-'}</td>
          <td>${m.court||'-'}</td>
          <td>${opp}</td>
          <td>${result}</td></tr>`;
      }
      html+=`</tbody></table></div></div>`;
    }
  }
  app.innerHTML=html;
  const si=document.getElementById("pSearchInput");
  si.oninput=e=>{ ui.psearch=e.target.value; ui._psf=true; render(); };
  if(ui._psf){ const el=document.getElementById("pSearchInput"); if(el){ el.focus(); el.setSelectionRange(el.value.length,el.value.length); } ui._psf=false; }
  const clr=document.getElementById("pClr"); if(clr) clr.onclick=()=>{ ui.psearch=""; ui._psf=true; render(); };
}

// Rensar HELA appen: deltagare, stegar, scheman, datum. Används av båda nollställ-knapparna.
async function resetEverything(){
  if(isArchived()){ alert("Turneringen är arkiverad (skrivskyddad). Lås upp den först för att nollställa."); return; }
  if(!confirm("Ny turnering – nollställ ALLT (deltagare, stegar och scheman i alla klasser)? Detta kan inte ångras.")) return;
  // Robust nollställning: rensa lagringen och ladda om sidan -> helt färskt tillstånd.
  try{ localStorage.removeItem(lsKey()); }catch(e){}
  state=newState(); state.updatedAt=Date.now();
  // Skriv den tomma turneringen till molnet FÖRST (annars hämtas gamla data tillbaka vid omladdning).
  if(cloudEnabled){ try{ cloudSetStatus("saving"); await cloudPut(state); }catch(e){} }
  try{ location.reload(); }catch(e){ saveLocal(); cloudSchedulePush(); ui={tab:"classes",classId:state.classes[0].id,day:null}; ensureDay(); render(); }
}
// Nollställer stegar OCH scheman (inkl. resultat) i alla klasser men behåller deltagarna
// i Klasser & deltagare. Stegarna TÖMS (byggs inte om) – deltagarlistorna är kvar och
// stegen byggs på nytt först när man låser deltagarna igen.
function resetBracketsAndSchedule(){
  if(!confirm("Nollställ Stege och Schema (inkl. alla resultat) i alla klasser?\nAlla stegar och scheman töms medan deltagarna i Klasser & deltagare behålls. Detta kan inte ångras.")) return;
  state.classes.forEach(c=>{ c.matches=[]; c.champion=null; });   // töm stege+schema, behåll deltagare
  state.extraCourts={}; state.lockedDays={}; state.planCourts={}; state.planFinalDays={};
  save(); render();
}
// Rensar HELA schemat (alla dagar) men behåller stegar och deltagare.
function clearAllSchedule(){
  if(!confirm("Rensa HELA schemat (alla dagar)? Matcherna blir oschemalagda – stegar och deltagare påverkas inte.")) return;
  realMatches().forEach(m=>{ m.day=null; m.court=null; m.time=null; });
  save(); render();
}
// Rensar stegen (matcher, resultat, mästare) för EN klass – deltagarna behålls.
function clearBracketOf(cls){
  if(!confirm(`Rensa stegen för ${cls.name}? Lottning, resultat och schemaläggning för klassen tas bort (deltagarna behålls).`)) return;
  cls.matches=[]; cls.champion=null;

// Lottar om / bygger stegen på nytt utifrån deltagarlistan.
function rebuildBracketOf(cls){
  if(cls.participants.length<2){ alert("Klassen har färre än 2 deltagare."); return; }
  if(cls.matches.some(m=>m.winner) && !confirm("Lotta om stegen? Registrerade resultat och schemaläggning för klassen försvinner.")) return;
  buildBracket(cls);
  save(); render();
}

// Balanserad trädlayout: final centrerad, jämna avstånd, tydliga vinkellinjer.
function layoutBracketEl(br){
  if(!br) return {width:0,height:0};
  const COLW=210, HGAP=52, VGAP=14, HEADH=24;
  const byRound={};
  br.querySelectorAll('.match').forEach(el=>{ const r=+el.dataset.r,i=+el.dataset.i; (byRound[r]=byRound[r]||[])[i]=el; });
  const rounds=Object.keys(byRound).map(Number).sort((a,b)=>a-b);
  const maxR=rounds[rounds.length-1];
  // 1) sätt bredd, mät höjder
  let maxH=0;
  br.querySelectorAll('.match').forEach(el=>{ el.style.width=COLW+'px'; });
  br.querySelectorAll('.match').forEach(el=>{ maxH=Math.max(maxH, el.offsetHeight); });
  const rowUnit=maxH+VGAP;
  const n0=(byRound[0]||[]).filter(Boolean).length;
  // 2) beräkna vertikala centrum
  const centers={};
  (byRound[0]||[]).forEach((el,i)=>{ if(el) centers['0_'+i]=HEADH + i*rowUnit + rowUnit/2; });
  for(let r=1;r<=maxR;r++){
    (byRound[r]||[]).forEach((el,j)=>{
      if(!el) return;
      const a=centers[(r-1)+'_'+(2*j)], b=centers[(r-1)+'_'+(2*j+1)];
      centers[r+'_'+j] = (a!=null&&b!=null) ? (a+b)/2 : (a!=null?a : (b!=null?b : HEADH+rowUnit/2));
    });
  }
  // 3) positionera matcher (inline position så det funkar även i exporterad bild)
  rounds.forEach(r=>{
    (byRound[r]||[]).forEach((el,i)=>{
      if(!el) return;
      el.style.position='absolute'; el.style.zIndex='1';
      el.style.left=(r*(COLW+HGAP))+'px';
      el.style.top=Math.round(centers[r+'_'+i]-el.offsetHeight/2)+'px';
    });
  });
  // 4) rubriker
  br.querySelectorAll('.rhead').forEach(h=>{ const r=+h.dataset.rh; h.style.position='absolute'; h.style.left=(r*(COLW+HGAP))+'px'; h.style.top='0px'; h.style.width=COLW+'px'; });
  // 5) container-storlek
  const width=(maxR+1)*(COLW+HGAP)-HGAP;
  const height=HEADH + Math.max(1,n0)*rowUnit + 8;
  br.style.width=width+'px'; br.style.height=height+'px';
  // 6) linjer
  const ns='http://www.w3.org/2000/svg';
  const oldsvg=br.querySelector('svg.brlines'); if(oldsvg) oldsvg.remove();
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('class','brlines');
  svg.style.cssText=`position:absolute;left:0;top:0;width:${width}px;height:${height}px;pointer-events:none;z-index:0`;
  const L=(x1,y1,x2,y2)=>{ const l=document.createElementNS(ns,'line'); l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2); l.setAttribute('stroke','#b9b19a'); l.setAttribute('stroke-width','2'); svg.appendChild(l); };
  for(let r=1;r<=maxR;r++){
    (byRound[r]||[]).forEach((el,j)=>{
      if(!el) return;
      const px=r*(COLW+HGAP), py=centers[r+'_'+j];
      const fx=(r-1)*(COLW+HGAP)+COLW, midX=fx+HGAP/2;
      const f0=centers[(r-1)+'_'+(2*j)], f1=centers[(r-1)+'_'+(2*j+1)];
      if(f0!=null && f1!=null){
        L(fx,f0,midX,f0); L(fx,f1,midX,f1); L(midX,f0,midX,f1); L(midX,py,px,py);
      } else {
        const fy=(f0!=null?f0:f1); if(fy!=null){ L(fx,fy,px,py); }
      }
    });
  }
  br.insertBefore(svg, br.firstChild);
  return {width, height};
}
function matchHTML(cls,m,total){
  const sel=ui.swapSel;
  // Vald spelare (för markering) – hämtas från den kanoniska round-0-platsen.
  const selPlayer = sel ? (cls.matches.find(x=>x.id===sel.id)||{})[sel.key] : null;
  const slotHTML=(p,key)=>{
    let cl="slot", nm=dispName(p);
    if(p===null){ cl+= (m.round===0?" bye":" tbd"); nm=(m.round===0?"BYE":"– vinnare –"); }
    if(m.winner && p && m.winner===p) cl+=" win";
    if(selPlayer && p && p===selPlayer) cl+=" swapsel";   // markera spelaren överallt (även i omgång 2)
    return `<div class="${cl}"><span class="nm" id="nm_${m.id}_${key}">${nm||""}</span>${m.winner===p?' 🏆':''}</div>`;
  };
  const sched = m.day?`<div class="sched-tag">${matchNoTag(m)}📅 ${dayShort(m.day)} · ${m.time!=null?matchLabel(m):'-'} · Bana ${m.court||'-'}</div>`
                     :(matchNumber(m)!=null?`<div class="sched-tag">${matchNoTag(m)}</div>`:"");
  const moveCls = (ui.moveMode && m.round===0) ? (ui.moveSel===m.id?" moveable movesel":" moveable") : "";
  const numCls = (ui.numMode && matchNumber(m)!=null) ? (ui.numSel===m.id?" numtarget numsel":" numtarget") : "";
  const playedCls = m.winner ? " played" : "";
  return `<div class="match${moveCls}${numCls}${playedCls}" data-r="${m.round}" data-i="${m.index}" style="border-left:5px solid ${classColor(cls)}">
     ${slotHTML(m.p1,"p1")}
     ${slotHTML(m.p2,"p2")}
     ${ (m.p1&&m.p2) ? (isAdmin() ? `<div class="scorerow">
         <input type="text" id="sc_${m.id}" value="${m.score||''}" placeholder="ex. 6-3 6-4">
         <select id="win_${m.id}" class="winsel" title="Välj vinnare">
           <option value="">Vinnare?</option>
           <option value="p1" ${m.winner===m.p1?'selected':''}>${dispName(m.p1)}</option>
           <option value="p2" ${m.winner===m.p2?'selected':''}>${dispName(m.p2)}</option>
         </select>
       </div>` : (m.score?`<div class="scorerow"><span class="small" style="padding:2px 2px">${m.score}</span></div>`:"") ):""}
     ${sched}
   </div>`;
}
// Byt plats på två hela matcher i omgång 0 (flyttar paren i trädet).
function handleMoveClick(cls,m){
  if(m.round!==0) return;
  if(!ui.moveSel){ ui.moveSel=m.id; render(); return; }
  if(ui.moveSel===m.id){ ui.moveSel=null; render(); return; }   // avmarkera
  const A=cls.matches.find(x=>x.id===ui.moveSel);
  if(!A){ ui.moveSel=null; render(); return; }
  // Byt hela innehållet (båda spelarna) mellan matcherna.
  const p1=A.p1, p2=A.p2; A.p1=m.p1; A.p2=m.p2; m.p1=p1; m.p2=p2;
  // Nollställ ev. resultat och nedströms-placering för de berörda matcherna.
  [A,m].forEach(x=>{ if(x.winner){ x.winner=null; x.score=""; } clearDownstream(cls,x); });
  ui.moveSel=null;
  resolveByes(cls); recompChampion(cls); save(); render();
}
// Byt matchnummer mellan två matcher (fungerar som byte av spelare). Påverkar bara numret.
function handleNumSwapClick(cls,m){
  if(matchNumber(m)==null) return;        // endast numrerade matcher (ej byes)
  assignSeqs(cls);                         // säkerställ att alla har ett fast nummer
  if(!ui.numSel){ ui.numSel=m.id; render(); return; }
  if(ui.numSel===m.id){ ui.numSel=null; render(); return; }   // avmarkera
  const A=cls.matches.find(x=>x.id===ui.numSel);
  if(A){ const tmp=A.seq; A.seq=m.seq; m.seq=tmp; }            // byt nummer
  ui.numSel=null; save(); render();
}
// Kanonisk round-0-plats för en klickad spelare. En spelare i omgång 0 pekar på sin
// egen plats; en spelare i senare omgång (t.ex. seedad som gått vidare på bye) pekar
// på sin round-0 bye-match. Spelare som nått hit via en spelad match går ej att flytta.
function canonicalRound0Slot(cls, m, slot){
  const player=m[slot];
  if(!player) return null;                       // tom plats / BYE / TBD
  if(m.round===0) return {id:m.id, key:slot};
  const orig=cls.matches.find(x=>x.round===0 && (x.p1===player||x.p2===player) && (x.p1===null||x.p2===null));
  if(!orig) return null;                          // beror på en spelad match – ej flyttbar
  return {id:orig.id, key: orig.p1===player?"p1":"p2"};
}
// Byt plats på två spelare i trädet. Fungerar även för en seedad spelare som visas i
// omgång 2 (byts då via sin round-0 bye-match) – dvs byte mellan omgång 1 och omgång 2.
function handleSwapClick(cls,m,slot){
  const canon=canonicalRound0Slot(cls,m,slot);
  if(!canon) return;                              // ej flyttbar plats
  if(!ui.swapSel){ ui.swapSel=canon; render(); return; }
  if(ui.swapSel.id===canon.id && ui.swapSel.key===canon.key){ ui.swapSel=null; render(); return; }
  const A=cls.matches.find(x=>x.id===ui.swapSel.id), aKey=ui.swapSel.key;
  const B=cls.matches.find(x=>x.id===canon.id), bKey=canon.key;
  if(!A||!B){ ui.swapSel=null; render(); return; }
  const tmp=A[aKey]; A[aKey]=B[bKey]; B[bKey]=tmp;   // byt plats på de två round-0-platserna
  [A,B].forEach(x=>{ if(x.winner){ x.winner=null; x.score=""; } clearDownstream(cls,x); });
  ui.swapSel=null;
  resolveByes(cls); recompChampion(cls); save(); render();
}

function allMatches(){ return state.classes.flatMap(c=>c.matches.map(m=>({...m,_cls:c}))); }
function realMatches(){ // riktiga matchobjekt (inte kopior)
  return state.classes.flatMap(c=>c.matches);
}
function findMatch(id){ for(const c of state.classes){ const m=c.matches.find(x=>x.id===id); if(m) return {m,c}; } return null; }

// Returnerar en Map: match-id -> Set av orsakstexter (varför matchen är röd/felkod).
// .has(id) fungerar precis som förr; .get(id) ger de konkreta orsakerna.
function conflicts(day){
  const bad=new Map();
  const add=(id,msg)=>{ if(!bad.has(id)) bad.set(id,new Set()); bad.get(id).add(msg); };
  const ms=realMatches().filter(m=>m.day===day && m.time!=null);
  const end=m=>m.time+matchDur(m);   // matchens sluttid (60 min senior även vid halvtimmesstart)
  // 1) Bana dubbelbokad – två matcher på samma bana med överlappande tid.
  for(let i=0;i<ms.length;i++) for(let j=i+1;j<ms.length;j++){
    const a=ms[i], b=ms[j];
    if(a.court!==b.court) continue;
    if(timeOverlap(a.time,end(a),b.time,end(b))){
      const msg=`Dubbelbokad bana: bana ${a.court} – ${fmtMin(a.time)}–${fmtMin(end(a))} och ${fmtMin(b.time)}–${fmtMin(end(b))} överlappar`;
      add(a.id,msg); add(b.id,msg);
    }
  }
  // 2) Spelarkrock – samma spelare i två matcher med överlappande tid (oavsett bana).
  // Deduplicera spelare inom EN match (samma namn i ett dubbellag räknas en gång).
  for(let i=0;i<ms.length;i++) for(let j=i+1;j<ms.length;j++){
    const a=ms[i], b=ms[j];
    if(!timeOverlap(a.time,end(a),b.time,end(b))) continue;
    const pb=new Set(playersOf(b));
    for(const p of new Set(playersOf(a))) if(pb.has(p)){
      const msg=`Spelarkrock: ${p} är inbokad på överlappande tider (${fmtMin(a.time)}–${fmtMin(end(a))} och ${fmtMin(b.time)}–${fmtMin(end(b))})`;
      add(a.id,msg); add(b.id,msg);
    }
  }
  // 3) För många matcher – en spelare har fler än 3 matcher samma dag (dubbletter i en match räknas en gång).
  const cnt={};
  for(const m of ms) for(const p of new Set(playersOf(m))){ (cnt[p]=cnt[p]||[]).push(m.id); }
  for(const p in cnt){ if(cnt[p].length>3){ const msg=`För många matcher: ${p} har ${cnt[p].length} matcher denna dag (max 3)`; cnt[p].forEach(id=>add(id,msg)); } }
  // 4) Tvingande deltagarönskemål som bryts (tid eller max matcher/dag).
  for(const m of ms){
    const tv=requestTimeViolation(m, day, m.time, "force");
    if(tv) add(m.id, `Önskemål (krav): ${tv.nm} kan inte spela kl ${fmtMin(tv.r.from)}–${fmtMin(tv.r.to)} denna dag`);
    const dv=requestDayViolation(m, day, "force");
    if(dv) add(m.id, `Önskemål (krav): ${dv.nm} vill max spela ${dv.r.max>0?dv.r.max:1} match(er) per dag`);
  }
  return bad;
}
// Hur många matcher en av matchens spelare redan har den dagen (exkl. matchen själv).
function playerDayCount(day,m){
  const ps=playersOf(m); let mx=0;
  for(const p of ps){
    const c=realMatches().filter(x=>x.day===day&&x.id!==m.id&&x.time!=null&&playersOf(x).includes(p)).length;
    if(c>mx) mx=c;
  }
  return mx;
}
// Spelar någon i matchen redan på en överlappande tid den dagen (annan bana)?
function sameTimeBusy(day,t,m){
  const ps=playersOf(m), dur=matchMinFor(getClass(m.classId).type);
  return realMatches().some(x=>x.day===day&&x.id!==m.id&&x.time!=null&&
     timeOverlap(t,t+dur,x.time,x.time+matchDur(x)) &&
     playersOf(x).some(p=>ps.includes(p)));
}

    const plHit=playersOf(m).some(p=>p.toLowerCase().includes(q));
    if(clsHit||plHit) hits.push({m,c});
  }
  hits.sort((a,b)=>{ const da=a.m.day, db=b.m.day; return da<db?-1:da>db?1:((a.m.time||0)-(b.m.time||0)); });
  if(!hits.length){ box.innerHTML=`<p class="small muted" style="margin:10px 0 0">Inga matcher matchar "${ui.schedSearch}" ${scopeAll?'i hela schemat':'på '+dayShort(ui.day)}.</p>`; return; }
  const played=hits.filter(h=>h.m.winner), upcoming=hits.filter(h=>!h.m.winner);
  const table=(list,title)=>{
    if(!list.length) return "";
    let h=`<h3 style="margin:12px 0 4px">${title} <span class="small muted">(${list.length})</span></h3>
      <table class="results"><thead><tr><th>Nr</th><th>Klass</th><th>Dag</th><th>Tid</th><th>Bana</th><th>Match</th><th>Resultat</th></tr></thead><tbody>`;
    for(const {m,c} of list){
      const vs=`${dispName(m.p1)||'<i style="color:#b3aa98">väntar</i>'} – ${dispName(m.p2)||'<i style="color:#b3aa98">väntar</i>'}`;
      h+=`<tr><td>${matchNumber(m)??'-'}</td><td><span class="cdot" style="background:${classColor(c)}"></span>${c.name}</td>
        <td>${dayShort(m.day)}</td><td>${m.time!=null?matchLabel(m):'-'}</td><td>${m.court||'-'}</td>
        <td>${vs}</td><td>${m.winner?`<b>${m.score||'WO'}</b> 🏆 ${dispName(m.winner)}`:''}</td></tr>`;
    }
    return h+`</tbody></table>`;
  };
  box.innerHTML = table(upcoming,"Kommande/ospelade") + table(played,"Spelade (med resultat)");
}
function dayTimes(day){
  return [...new Set([...daySlots(day),
     ...realMatches().filter(m=>m.day===day&&m.time!=null).map(m=>m.time)])].sort((a,b)=>a-b);
}
// Hela manuella rutnätet 08:00–21:00 (30 min-steg) + ev. schemalagda tider.
function fullDayTimes(day){
  const out=[]; for(let t=480;t<=1260;t+=30) out.push(t);
  return [...new Set([...out,
     ...realMatches().filter(m=>m.day===day&&m.time!=null).map(m=>m.time)])].sort((a,b)=>a-b);
}

function bindTileCtrls(){
  document.querySelectorAll(".mtile").forEach(tile=>{
    const id=tile.dataset.id; const {m}=findMatch(id)||{};
    if(!m) return;
    tile.querySelectorAll("select,input,button").forEach(ctrl=>{
      const f=ctrl.dataset.f; if(!f) return;
      if(f==="score"){ ctrl.onchange=()=>{ m.score=ctrl.value; save(); }; }
      else if(f==="winner"){ ctrl.onchange=()=>{ registerWinner(getClass(m.classId), m, ctrl.value); }; }
      else if(f==="remove"){ ctrl.onclick=()=>{ m.day=null;m.court=null;m.time=null; save(); render(); }; }

          save(); render();
        };
      }
    });
  });
}
