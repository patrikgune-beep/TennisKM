// Poäng-per-rond-rutnät (kropp, utan kort-omslag) för Resultat-fliken.
function amPlayerGridBody(cx){
  const pairsMode=cx.pairsMode, nR=cx.nR, esc=cx.esc;
  const rows=cx.st;
  if(!rows.length || !nR) return `<p class="muted">${L('Inga resultat ännu.','No results yet.')}</p>`;
  let head=`<th style="text-align:left">${pairsMode?L('Par','Pair'):L('Spelare','Player')}</th>`;
  for(let r=0;r<nR;r++) head+=`<th>${r+1}</th>`;
  head+=`<th style="background:var(--head);color:#fff">${L('Tot','Tot')}</th>`;
  let body="";
  rows.forEach(row=>{
    const id=pairsMode?row.k:row.i; let tds="";
    for(let ri=0;ri<nR;ri++){ const c=amRoundPointsFor(ri, !pairsMode, id);
      if(!c) tds+=`<td style="background:#eee;color:#aaa;font-size:11px">${L('vila','rest')}</td>`;
      else tds+=`<td>${c.pts==null?'·':`<b>${c.pts}</b>`}</td>`; }
    body+=`<tr><td style="text-align:left;white-space:nowrap">${esc(row.name)}</td>${tds}<td style="background:var(--head);color:#fff;font-weight:800">${row.pts}</td></tr>`;
  });
  return `<div style="overflow-x:auto"><table class="results" style="text-align:center"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table></div>
     <p class="small muted" style="margin:8px 0 0">${L('En kolumn per rond. "vila" = deltagaren spelade inte den ronden.','One column per round. "rest" = the player did not play that round.')}</p>`;
}
// Bind admin-handlers på Inställningar-fliken.
function bindAmSettings(cx){
  { const b=document.getElementById("amLockToggle"); if(b) b.onclick=()=>{ state.amLocked=!state.amLocked; save(); render(); }; }
  if(state.amLocked) return;   // låst: inga redigeringshandlers binds (fälten är inaktiverade)
  const readSettings=()=>{ const lines=document.getElementById("amPlayers").value.split("\n").map(s=>s.trim()).filter(Boolean);
    state.players=lines; state.amPointsTo=Math.max(1,parseInt(document.getElementById("amPoints").value,10)||24);
    state.courts=Math.max(1,parseInt(document.getElementById("amCourts").value,10)||state.courts); };
  const readSim=()=>{ const t=document.getElementById("amStart").value; if(timeToMin(t)!=null) state.amStart=t;
    state.amWarmup=Math.max(0,parseInt(document.getElementById("amWarmup").value,10)||0);
    const rm=document.getElementById("amRoundMin"); if(rm) state.amRoundMin=Math.max(1,parseInt(rm.value,10)||15);
    const mpp=document.getElementById("amMPP"); if(mpp) state.amMinPerPoint=Math.max(0.1,parseFloat(mpp.value)||0.6);
    const tr=document.getElementById("amTrans"); if(tr) state.amTransMin=Math.max(0,parseInt(tr.value,10)||0);
    const h=document.getElementById("amSimHours"); if(h){ const v=parseFloat(h.value); if(v>0) state.amPlanHours=v; } };
  { const s=document.getElementById("amMode"); if(s) s.onchange=()=>{ const nm=s.value==="pairs"?"pairs":"individual"; if(nm!==state.amScoreMode){ state.amScoreMode=nm; state.amRounds=[]; state.cmp=null; save(); render(); } }; }
  { const s=document.getElementById("amRoundByMode"); if(s) s.onchange=()=>{ readSettings(); state.amRoundBy=s.value==="points"?"points":"time"; save(); render(); }; }
  { const b=document.getElementById("amSavePlayers"); if(b) b.onclick=()=>{ readSettings(); save(); render(); }; }
  { const b=document.getElementById("amRenameSave"); if(b) b.onclick=()=>{
      // Byt endast NAMN på befintliga index (schema/resultat refererar till index och påverkas inte).
      document.querySelectorAll("[data-plname]").forEach(inp=>{ const i=+inp.dataset.plname, v=inp.value.trim(); if(v && i>=0 && i<state.players.length) state.players[i]=v; });
      save(); render();
    }; }
  { const b=document.getElementById("amGenerate"); if(b) b.onclick=()=>{
      readSettings();
      if(state.players.length<4){ alert(L("Minst 4 deltagare krävs.","At least 4 players required.")); return; }
      if(state.amRounds.length && !confirm(L("Generera om? Nuvarande schema och resultat ersätts.","Regenerate? The current schedule and results are replaced."))) return;
      const nr=Math.max(1,parseInt(document.getElementById("amNumRounds").value,10)||1);
      amGenerate(nr, state.courts); save(); render();
    }; }
  { const b=document.getElementById("amNextRound"); if(b) b.onclick=()=>{ readSettings(); amGenerateNextRound(); }; }
  { const b=document.getElementById("amResetSched"); if(b) b.onclick=()=>{
      if(state.amRounds.length && !confirm(L("Nollställ hela schemat och alla resultat?","Reset the whole schedule and all results?"))) return;
      state.amRounds=[]; state.cmp=null; state.kotcLadder=[]; save(); render();
    }; }
  { const b=document.getElementById("amReshuffle"); if(b) b.onclick=()=>{ readSettings(); amReshuffle(); }; }
  { const b=document.getElementById("amSimSave"); if(b) b.onclick=()=>{ readSim(); save(); render(); }; }
  { const b=document.getElementById("amGenSim"); if(b) b.onclick=()=>{
      readSettings(); readSim();
      const N=state.players.length, comps=cx.pairsMode?Math.floor(N/2):N, minComps=cx.isCompass?2:(cx.pairsMode?2:4);
      if(comps < minComps){ alert(L("För få deltagare för detta format.","Too few players for this format.")); return; }
      if(state.amRounds.length && !confirm(L("Generera om från simulering? Nuvarande schema och resultat ersätts.","Regenerate from simulation? The current schedule and results are replaced."))) return;
      const availMin = (state.amPlanHours>0?state.amPlanHours*60:0);
      const usable = Math.max(1, availMin - Math.max(0,+state.amWarmup||0) - amBreaksList().reduce((s,b)=>s+(+b.min||0),0));
      const sug = amSuggestPlan(state.format, N, state.courts, usable, amRoundSlotMin());
      if(!sug){ alert(L("Kunde inte beräkna schema.","Could not compute a schedule.")); return; }
      state.amPlanRounds = sug.rounds;
      if(cx.roundByRound){
        state.amRounds=[]; state.cmp=null;
        let ok; if(cx.isCompass) ok=compassNextRound(); else if(cx.isKotC) ok=kotcNextRound(state.courts); else ok=mexNextRound(state.courts);
        if(!ok){ alert(L("Kunde inte skapa ronden.","Could not create the round.")); return; }
      } else amGenerate(sug.rounds, state.courts);
      save(); render();
    }; }
  { const b=document.getElementById("amBrAdd"); if(b) b.onclick=()=>{
      const after=parseInt(document.getElementById("amBrAfter").value,10)||0, min=parseInt(document.getElementById("amBrMin").value,10)||0;
      if(after<1||min<1){ alert(L("Ange rond och pauslängd.","Enter round and break length.")); return; }
      if(!Array.isArray(state.amBreaks)) state.amBreaks=[];
      const ex=state.amBreaks.find(x=>x.after===after); if(ex) ex.min=min; else state.amBreaks.push({after,min});
      save(); render();
    }; }
  document.querySelectorAll("[data-brdel]").forEach(btn=>btn.onclick=()=>{
    const bi=+btn.dataset.brdel, list=amBreaksList(); const rm=list[bi];
    if(rm){ state.amBreaks=(state.amBreaks||[]).filter(b=>!(b.after===rm.after&&b.min===rm.min)); save(); render(); }
  });
  { const b=document.getElementById("amDelTourn"); if(b) b.onclick=()=>deleteTournament(TOURN_KEY); }
  bindFormatInfoCard();
}
function renderRotationFormat(){

  tabs.push(['about','❓ '+L('Om appen','About')]);

  if(!ui.amTab || !tabs.some(t=>t[0]===ui.amTab)) ui.amTab = admin?'settings':'leaderboard';

     `<button class="${t[0]===active?'active':''}" data-amtab="${t[0]}">${t[1]}</button>`).join("");

     <h2>${esc(state.tournament.name||"")} <span class="badge" style="background:#eef;color:#33507a">${esc(cx.fmtName)}</span></h2>
     <p class="small muted">${esc(arrangerName())} · ${cx.N} ${L('deltagare','players')} · ${cx.nR} ${L('ronder','rounds')} · ${state.amRoundBy==="points"?`${L('till','to')} ${state.amPointsTo} ${L('poäng/rond','pts/round')}`:`${amRoundDurationMin()} ${L('min/rond','min/round')}`} · ${cx.pairsMode?L('poäng per par','points per pair'):L('individuell poäng','individual points')}${(cx.t0!=null&&cx.nR)?` · ${L('start','start')} ${state.amStart} – ${L('slut','end')} ${minToTime(cx.endMin)} (${fmtDurationMin(cx.endMin-cx.t0)})`:''}</p>
   </div>`;
  let body="";
  if(active==="settings"&&admin) body=amTabSettingsHTML(cx);
  else if(active==="results") body=amTabResultsHTML(cx);
  else if(active==="leaderboard") body=amTabLeaderboardHTML(cx);
  else if(active==="slips") body=amTabSlipsHTML(cx);
  else if(active==="about"){ body=amTabAboutHTML(cx); }
  app.innerHTML=header+body;
  document.querySelectorAll("#tabs [data-amtab]").forEach(b=>b.onclick=()=>{ ui.amTab=b.dataset.amtab; render(); });
  if(active==="settings"&&admin){
    bindAmSettings(cx);
    if(state.amLocked) app.querySelectorAll("input,textarea,select,button").forEach(el=>{ if(el.id!=="amLockToggle") el.disabled=true; });
  }
  if(active==="results"){
    { const b=document.getElementById("amNextRound2"); if(b) b.onclick=amGenerateNextRound; const r=document.getElementById("amReshuffle"); if(r) r.onclick=amReshuffle; }
    document.querySelectorAll("[data-amview]").forEach(b=>b.onclick=()=>{ ui.amResultsView=b.dataset.amview; render(); });
    if(admin) bindAmScoreInputs();
    bindAmSearch();
  }
  if(active==="about") bindAmAbout(cx);
  if(active==="slips"){ const b=document.getElementById("amPrintSlips"); if(b) b.onclick=printMatchSlips; }
}

/* ----- Versionsstämpel (utifrån när denna index.html senast sparades) ----- */
function appVersionText(){
  const d=new Date(document.lastModified);
  if(isNaN(d)) return document.lastModified || "okänd";
  const p=n=>String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

/* ----- Tab: Statistik ----- */
function renderStats(){
  const days=getDays(), classes=visibleClasses();
  if(!days.length){ app.innerHTML=`<div class="card"><h2>Statistik</h2><p class="muted">Ange turneringens datum under <b>Klasser &amp; deltagare</b> först.</p></div>`; return; }
  const all=realMatches();
  const schedOf=(cid,date)=> all.filter(m=>m.classId===cid && m.day===date).length;

  // Fördela klassens kvarvarande (oschemalagda) matcher jämnt över dagarna t.o.m. finalen.
  function suggestPerDay(cls){
    const arr=days.map(()=>0);
    const fd=cls.type==="youth"?youthFinalDay():adultFinalDay();
    const fi=days.findIndex(d=>d.date===fd);
    const D=fi<0?days.length:fi+1;
    const kvar=Math.max(0, realMatchCount(cls) - all.filter(m=>m.classId===cls.id && m.day).length);
    if(D<=0 || kvar<=0) return arr;
    const base=Math.floor(kvar/D), extra=kvar%D;
    for(let di=0; di<Math.min(D,days.length); di++) arr[di]=base + (di >= D-extra ? 1 : 0);
    return arr;
  }
  // 1) Matris kategori × dag (schemalagda matcher) + Kvar + förslag/dag (rött inom parentes)
  let colTot=days.map(()=>0), grand=0, tKvar=0;
  let rowsHtml="";
  classes.forEach(c=>{
    let rowTot=0, cells="";
    const sugg=suggestPerDay(c);
    days.forEach((d,di)=>{
      const n=schedOf(c.id,d.date); rowTot+=n; colTot[di]+=n;
      const s=sugg[di];
      cells+=`<td>${n||''}${s>0?` <span style="color:#c0392b;font-weight:700">(${s})</span>`:''}</td>`;
    });
    grand+=rowTot;
    const kvar=Math.max(0, realMatchCount(c) - rowTot); tKvar+=kvar;
    rowsHtml+=`<tr><td style="text-align:left"><span class="cdot" style="background:${classColor(c)}"></span>${c.name}</td>${cells}<td><b>${rowTot||''}</b></td><td><b>${kvar||''}</b></td></tr>`;
  });
  let html=`<div class="card"><h2>Matcher per kategori och dag (schemalagda)</h2>
    <p class="small muted">Antal schemalagda matcher per dag och kategori. <b>Kvar</b> = matcher kvar att schemalägga t.o.m. finalen.
    Röd siffra <span style="color:#c0392b;font-weight:700">(n)</span> = förslag på hur många kvarvarande matcher som bör läggas den dagen fram till finalen.</p>
    <div style="overflow-x:auto"><table class="results"><thead><tr><th style="text-align:left">Kategori</th>${days.map(d=>`<th>${d.dow.slice(0,3)}<br>${d.short}</th>`).join("")}<th>Totalt</th><th>Kvar</th></tr></thead><tbody>
    ${rowsHtml}
    <tr style="background:#faf6ec"><td style="text-align:left"><b>Totalt/dag</b></td>${colTot.map(n=>`<td><b>${n||''}</b></td>`).join("")}<td><b>${grand}</b></td><td><b>${tKvar||''}</b></td></tr>
    </tbody></table></div></div>`;

  // 2) Totalt i turneringen och per kategori
  let tPlay=0,tSched=0,tDone=0, r2="";
  classes.forEach(c=>{
    const play=realMatchCount(c);
    const s=all.filter(m=>m.classId===c.id && m.day).length;
    const done=all.filter(m=>m.classId===c.id && m.winner && m.p1 && m.p2 && !isByeMatch(m)).length;
    tPlay+=play;tSched+=s;tDone+=done;
    if(play>0||s>0) r2+=`<tr><td style="text-align:left"><span class="cdot" style="background:${classColor(c)}"></span>${c.name}</td><td>${play}</td><td>${s}</td><td>${done}</td><td>${Math.max(0,play-done)}</td></tr>`;
  });
  html+=`<div class="card"><h2>Antal matcher totalt</h2>
    <p class="small muted">"Att spela" = totalt antal matcher i kategorin (deltagare − 1 + manuella).</p>
    <table class="results"><thead><tr><th style="text-align:left">Kategori</th><th>Att spela</th><th>Schemalagda</th><th>Spelade</th><th>Kvar</th></tr></thead><tbody>
    ${r2}
    <tr style="background:#faf6ec"><td style="text-align:left"><b>Hela turneringen</b></td><td><b>${tPlay}</b></td><td><b>${tSched}</b></td><td><b>${tDone}</b></td><td><b>${Math.max(0,tPlay-tDone)}</b></td></tr>
    </tbody></table></div>`;

  // 3) Matcher/dag som krävs till finalerna
  let r3="";
  classes.forEach(c=>{
    const play=realMatchCount(c); if(play===0) return;
    const fd=c.type==="youth"?youthFinalDay():adultFinalDay();
    const idx=days.findIndex(d=>d.date===fd);
    const daysBefore=idx<0?days.length:idx;
    const beforeFinal=Math.max(0,play-1);
    const perDay=daysBefore>0?Math.ceil(beforeFinal/daysBefore):beforeFinal;
    r3+=`<tr><td style="text-align:left">${c.name}</td><td>${play}</td><td>${idx<0?'–':dayLong(fd)}</td><td>${daysBefore}</td><td><b>${perDay}</b></td></tr>`;
  });
  const totalDays=days.length;
  html+=`<div class="card"><h2>Matcher/dag som krävs till finalerna</h2>
    <p class="small muted">Antal matcher per dag (summa över alla banor) som behöver spelas för att hinna klart före respektive finaldag.</p>
    <table class="results"><thead><tr><th style="text-align:left">Kategori</th><th>Matcher totalt</th><th>Final</th><th>Dagar före final</th><th>Matcher/dag som krävs</th></tr></thead><tbody>
    ${r3}
    <tr style="background:#faf6ec"><td style="text-align:left"><b>Hela turneringen (snitt)</b></td><td><b>${tPlay}</b></td><td>–</td><td><b>${totalDays}</b></td><td><b>${totalDays>0?Math.ceil(tPlay/totalDays):tPlay}</b></td></tr>
    </tbody></table></div>`;

  app.innerHTML=html;
}

// Läs in en uppladdad logga; rasterbilder skalas ned (max 512 px), SVG behålls som vektor.
function loadLogoFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    const src=reader.result;
    if(file.type==="image/svg+xml"){ state.logo=src; save(); render(); return; }
    const img=new Image();
    img.onload=()=>{
      const MAX=512, scale=Math.min(1, MAX/Math.max(img.width,img.height));
      const w=Math.max(1,Math.round(img.width*scale)), h=Math.max(1,Math.round(img.height*scale));
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      try{ state.logo=cv.toDataURL("image/png"); }catch(err){ state.logo=src; }
      save(); render();
    };
    img.onerror=()=>alert("Kunde inte läsa bilden.");
    img.src=src;
  };
  reader.onerror=()=>alert("Kunde inte läsa filen.");
  reader.readAsDataURL(file);
}

       <label class="small">${L('Till','To')}<br><input type="time" id="scSenWEnd" value="${minToTime(SC().seniorWeekendEnd)}"></label>

   <div class="card no-print">
     <h2>Spelplats / adress</h2>
     <textarea id="venue" placeholder="T.ex. Dalarö Tennisklubb, Odinsvägen 5, 137 70 Dalarö" style="min-height:64px">${String(state.venue||"")}</textarea>
   </div>
   <div class="card no-print">
     <h2>${L('Admin-PIN (publik/dold vy)','Admin PIN (public/hidden view)')}</h2>
     <p class="small muted">${L('Publika delen visar bara Turneringsinformation, Stege och Schema – utan möjlighet att ändra. Admin låses upp med denna PIN (knappen 🔒 Admin uppe till höger). Byt gärna till en egen kod.','The public part shows only Tournament info, Bracket and Schedule – with no editing. Admin is unlocked with this PIN (the 🔒 Admin button top right). Change it to your own code.')}</p>
     <div class="row" style="align-items:flex-end;gap:10px;flex-wrap:wrap">
       <label class="small">${L('Admin-PIN','Admin PIN')}<br>
         <input type="text" id="adminPinInput" value="${String(adminPin()).replace(/"/g,'&quot;')}" style="width:140px" autocomplete="off"></label>
       <button class="btn mini" id="savePinBtn">💾 ${L('Spara PIN','Save PIN')}</button>
       <span class="muted small">${L('Synkas till alla enheter. Obs: enkel spärr – koden går att hitta för tekniskt kunniga.','Synced to all devices. Note: simple protection – the code can be found by technical users.')}</span>
     </div>
   </div>
   <div class="card no-print">
     <h2>Språk / Language</h2>
     <label class="small">Språk / Language:
       <select id="langSel">
         <option value="sv" ${state.lang!=="en"?"selected":""}>Svenska</option>
         <option value="en" ${state.lang==="en"?"selected":""}>English</option>
       </select>
     </label>
   </div>
   <div class="card no-print">
     <h2>Nollställ</h2>
     <div class="row" style="align-items:center">
       <button class="btn gray" id="newTournament">🗑 Ny turnering, Nollställ allt</button>
       <span class="muted small">Tömmer deltagare, stegar och scheman i alla klasser (kan inte ångras).</span>
     </div>
   </div>`;
  // Språkval
  document.getElementById("langSel").onchange=e=>{ state.lang=e.target.value==="en"?"en":"sv"; save(); render(); };
  // Logga: ladda upp (skalas ned), samt återställ till standardlogga
  document.getElementById("logoBtn").onclick=()=>document.getElementById("logoFile").click();
  document.getElementById("logoFile").onchange=e=>{
    const f=e.target.files[0]; e.target.value=""; if(!f) return;
    if(!/^image\//.test(f.type)){ alert("Välj en bildfil (PNG, JPG eller SVG)."); return; }
    loadLogoFile(f);
  };
  const logoReset=document.getElementById("logoReset");
  if(logoReset) logoReset.onclick=()=>{ if(confirm("Återgå till standardloggan (klubbmärket)?")){ state.logo=null; save(); render(); } };
  // Bakgrundsfärg
  document.getElementById("bgColor").oninput=e=>{ state.bgColor=e.target.value; save(); applyTheme(); };
  document.getElementById("bgColor").onchange=e=>{ state.bgColor=e.target.value; save(); render(); };
  document.getElementById("bgReset").onclick=()=>{ state.bgColor=null; save(); render(); };
  // Rubrikfärg
  document.getElementById("headColor").oninput=e=>{ state.headColor=e.target.value; save(); applyTheme(); };
  document.getElementById("headColor").onchange=e=>{ state.headColor=e.target.value; save(); render(); };
  document.getElementById("headReset").onclick=()=>{ state.headColor=null; save(); render(); };
  // Spara namn/datum/banor
  document.getElementById("saveInfo").onclick=()=>{
    const name=document.getElementById("tName").value.trim();
    const s=document.getElementById("tStart").value, e=document.getElementById("tEnd").value;
    if(!s||!e){ alert("Ange både start- och slutdatum."); return; }
    if(parseDate(e) < parseDate(s)){ alert("Slutdatum måste vara samma dag eller efter startdatum."); return; }
    let c=parseInt(document.getElementById("tCourts").value,10); if(isNaN(c)||c<1)c=1; if(c>8)c=8;
    const arr=document.getElementById("tArranger").value.trim();
    state.tournament={ ...state.tournament, name:name||"Klubbmästerskap", start:s, end:e };
    state.arranger=arr||"Dalarö Tennisklubb";
    state.courts=c;
    ensureDay(); save(); render();
  };
  // Uppdatera webbläsarfliken (och sidhuvudet) LÖPANDE medan man skriver namn/arrangör.
  const liveTitle=()=>{
    document.title = `${state.tournament.name||"Klubbmästerskap"} – ${arrangerName()}`;
    const at=document.getElementById("appTitle"); if(at) at.textContent = state.tournament.name || "Klubbmästerskap";
    const as=document.getElementById("appSub"); if(as) as.textContent = `${arrangerName()} · ${tournamentRangeText()}`;
  };
  // --- Turneringar: skapa / byt / ta bort ---
  { const b=document.getElementById("tournNewBtn"); if(b) b.onclick=()=>{ const nm=prompt("Namn på den nya turneringen:"); if(nm!=null) createTournament(nm); }; }
  { const b=document.getElementById("tournCopyNewBtn"); if(b) b.onclick=()=>{ const nm=prompt(`Namn på den nya turneringen (kopia av "${state.tournament.name||TOURN_KEY}" – klasser och deltagare följer med, resultat nollställs):`); if(nm!=null) createTournamentCopy(nm); }; }
  { const b=document.getElementById("tournDelBtn"); if(b) b.onclick=()=>deleteTournament(TOURN_KEY); }
  { const b=document.getElementById("tournArchiveBtn");   if(b) b.onclick=archiveTournament; }
  { const b=document.getElementById("tournUnarchiveBtn"); if(b) b.onclick=unarchiveTournament; }
  { const b=document.getElementById("tournCopyBtn"); if(b) b.onclick=async ()=>{
      const ok=await copyTournLinkTo(); const msg=document.getElementById("tournMsg");
      if(ok && msg) msg.textContent="Länk kopierad: "+tournShareURL();
    }; }
  { const sel=document.getElementById("tournSwitch");
    if(sel && cloudEnabled){
      sel.onchange=()=>{ if(sel.value!==TOURN_KEY) switchTournament(sel.value); };
      cloudListTournaments().then(list=>{
        if(!Array.isArray(list)) list=[];
        if(!list.some(x=>x.key===TOURN_KEY)) list.push({key:TOURN_KEY, name:state.tournament.name});   // aktiv finns alltid med
        list.sort((a,b)=>String(a.name||a.key).localeCompare(String(b.name||b.key),"sv"));
        sel.innerHTML=list.map(x=>`<option value="${String(x.key).replace(/"/g,'&quot;')}"${x.key===TOURN_KEY?" selected":""}>${(x.name||x.key)}</option>`).join("");
        const msg=document.getElementById("tournMsg"); if(msg) msg.textContent=`${list.length} turnering(ar) i molnet.`;
      }).catch(e=>{ const msg=document.getElementById("tournMsg"); if(msg) msg.textContent="Kunde inte läsa turneringslistan: "+(e.message||e); });
    }
  }
  { const el=document.getElementById("tName");     if(el) el.oninput=()=>{ state.tournament.name=el.value; liveTitle(); save(); }; }
  { const el=document.getElementById("tArranger"); if(el) el.oninput=()=>{ state.arranger=el.value;      liveTitle(); save(); }; }
  // Tävlingsledare + spelplats sparas löpande
  const bindSave=(id,fn)=>{ const el=document.getElementById(id); if(el) el.oninput=()=>{ fn(el.value); save(); }; };
  bindSave("oName", v=>{ state.organizer.name=v; });
  bindSave("oPhone", v=>{ state.organizer.phone=v; });
  bindSave("oMail", v=>{ state.organizer.email=v; });
  bindSave("oChair", v=>{ state.chairman=v; });
  bindSave("venue", v=>{ state.venue=v; });
  document.getElementById("exportBtn").onclick=exportBackup;
  document.getElementById("importBtn").onclick=()=>document.getElementById("importFile").click();
  document.getElementById("newTournament").onclick=resetEverything;
  // Admin-PIN
  { const b=document.getElementById("savePinBtn"); if(b) b.onclick=()=>{
      const v=document.getElementById("adminPinInput").value.trim();
      if(!v){ alert(L("PIN får inte vara tom.","PIN cannot be empty.")); return; }
      state.adminPin=v; save();
      alert(L("Admin-PIN sparad och synkad.","Admin PIN saved and synced."));
    }; }
  // Molnsynk
  updateSyncBadge();
  { const b=document.getElementById("cloudPullBtn"); if(b) b.onclick=cloudForcePull; }
  { const b=document.getElementById("cloudPushBtn"); if(b) b.onclick=cloudForcePush; }
  // Tränare
  document.getElementById("addTrainer").onclick=()=>{ state.trainers.push(""); save(); render(); };
  document.querySelectorAll("#trainerList input[data-tr]").forEach(el=>el.oninput=()=>{ state.trainers[+el.dataset.tr]=el.value; save(); });
  document.querySelectorAll("[data-trdel]").forEach(b=>b.onclick=()=>{ state.trainers.splice(+b.dataset.trdel,1); save(); render(); });
  // Diplom – vilka namn som visas
  const dsBind=(id,key)=>{ const el=document.getElementById(id); if(el) el.onchange=()=>{ state.diplomaSigns[key]=el.checked; save(); }; };
  dsBind("dsDirector","director"); dsBind("dsChairman","chairman"); dsBind("dsTrainers","trainers");
  // Schemaläggning
  document.getElementById("scHasYouth").onchange=e=>{ state.sched.hasYouth=e.target.checked; save(); };
  document.getElementById("scHasSenior").onchange=e=>{ state.sched.hasSenior=e.target.checked; save(); };
  document.getElementById("saveSched").onclick=()=>{
    const s=state.sched, gv=id=>document.getElementById(id), tm=id=>timeToMin(gv(id).value), nv=(id,def)=>{ const v=parseInt(gv(id).value,10); return v>0?v:def; };
    const set={ youthStart:tm("scYouthStart"), youthEnd:tm("scYouthEnd"), youthDur:nv("scYouthDur",30),
      seniorStart:tm("scSeniorStart"), seniorEnd:tm("scSeniorEnd"), seniorWeekendStart:tm("scSenWStart"), seniorWeekendEnd:tm("scSenWEnd"),
      seniorDur:nv("scSeniorDur",60), breakEvery:Math.max(0,parseInt(gv("scBreakEvery").value,10)||0),
      lunchStart:tm("scLunchStart"), lunchEnd:tm("scLunchEnd"), breakName:gv("scBreakName").value.trim()||"Paus", lunchName:gv("scLunchName").value.trim()||"Paus" };
    if(set.youthEnd<=set.youthStart || set.seniorEnd<=set.seniorStart || set.seniorWeekendEnd<=set.seniorWeekendStart){ alert(L("Sluttiden måste vara efter starttiden.","End time must be after start time.")); return; }
    Object.assign(state.sched, set); save(); render();
  };
  document.getElementById("resetSched").onclick=()=>{ if(confirm(L("Återställ schemaläggningen till standard?","Reset scheduling to default?"))){ state.sched=defaultSched(); save(); render(); } };
}
// Publik (skrivskyddad) version av Turneringsinformation – bara visning, inga kontroller.
function renderInfoPublic(){
  const t=state.tournament||{}, o=state.organizer||{};
  const esc=s=>String(s==null?"":s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const rows=[];
  const add=(label,val)=>{ if(val && String(val).trim()) rows.push(`<tr><th style="text-align:left;padding:4px 14px 4px 0;vertical-align:top;white-space:nowrap;color:#6b6356;font-weight:600">${label}</th><td style="padding:4px 0">${esc(val)}</td></tr>`); };
  add(L('Turnering','Tournament'), t.name);
  add(L('Arrangör','Organizer'), state.arranger);
  add(L('Datum','Dates'), tournamentRangeText());
  add(L('Antal banor','Courts'), state.courts);
  add(L('Spelplats','Venue'), state.venue);
  add(L('Kontaktperson','Contact'), o.name);
  add(L('Telefon','Phone'), o.phone);
  add(L('E-post','Email'), o.email);
  add(L('Ordförande','Chairman'), state.chairman);
  const trainers=(state.trainers||[]).filter(x=>x&&x.trim());
  if(trainers.length) add(trainers.length>1?L('Tränare','Trainers'):L('Tränare','Trainer'), trainers.join(", "));

// Publik "Sök deltagare": klasser, schemalagda matcher och resultat för en person.
function renderPlayerSearch(){
  const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const nameOnSide=(side,name)=> side!=null && String(side).split("/").some(pp=>stripRank(pp)===name);
  const q=(ui.psearch||"").trim().toLowerCase();
  const idx=participantIndex("");                        // alla synliga klasser
  const matched = q ? idx.filter(r=>r.name.toLowerCase().includes(q)) : [];
  let html=`
   <div class="hint no-print">
     👁 <b>${L('Sök deltagare','Player search')}</b> – ${L('skriv ett namn för att se klasser, schemalagda matcher och resultat.','type a name to see classes, scheduled matches and results.')}
   </div>
   <div class="card">
     <h2>${L('Sök deltagare','Player search')}</h2>
     <div class="row">
       <input type="text" id="pSearchInput" placeholder="🔎 ${L('Skriv ett namn…','Type a name…')}" value="${esc(ui.psearch||'')}" style="min-width:240px">
       ${q?`<button class="btn ghost mini" id="pClr">✕ ${L('Rensa','Clear')}</button>`:''}
       <span class="pill">${idx.length} ${L('deltagare totalt','players total')}</span>
     </div>
   </div>`;
  if(!q){
    html+=`<div class="card"><p class="muted">${L('Skriv ett namn i sökrutan ovan för att söka.','Type a name in the search box above.')}</p></div>`;
  } else if(!matched.length){
    html+=`<div class="card"><p class="muted">${L('Ingen deltagare matchar','No player matches')} "${esc(ui.psearch)}".</p></div>`;
  } else {
    for(const r of matched){
      const pm=playerMatches(r.name,"");
      const played=pm.filter(x=>x.m.winner);
      const wins=played.filter(x=>nameOnSide(x.m.winner,r.name)).length;
      const losses=played.length-wins;
      html+=`<div class="card">
        <h2 style="margin:0 0 6px">${esc(r.name)}</h2>
        <div class="row" style="gap:6px;margin:0 0 4px">
          <span class="small muted">${L('Anmäld i','Registered in')}:</span>
          ${r.classes.map(cn=>`<span class="pill">${esc(cn)}</span>`).join("")}
        </div>
        ${played.length?`<p class="small" style="margin:6px 0 10px">${L('Spelade matcher','Played matches')}: <b>${played.length}</b> · <span style="color:var(--green)">${wins} ${L('vinster','wins')}</span> · ${losses} ${L('förluster','losses')}</p>`:''}`;
      if(!pm.length){
        html+=`<p class="small muted">${L('Inga matcher ännu.','No matches yet.')}</p></div>`;
        continue;
      }
      html+=`<div style="overflow-x:auto"><table class="results"><thead><tr>
          <th>${L('Nr','No')}</th><th>${L('Klass','Class')}</th><th>${L('Omgång','Round')}</th>
          <th>${L('Dag','Day')}</th><th>${L('Tid','Time')}</th><th>${L('Bana','Court')}</th>
          <th>${L('Motståndare','Opponent')}</th><th>${L('Resultat','Result')}</th></tr></thead><tbody>`;
      for(const {m,c} of pm){
        const oppSide = nameOnSide(m.p1,r.name) ? m.p2 : m.p1;
        const opp = oppSide!=null ? esc(dispName(oppSide)) : `<i style="color:#b3aa98">${L('väntar på motståndare','awaiting opponent')}</i>`;
        let result;
        if(m.winner){
          const won=nameOnSide(m.winner,r.name);
          result=`${esc(m.score||'WO')} · ${won?`<b style="color:var(--green)">✅ ${L('vinst','win')}</b>`:`<span class="muted">${L('förlust','loss')}</span>`}`;
        } else {
          result=`<span class="muted">${m.day?L('kommande','upcoming'):'–'}</span>`;
        }
        html+=`<tr>
          <td>${matchNumber(m)??'-'}</td>
          <td><span class="cdot" style="background:${classColor(c)}"></span>${esc(c.name)}</td>
          <td class="small">${m.manual?L('match','match'):esc(roundName(m.round,totalRounds(c)))}</td>
          <td>${m.day?esc(dayShort(m.day)):`<i>${L('ej schemalagd','not scheduled')}</i>`}</td>
          <td>${m.time!=null?matchLabel(m):'-'}</td>
          <td>${m.court||'-'}</td>
          <td>${opp}</td>
          <td>${result}</td></tr>`;
      }
      html+=`</tbody></table></div></div>`;
    }
  }
  app.innerHTML=html;
  const si=document.getElementById("pSearchInput");
  si.oninput=e=>{ ui.psearch=e.target.value; ui._psf=true; render(); };
  if(ui._psf){ const el=document.getElementById("pSearchInput"); if(el){ el.focus(); el.setSelectionRange(el.value.length,el.value.length); } ui._psf=false; }
  const clr=document.getElementById("pClr"); if(clr) clr.onclick=()=>{ ui.psearch=""; ui._psf=true; render(); };
}

// Rensar HELA appen: deltagare, stegar, scheman, datum. Används av båda nollställ-knapparna.
async function resetEverything(){
  if(isArchived()){ alert("Turneringen är arkiverad (skrivskyddad). Lås upp den först för att nollställa."); return; }
  if(!confirm("Ny turnering – nollställ ALLT (deltagare, stegar och scheman i alla klasser)? Detta kan inte ångras.")) return;
  // Robust nollställning: rensa lagringen och ladda om sidan -> helt färskt tillstånd.
  try{ localStorage.removeItem(lsKey()); }catch(e){}
  state=newState(); state.updatedAt=Date.now();
  // Skriv den tomma turneringen till molnet FÖRST (annars hämtas gamla data tillbaka vid omladdning).
  if(cloudEnabled){ try{ cloudSetStatus("saving"); await cloudPut(state); }catch(e){} }
  try{ location.reload(); }catch(e){ saveLocal(); cloudSchedulePush(); ui={tab:"classes",classId:state.classes[0].id,day:null}; ensureDay(); render(); }
}
// Nollställer stegar OCH scheman (inkl. resultat) i alla klasser men behåller deltagarna
// i Klasser & deltagare. Stegarna TÖMS (byggs inte om) – deltagarlistorna är kvar och
// stegen byggs på nytt först när man låser deltagarna igen.
function resetBracketsAndSchedule(){
  if(!confirm("Nollställ Stege och Schema (inkl. alla resultat) i alla klasser?\nAlla stegar och scheman töms medan deltagarna i Klasser & deltagare behålls. Detta kan inte ångras.")) return;
  state.classes.forEach(c=>{ c.matches=[]; c.champion=null; });   // töm stege+schema, behåll deltagare
  state.extraCourts={}; state.lockedDays={}; state.planCourts={}; state.planFinalDays={};
  save(); render();
}
// Rensar HELA schemat (alla dagar) men behåller stegar och deltagare.
function clearAllSchedule(){
  if(!confirm("Rensa HELA schemat (alla dagar)? Matcherna blir oschemalagda – stegar och deltagare påverkas inte.")) return;
  realMatches().forEach(m=>{ m.day=null; m.court=null; m.time=null; });
  save(); render();
}
// Rensar stegen (matcher, resultat, mästare) för EN klass – deltagarna behålls.
function clearBracketOf(cls){
  if(!confirm(`Rensa stegen för ${cls.name}? Lottning, resultat och schemaläggning för klassen tas bort (deltagarna behålls).`)) return;
  cls.matches=[]; cls.champion=null;
  save(); render();
}
// Lottar om / bygger stegen på nytt utifrån deltagarlistan.
function rebuildBracketOf(cls){
  if(cls.participants.length<2){ alert("Klassen har färre än 2 deltagare."); return; }
  if(cls.matches.some(m=>m.winner) && !confirm("Lotta om stegen? Registrerade resultat och schemaläggning för klassen försvinner.")) return;
  buildBracket(cls);
  save(); render();
}

// Balanserad trädlayout: final centrerad, jämna avstånd, tydliga vinkellinjer.
function layoutBracketEl(br){
  if(!br) return {width:0,height:0};
  const COLW=210, HGAP=52, VGAP=14, HEADH=24;
  const byRound={};
  br.querySelectorAll('.match').forEach(el=>{ const r=+el.dataset.r,i=+el.dataset.i; (byRound[r]=byRound[r]||[])[i]=el; });
  const rounds=Object.keys(byRound).map(Number).sort((a,b)=>a-b);
  const maxR=rounds[rounds.length-1];
  // 1) sätt bredd, mät höjder
  let maxH=0;
  br.querySelectorAll('.match').forEach(el=>{ el.style.width=COLW+'px'; });
  br.querySelectorAll('.match').forEach(el=>{ maxH=Math.max(maxH, el.offsetHeight); });
  const rowUnit=maxH+VGAP;
  const n0=(byRound[0]||[]).filter(Boolean).length;
  // 2) beräkna vertikala centrum
  const centers={};
  (byRound[0]||[]).forEach((el,i)=>{ if(el) centers['0_'+i]=HEADH + i*rowUnit + rowUnit/2; });
  for(let r=1;r<=maxR;r++){
    (byRound[r]||[]).forEach((el,j)=>{
      if(!el) return;
      const a=centers[(r-1)+'_'+(2*j)], b=centers[(r-1)+'_'+(2*j+1)];
      centers[r+'_'+j] = (a!=null&&b!=null) ? (a+b)/2 : (a!=null?a : (b!=null?b : HEADH+rowUnit/2));
    });
  }
  // 3) positionera matcher (inline position så det funkar även i exporterad bild)
  rounds.forEach(r=>{
    (byRound[r]||[]).forEach((el,i)=>{
      if(!el) return;
      el.style.position='absolute'; el.style.zIndex='1';
      el.style.left=(r*(COLW+HGAP))+'px';
      el.style.top=Math.round(centers[r+'_'+i]-el.offsetHeight/2)+'px';
    });
  });
  // 4) rubriker
  br.querySelectorAll('.rhead').forEach(h=>{ const r=+h.dataset.rh; h.style.position='absolute'; h.style.left=(r*(COLW+HGAP))+'px'; h.style.top='0px'; h.style.width=COLW+'px'; });
  // 5) container-storlek
  const width=(maxR+1)*(COLW+HGAP)-HGAP;
  const height=HEADH + Math.max(1,n0)*rowUnit + 8;
  br.style.width=width+'px'; br.style.height=height+'px';
  // 6) linjer
  const ns='http://www.w3.org/2000/svg';
  const oldsvg=br.querySelector('svg.brlines'); if(oldsvg) oldsvg.remove();
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('class','brlines');
  svg.style.cssText=`position:absolute;left:0;top:0;width:${width}px;height:${height}px;pointer-events:none;z-index:0`;
  const L=(x1,y1,x2,y2)=>{ const l=document.createElementNS(ns,'line'); l.setAttribute('x1',x1);l.setAttribute('y1',y1);l.setAttribute('x2',x2);l.setAttribute('y2',y2); l.setAttribute('stroke','#b9b19a'); l.setAttribute('stroke-width','2'); svg.appendChild(l); };
  for(let r=1;r<=maxR;r++){
    (byRound[r]||[]).forEach((el,j)=>{
      if(!el) return;
      const px=r*(COLW+HGAP), py=centers[r+'_'+j];
      const fx=(r-1)*(COLW+HGAP)+COLW, midX=fx+HGAP/2;
      const f0=centers[(r-1)+'_'+(2*j)], f1=centers[(r-1)+'_'+(2*j+1)];
      if(f0!=null && f1!=null){
        L(fx,f0,midX,f0); L(fx,f1,midX,f1); L(midX,f0,midX,f1); L(midX,py,px,py);
      } else {
        const fy=(f0!=null?f0:f1); if(fy!=null){ L(fx,fy,px,py); }
      }
    });
  }
  br.insertBefore(svg, br.firstChild);
  return {width, height};
}
function matchHTML(cls,m,total){
  const sel=ui.swapSel;
  // Vald spelare (för markering) – hämtas från den kanoniska round-0-platsen.
  const selPlayer = sel ? (cls.matches.find(x=>x.id===sel.id)||{})[sel.key] : null;
  const slotHTML=(p,key)=>{
    let cl="slot", nm=dispName(p);
    if(p===null){ cl+= (m.round===0?" bye":" tbd"); nm=(m.round===0?"BYE":"– vinnare –"); }
    if(m.winner && p && m.winner===p) cl+=" win";
    if(selPlayer && p && p===selPlayer) cl+=" swapsel";   // markera spelaren överallt (även i omgång 2)
    return `<div class="${cl}"><span class="nm" id="nm_${m.id}_${key}">${nm||""}</span>${m.winner===p?' 🏆':''}</div>`;
  };
  const sched = m.day?`<div class="sched-tag">${matchNoTag(m)}📅 ${dayShort(m.day)} · ${m.time!=null?matchLabel(m):'-'} · Bana ${m.court||'-'}</div>`
                     :(matchNumber(m)!=null?`<div class="sched-tag">${matchNoTag(m)}</div>`:"");
  const moveCls = (ui.moveMode && m.round===0) ? (ui.moveSel===m.id?" moveable movesel":" moveable") : "";
  const numCls = (ui.numMode && matchNumber(m)!=null) ? (ui.numSel===m.id?" numtarget numsel":" numtarget") : "";
  const playedCls = m.winner ? " played" : "";
  return `<div class="match${moveCls}${numCls}${playedCls}" data-r="${m.round}" data-i="${m.index}" style="border-left:5px solid ${classColor(cls)}">
     ${slotHTML(m.p1,"p1")}
     ${slotHTML(m.p2,"p2")}
     ${ (m.p1&&m.p2) ? (isAdmin() ? `<div class="scorerow">
         <input type="text" id="sc_${m.id}" value="${m.score||''}" placeholder="ex. 6-3 6-4">
         <select id="win_${m.id}" class="winsel" title="Välj vinnare">
           <option value="">Vinnare?</option>
           <option value="p1" ${m.winner===m.p1?'selected':''}>${dispName(m.p1)}</option>
           <option value="p2" ${m.winner===m.p2?'selected':''}>${dispName(m.p2)}</option>
         </select>
       </div>` : (m.score?`<div class="scorerow"><span class="small" style="padding:2px 2px">${m.score}</span></div>`:"") ):""}
     ${sched}
   </div>`;
}
// Byt plats på två hela matcher i omgång 0 (flyttar paren i trädet).
function handleMoveClick(cls,m){
  if(m.round!==0) return;
  if(!ui.moveSel){ ui.moveSel=m.id; render(); return; }
  if(ui.moveSel===m.id){ ui.moveSel=null; render(); return; }   // avmarkera
  const A=cls.matches.find(x=>x.id===ui.moveSel);
  if(!A){ ui.moveSel=null; render(); return; }
  // Byt hela innehållet (båda spelarna) mellan matcherna.
  const p1=A.p1, p2=A.p2; A.p1=m.p1; A.p2=m.p2; m.p1=p1; m.p2=p2;
  // Nollställ ev. resultat och nedströms-placering för de berörda matcherna.
  [A,m].forEach(x=>{ if(x.winner){ x.winner=null; x.score=""; } clearDownstream(cls,x); });
  ui.moveSel=null;
  resolveByes(cls); recompChampion(cls); save(); render();
}
// Byt matchnummer mellan två matcher (fungerar som byte av spelare). Påverkar bara numret.
function handleNumSwapClick(cls,m){
  if(matchNumber(m)==null) return;        // endast numrerade matcher (ej byes)
  assignSeqs(cls);                         // säkerställ att alla har ett fast nummer
  if(!ui.numSel){ ui.numSel=m.id; render(); return; }
  if(ui.numSel===m.id){ ui.numSel=null; render(); return; }   // avmarkera
  const A=cls.matches.find(x=>x.id===ui.numSel);
  if(A){ const tmp=A.seq; A.seq=m.seq; m.seq=tmp; }            // byt nummer
  ui.numSel=null; save(); render();
}
// Kanonisk round-0-plats för en klickad spelare. En spelare i omgång 0 pekar på sin
// egen plats; en spelare i senare omgång (t.ex. seedad som gått vidare på bye) pekar
// på sin round-0 bye-match. Spelare som nått hit via en spelad match går ej att flytta.
function canonicalRound0Slot(cls, m, slot){
  const player=m[slot];
  if(!player) return null;                       // tom plats / BYE / TBD
  if(m.round===0) return {id:m.id, key:slot};
  const orig=cls.matches.find(x=>x.round===0 && (x.p1===player||x.p2===player) && (x.p1===null||x.p2===null));
  if(!orig) return null;                          // beror på en spelad match – ej flyttbar
  return {id:orig.id, key: orig.p1===player?"p1":"p2"};
}
// Byt plats på två spelare i trädet. Fungerar även för en seedad spelare som visas i
// omgång 2 (byts då via sin round-0 bye-match) – dvs byte mellan omgång 1 och omgång 2.
function handleSwapClick(cls,m,slot){
  const canon=canonicalRound0Slot(cls,m,slot);
  if(!canon) return;                              // ej flyttbar plats
  if(!ui.swapSel){ ui.swapSel=canon; render(); return; }
  if(ui.swapSel.id===canon.id && ui.swapSel.key===canon.key){ ui.swapSel=null; render(); return; }
  const A=cls.matches.find(x=>x.id===ui.swapSel.id), aKey=ui.swapSel.key;
  const B=cls.matches.find(x=>x.id===canon.id), bKey=canon.key;
  if(!A||!B){ ui.swapSel=null; render(); return; }
  const tmp=A[aKey]; A[aKey]=B[bKey]; B[bKey]=tmp;   // byt plats på de två round-0-platserna
  [A,B].forEach(x=>{ if(x.winner){ x.winner=null; x.score=""; } clearDownstream(cls,x); });
  ui.swapSel=null;
  resolveByes(cls); recompChampion(cls); save(); render();
}

function allMatches(){ return state.classes.flatMap(c=>c.matches.map(m=>({...m,_cls:c}))); }
function realMatches(){ // riktiga matchobjekt (inte kopior)
  return state.classes.flatMap(c=>c.matches);
}
function findMatch(id){ for(const c of state.classes){ const m=c.matches.find(x=>x.id===id); if(m) return {m,c}; } return null; }

// Returnerar en Map: match-id -> Set av orsakstexter (varför matchen är röd/felkod).
// .has(id) fungerar precis som förr; .get(id) ger de konkreta orsakerna.
function conflicts(day){
  const bad=new Map();
  const add=(id,msg)=>{ if(!bad.has(id)) bad.set(id,new Set()); bad.get(id).add(msg); };
  const ms=realMatches().filter(m=>m.day===day && m.time!=null);
  const end=m=>m.time+matchDur(m);   // matchens sluttid (60 min senior även vid halvtimmesstart)
  // 1) Bana dubbelbokad – två matcher på samma bana med överlappande tid.
  for(let i=0;i<ms.length;i++) for(let j=i+1;j<ms.length;j++){
    const a=ms[i], b=ms[j];
    if(a.court!==b.court) continue;
    if(timeOverlap(a.time,end(a),b.time,end(b))){
      const msg=`Dubbelbokad bana: bana ${a.court} – ${fmtMin(a.time)}–${fmtMin(end(a))} och ${fmtMin(b.time)}–${fmtMin(end(b))} överlappar`;
      add(a.id,msg); add(b.id,msg);
    }
  }
  // 2) Spelarkrock – samma spelare i två matcher med överlappande tid (oavsett bana).
  // Deduplicera spelare inom EN match (samma namn i ett dubbellag räknas en gång).
  for(let i=0;i<ms.length;i++) for(let j=i+1;j<ms.length;j++){
    const a=ms[i], b=ms[j];
    if(!timeOverlap(a.time,end(a),b.time,end(b))) continue;
    const pb=new Set(playersOf(b));
    for(const p of new Set(playersOf(a))) if(pb.has(p)){
      const msg=`Spelarkrock: ${p} är inbokad på överlappande tider (${fmtMin(a.time)}–${fmtMin(end(a))} och ${fmtMin(b.time)}–${fmtMin(end(b))})`;
      add(a.id,msg); add(b.id,msg);
    }
  }
  // 3) För många matcher – en spelare har fler än 3 matcher samma dag (dubbletter i en match räknas en gång).
  const cnt={};
  for(const m of ms) for(const p of new Set(playersOf(m))){ (cnt[p]=cnt[p]||[]).push(m.id); }
  for(const p in cnt){ if(cnt[p].length>3){ const msg=`För många matcher: ${p} har ${cnt[p].length} matcher denna dag (max 3)`; cnt[p].forEach(id=>add(id,msg)); } }
  // 4) Tvingande deltagarönskemål som bryts (tid eller max matcher/dag).
  for(const m of ms){
    const tv=requestTimeViolation(m, day, m.time, "force");
    if(tv) add(m.id, `Önskemål (krav): ${tv.nm} kan inte spela kl ${fmtMin(tv.r.from)}–${fmtMin(tv.r.to)} denna dag`);
    const dv=requestDayViolation(m, day, "force");
    if(dv) add(m.id, `Önskemål (krav): ${dv.nm} vill max spela ${dv.r.max>0?dv.r.max:1} match(er) per dag`);
  }
  return bad;
}
// Hur många matcher en av matchens spelare redan har den dagen (exkl. matchen själv).
function playerDayCount(day,m){
  const ps=playersOf(m); let mx=0;
  for(const p of ps){
    const c=realMatches().filter(x=>x.day===day&&x.id!==m.id&&x.time!=null&&playersOf(x).includes(p)).length;
    if(c>mx) mx=c;
  }
  return mx;
}
// Spelar någon i matchen redan på en överlappande tid den dagen (annan bana)?
function sameTimeBusy(day,t,m){
  const ps=playersOf(m), dur=matchMinFor(getClass(m.classId).type);
  return realMatches().some(x=>x.day===day&&x.id!==m.id&&x.time!=null&&
     timeOverlap(t,t+dur,x.time,x.time+matchDur(x)) &&
     playersOf(x).some(p=>ps.includes(p)));
}

// Sök i schemat: matcha klassnamn eller deltagarnamn, vald dag eller hela schemat.
function renderSchedSearch(){
  const box=document.getElementById("schedSearchRes"); if(!box) return;
  const q=(ui.schedSearch||"").trim().toLowerCase();
  if(!q){ box.innerHTML=""; return; }
  const scopeAll = ui.schedScope==='all';
  const hits=[];
  for(const c of state.classes) for(const m of c.matches){
    if(!m.day) continue;                          // endast schemalagda matcher
    if(!scopeAll && m.day!==ui.day) continue;
    const clsHit=c.name.toLowerCase().includes(q);
    const plHit=playersOf(m).some(p=>p.toLowerCase().includes(q));
    if(clsHit||plHit) hits.push({m,c});
  }
  hits.sort((a,b)=>{ const da=a.m.day, db=b.m.day; return da<db?-1:da>db?1:((a.m.time||0)-(b.m.time||0)); });
  if(!hits.length){ box.innerHTML=`<p class="small muted" style="margin:10px 0 0">Inga matcher matchar "${ui.schedSearch}" ${scopeAll?'i hela schemat':'på '+dayShort(ui.day)}.</p>`; return; }
  const played=hits.filter(h=>h.m.winner), upcoming=hits.filter(h=>!h.m.winner);
  const table=(list,title)=>{
    if(!list.length) return "";
    let h=`<h3 style="margin:12px 0 4px">${title} <span class="small muted">(${list.length})</span></h3>
      <table class="results"><thead><tr><th>Nr</th><th>Klass</th><th>Dag</th><th>Tid</th><th>Bana</th><th>Match</th><th>Resultat</th></tr></thead><tbody>`;
    for(const {m,c} of list){
      const vs=`${dispName(m.p1)||'<i style="color:#b3aa98">väntar</i>'} – ${dispName(m.p2)||'<i style="color:#b3aa98">väntar</i>'}`;
      h+=`<tr><td>${matchNumber(m)??'-'}</td><td><span class="cdot" style="background:${classColor(c)}"></span>${c.name}</td>
        <td>${dayShort(m.day)}</td><td>${m.time!=null?matchLabel(m):'-'}</td><td>${m.court||'-'}</td>
        <td>${vs}</td><td>${m.winner?`<b>${m.score||'WO'}</b> 🏆 ${dispName(m.winner)}`:''}</td></tr>`;
    }
    return h+`</tbody></table>`;
  };
  box.innerHTML = table(upcoming,"Kommande/ospelade") + table(played,"Spelade (med resultat)");
}
function dayTimes(day){
  return [...new Set([...daySlots(day),
     ...realMatches().filter(m=>m.day===day&&m.time!=null).map(m=>m.time)])].sort((a,b)=>a-b);
}
// Hela manuella rutnätet 08:00–21:00 (30 min-steg) + ev. schemalagda tider.
function fullDayTimes(day){
  const out=[]; for(let t=480;t<=1260;t+=30) out.push(t);
  return [...new Set([...out,
     ...realMatches().filter(m=>m.day===day&&m.time!=null).map(m=>m.time)])].sort((a,b)=>a-b);
}
function renderSchedGrid(){
  const wrap=document.getElementById("schedWrap");
  const day=ui.day;
  const courts=courtsForDay(day);
  const bad=conflicts(day);
  const times = ui.fullGrid ? fullDayTimes(day) : dayTimes(day);
  // Färgförklaring för klasserna (de som har matcher)
  const used=state.classes.filter(c=>c.matches.length);
  const legend = used.length
    ? `<div class="legend no-print">${used.map(c=>`<span class="item"><span class="sw" style="background:${classColor(c)}"></span>${c.name}</span>`).join("")}</div>`
    : "";
  let html=`<table class="schedtable"><thead><tr><th>Tid</th>${
     Array.from({length:courts},(_,i)=>`<th>Bana ${i+1}</th>`).join("")}</tr></thead><tbody>`;
  let prevEnd=null;
  for(const t of times){
    // Visa paus-/lunchluckor i normalläge (i "visa alla tider" är alla rader redan med).
    if(!ui.fullGrid && prevEnd!=null && t>prevEnd){
      const isLunch = isLunchGap(prevEnd,t);
      const cl = isLunch ? 'lunch' : 'pausrow';
      const txt= isLunch ? ('🍽 '+breakName(true)) : ('⏸ '+breakName(false)+' – '+L('ledig lucka (kan schemaläggas manuellt)','free slot (can be scheduled manually)'));
      html+=`<tr><td class="time">${fmtMin(prevEnd)}–${fmtMin(t)}</td><td class="${cl}" colspan="${courts}">${txt}</td></tr>`;
    }
    const lunchRow = ui.fullGrid && (t===720 || t===750);
    html+=`<tr><td class="time">${timeLabel(t, day)}${lunchRow?' 🍽':''}</td>`;
    for(let ct=1;ct<=courts;ct++){
      const here=realMatches().filter(m=>m.day===day&&m.time===t&&m.court===ct&&!getClass(m.classId).hidden);
      html+=`<td class="slotcell">${here.map(m=>mtileHTML(m,bad)).join("")}</td>`;
    }
    html+=`</tr>`;
    prevEnd = Math.max(prevEnd||0, t + slotDur(t, day));
  }
  html+=`</tbody></table>`;
  wrap.innerHTML=legend+html;
  bindTileCtrls();
}
function mtileHTML(m,bad){
  const c=getClass(m.classId);
  const conf=bad.has(m.id)?" conflict":"";
  const reasons=bad.has(m.id)?[...bad.get(m.id)]:[];
  const escAttr=s=>String(s).replace(/"/g,"&quot;");
  const conflictMsg=reasons.length
    ? `<div class="conflictmsg" title="${escAttr(reasons.join(" • "))}">⚠ ${reasons.map(r=>`<span>${r}</span>`).join("")}</div>` : "";
  // Mjukt önskemål (Önskar) som matchen krockar med – gul notering (tvingande visas rött ovan).
  const softV = (m.p1&&m.p2) ? (requestTimeViolation(m,m.day,m.time,"wish") || requestDayViolation(m,m.day,"wish")) : null;
  const softMsg = softV ? `<div class="softreq">🔸 ${L('Önskemål (Önskar)','Request (Wish)')}: ${softV.nm}</div>` : "";
  const dayCourts=courtsForDay(m.day||ui.day);
  const courtOpts=Array.from({length:dayCourts},(_,i)=>`<option value="${i+1}" ${m.court===i+1?'selected':''}>Bana ${i+1}</option>`).join("");
  const tset=[...new Set([...manualSlots(c.type), ...(m.time!=null?[m.time]:[])])].sort((a,b)=>a-b);
  const timeOpts=tset.map(t=>`<option value="${t}" ${m.time===t?'selected':''}>${fmtMin(t)}</option>`).join("");
  const dayOpts=getDays().map(d=>`<option value="${d.date}" ${m.day===d.date?'selected':''}>${d.dow.slice(0,3)} ${d.short}</option>`).join("");
  const col=classColor(c);
  const locked=dayLocked(m.day);
  const winsel=(m.p1&&m.p2)?`<div class="ctrls no-print" style="margin-top:3px">
       <input type="text" data-f="score" value="${m.score||''}" placeholder="resultat" style="flex:1;min-width:40px" ${locked?'disabled':''}>
       <select data-f="winner" title="Registrera vinnare (uppdaterar stegen)" ${locked?'disabled':''}>
         <option value="">Vinnare?</option>
         <option value="p1" ${m.winner===m.p1?'selected':''}>${dispName(m.p1)}</option>
         <option value="p2" ${m.winner===m.p2?'selected':''}>${dispName(m.p2)}</option>
       </select>
     </div>`:"";
  return `<div class="mtile${conf}${locked?' locked':''}${m.winner?' played':''}" data-id="${m.id}" style="border-left-color:${col}">
     <div class="cls"><span class="cdot" style="background:${col}"></span>${matchNoTag(m)}${c.name}${locked?' <span class="lockmark">🔒</span>':''}${stageTag(c,m)}</div>
     <div class="vs">${slotFeedLabel(c,m,0)} <span class="muted">vs</span> ${slotFeedLabel(c,m,1)}${m.winner?` <span style="color:var(--green)">🏆 ${dispName(m.winner)}</span>`:''}</div>
     ${conflictMsg}
     ${softMsg}
     ${winsel}
     <div class="ctrls no-print">
       <select data-f="day" ${locked?'disabled':''}>${dayOpts}</select>
       <select data-f="time" ${locked?'disabled':''}>${timeOpts}</select>
       <select data-f="court" ${locked?'disabled':''}>${courtOpts}</select>
       <button class="btn gray mini" data-f="remove" ${locked?'disabled':''}>✕</button>
     </div></div>`;
}
function bindTileCtrls(){
  document.querySelectorAll(".mtile").forEach(tile=>{
    const id=tile.dataset.id; const {m}=findMatch(id)||{};
    if(!m) return;
    tile.querySelectorAll("select,input,button").forEach(ctrl=>{
      const f=ctrl.dataset.f; if(!f) return;
      if(f==="score"){ ctrl.onchange=()=>{ m.score=ctrl.value; save(); }; }
      else if(f==="winner"){ ctrl.onchange=()=>{ registerWinner(getClass(m.classId), m, ctrl.value); }; }
      else if(f==="remove"){ ctrl.onclick=()=>{ m.day=null;m.court=null;m.time=null; save(); render(); }; }
      else if(ctrl.tagName==="SELECT"){
        ctrl.onchange=()=>{
          if(f==="day"){
            m.day=ctrl.value;
            if(getClass(m.classId).type==="youth" && isWeekend(m.day))
              alert("Obs: ungdomsklass på helg – normalt spelar endast seniorer lör/sön.");
          } else m[f]= parseInt(ctrl.value,10);
          save(); render();
        };
      }
    });
  });
}
function renderUnsched(){
  const box=document.getElementById("unsched");
  // Gruppera de spelklara, oschemalagda matcherna per klass (klassordning) för tydlig överblick.
  const groups=visibleClasses().map(c=>({
    c, ms: c.matches.filter(m=>isReady(m)&&!m.day).sort((a,b)=>(matchNumber(a)||0)-(matchNumber(b)||0))
  })).filter(g=>g.ms.length);

/* ----- Schemaläggning ----- */
function dayHasFinalsAllowed(cls,m,day){
  if(!isFinal(cls,m)) return true;
  return cls.type==="youth" ? day===youthFinalDay() : day===adultFinalDay();
}
// Auto: ungdom endast vardagar; senior alla dagar.
function canPlayDayAuto(cls,day){ return cls.type==="youth" ? youthAllowedAuto(day) : true; }

/* ----- Deltagarönskemål (Önskar / Tvingar) ----- */
// Alla önskemål för en spelare (matchar på namn utan rank).
function requestsForPlayer(name){ name=stripRank(name); return (state.requests||[]).filter(r=>stripRank(r.player)===name); }
// Antal schemalagda matcher en spelare (namn) har en viss dag (exkl. angiven match).
function playerMatchCountOnDay(name, day, exceptId){
  name=stripRank(name);
  return realMatches().filter(x=>x.day===day && x.id!==exceptId && x.time!=null && new Set(playersOf(x)).has(name)).length;
}
// Lägsta hårda (Tvingar) max-matcher/dag för spelaren den dagen, annars null.
function hardMaxPerDay(name, date){
  let mn=null;
  for(const r of requestsForPlayer(name)){
    if(r.level==="force" && r.type==="maxperday" && (!r.day || r.day===date)){
      const v=r.max>0?r.max:1; mn=(mn==null?v:Math.min(mn,v));
    }
  }
  return mn;
}
// Bryter en placering av m på (day,time) mot ett tidsönskemål av given nivå ('force'|'wish')?
function requestTimeViolation(m, day, time, level){
  if(time==null) return null;
  const dur=matchMinFor(getClass(m.classId).type);
  for(const nm of new Set(playersOf(m))){
    for(const r of requestsForPlayer(nm)){
      if(r.level!==level || r.type!=="unavail") continue;
      if(r.day===day && r.from!=null && r.to!=null && time < r.to && r.from < time+dur) return {r, nm};
    }
  }
  return null;
}
// Bryter en placering av m på day mot ett max-matcher/dag-önskemål av given nivå?
function requestDayViolation(m, day, level){
  for(const nm of new Set(playersOf(m))){
    for(const r of requestsForPlayer(nm)){
      if(r.level!==level || r.type!=="maxperday") continue;
      if(r.day && r.day!==day) continue;
      const max=r.max>0?r.max:1;
      if(playerMatchCountOnDay(nm, day, m.id) + 1 > max) return {r, nm};
    }
  }
  return null;
}
// Schemalagda matcher som krockar med ett önskemål (för Önskemål-fliken).
function requestConflictMatches(r){
  const name=stripRank(r.player);
  const sched=realMatches().filter(m=>m.day && m.time!=null && new Set(playersOf(m)).has(name));
  if(r.type==="unavail"){
    return sched.filter(m=>{ if(m.day!==r.day) return false; const dur=matchMinFor(getClass(m.classId).type); return m.time < r.to && r.from < m.time+dur; });
  }
  const max=r.max>0?r.max:1, byDay={}, out=[];
  for(const m of sched){ if(r.day && m.day!==r.day) continue; (byDay[m.day]=byDay[m.day]||[]).push(m); }
  for(const d in byDay){ if(byDay[d].length>max) out.push(...byDay[d]); }
  return out;
}
// Försök placera m på dagen. opts.manual = strunta i veckodagsregeln (men varna ej här).
// opts.requireUnused = placera bara om ingen av spelarna redan spelar den dagen.
function placeMatch(m,day,opts={}){
  const cls=getClass(m.classId);
  if(!opts.manual && !canPlayDayAuto(cls,day)) return false;
  if(playerDayCount(day,m) >= 3) return false;                  // max 3 matcher/dag/person
  if(opts.requireUnused && playerDayCount(day,m) > 0) return false;
  if(requestDayViolation(m, day, "force")) return false;        // hårt önskemål: max matcher/dag
  const courts=courtsForDay(day), dur=matchMinFor(cls.type);
  let fallback=null;   // första hårt-OK-slot även om ett Önskar-önskemål bryts
  for(const t of slotsFor(cls.type, day)){
    if(sameTimeBusy(day,t,m)) continue;                         // ej överlappande tid på annan bana
    for(let ct=1;ct<=courts;ct++){
      // Banan får inte vara upptagen av en överlappande match (t.ex. manuell halvtimmesmatch).
      if(realMatches().some(x=>x.day===day&&x.court===ct&&x.id!==m.id&&x.time!=null&&timeOverlap(t,t+dur,x.time,x.time+matchDur(x)))) continue;
      if(requestTimeViolation(m, day, t, "force")) continue;    // hårt tidsförbud – hoppa alltid över
      // Mjukt önskemål (Önskar): spara som reserv men försök hitta en bättre tid.
      if(!opts.manual && (requestTimeViolation(m,day,t,"wish") || requestDayViolation(m,day,"wish"))){
        if(!fallback) fallback={ct,t}; continue;
      }
      m.day=day; m.court=ct; m.time=t; return true;
    }
  }
  if(fallback){ m.day=day; m.court=fallback.ct; m.time=fallback.t; return true; }
  return false;
}
// Manuell placering (via knappar): tillåt flera matcher/dag (max 3), varna vid avvikelse.
function manualPlace(m,day){
  const cls=getClass(m.classId);
  if(playerDayCount(day,m) >= 3)
    return {ok:false, msg:"En av spelarna har redan 3 matcher den dagen (max 3 tillåts)."};
  if(!placeMatch(m,day,{manual:true}))
    return {ok:false, msg:`Ingen ledig tid på ${dayShort(day)} (banor upptagna, spelarkrock eller tvingande önskemål vid alla tider).`};
  let warn="";
  if(cls.type==="youth" && isWeekend(day))
    warn="Obs: ungdomsklass schemalagd på helg – normalt spelar endast seniorer lör/sön.";
  // Varna om placeringen bryter mot ett "Önskar"-önskemål (tillåts, men noteras).
  const sv=requestTimeViolation(m,day,m.time,"wish")||requestDayViolation(m,day,"wish");
  if(sv) warn=(warn?warn+"\n":"")+`Obs: matchen krockar med ett önskemål (Önskar) för ${sv.nm}.`;
  return {ok:true, warn};
}
// Är alla matcher i en omgång färdigspelade (byes räknas som klara)?
function roundComplete(cls,r){
  const ms=cls.matches.filter(m=>m.round===r);
  return ms.length>0 && ms.every(m=>m.winner);
}
// Auto: spela klart en hel omgång i klassen innan nästa omgång schemaläggs
// (kan stängas av via "Tillåt senare omgångar" i Schema-fliken).
function roundReadyForAuto(cls,m){
  if(state.allowEarlyRounds) return true;
  if(m.manual || m.round===0) return true;
  return roundComplete(cls, m.round-1);
}
function generateDay(day){
  const sortFn=(a,b)=>((a.round==null?99:a.round)-(b.round==null?99:b.round));
  const ok=(m,cls)=>!cls.hidden && dayHasFinalsAllowed(cls,m,day) && canPlayDayAuto(cls,day) && roundReadyForAuto(cls,m);
  // Pass 1: prioritera matcher där ingen spelare redan spelar den dagen (undvik flera/dag).
  realMatches().filter(m=>isReady(m)&&!m.day).sort(sortFn).forEach(m=>{
    const cls=getClass(m.classId);
    if(ok(m,cls)) placeMatch(m,day,{requireUnused:true});
  });
  // Pass 2: fyll resten (upp till 3 matcher/dag/person).
  realMatches().filter(m=>isReady(m)&&!m.day).sort(sortFn).forEach(m=>{
    const cls=getClass(m.classId);
    if(ok(m,cls)) placeMatch(m,day);
  });
}

/* ================= Hel turneringsplanering (egen flik) ================= */
// Vald finaldag för en klass (fallback till standard: ungdom näst sista, övriga sista dagen).
function classFinalDay(cls){
  const days=getDays();
  const chosen=state.planFinalDays && state.planFinalDays[cls.id];
  const def = cls.type==="youth" ? youthFinalDay() : adultFinalDay();
  let d = (chosen && days.some(x=>x.date===chosen)) ? chosen : def;
  if(cls.type==="youth" && d && isWeekend(d)){          // juniorfinal måste vara vardag
    const idx=days.findIndex(x=>x.date===d);
    for(let i=idx;i>=0;i--){ if(!isWeekend(days[i].date)){ d=days[i].date; break; } }
  }
  return d;
}
// Är dagen en finaldag för någon (synlig) klass?
function isPlanFinalDay(date){ return visibleClasses().some(c=>c.matches.some(m=>!m.manual)&&classFinalDay(c)===date); }
// Kandidat-starttider (minuter) i prioritetsordning för en typ/dag. seniorEarly = juniorer klara.
function planCandidateTimes(type, date, seniorEarly){
  const s=SC(), push=(a,st,e,step)=>{ for(let t=st;t<=e;t+=step) a.push(t); return a; };
  if(type==="youth"){
    const yd=s.youthDur, lastY=s.youthEnd-yd;
    return [...push([],s.youthStart,lastY,yd), s.youthStart-yd, 480, ...push([],s.seniorStart,s.seniorEnd-yd,yd)];
  }
  const sd=s.seniorDur;
  if(isWeekend(date)) return [...push([],s.seniorWeekendStart,s.seniorWeekendEnd-sd,sd), 480];
  const early = seniorEarly ? push([],s.youthStart,s.seniorStart-sd,sd) : [];   // förmiddag om juniorer klara
  return [...push([],s.seniorStart,s.seniorEnd-sd,sd), ...early, 480];
}
function planOverlap(a1,a2,b1,b2){ return a1<b2 && b1<a2; }
// Placera en dags matcher på ett givet antal banor. Returnerar {placed,leftover}.
function packPlanDay(date, dayMatches, courts){
  const juniors=dayMatches.filter(x=>x.type==="youth");
  const seniorEarly = !isWeekend(date) && juniors.length===0 && !isPlanFinalDay(date);
  const courtIv=Array.from({length:courts},()=>[]);
  const placed=[], leftover=[];
  const pcount={};   // spelarnamn -> antal placerade den dagen (för hårt max/dag)
  // Juniorer först (morgon), sedan seniorer; inom typ efter omgång.
  const order=[...dayMatches].sort((a,b)=>(a.type===b.type?0:(a.type==="youth"?-1:1)) || (a.round-b.round));
  for(const x of order){
    const dur=matchMinFor(x.type);
    const mm=findMatch(x.id), m=mm?mm.m:null;
    const names=m?[...new Set(playersOf(m))]:[];
    // Hårt önskemål (Tvingar): max matcher/dag – lägg som ej placerad om det överskrids.
    if(names.some(nm=>{ const mx=hardMaxPerDay(nm,date); return mx!=null && (pcount[nm]||0)+1>mx; })){ leftover.push(x); continue; }
    let slot=null, fb=null;
    for(const t of planCandidateTimes(x.type,date,seniorEarly)){
      for(let ci=0;ci<courts;ci++){
        if(courtIv[ci].some(iv=>planOverlap(t,t+dur,iv[0],iv[1]))) continue;
        if(m && requestTimeViolation(m,date,t,"force")) continue;              // hårt tidsförbud
        if(m && requestTimeViolation(m,date,t,"wish")){ if(!fb) fb={ci,t}; continue; } // mjukt – reserv
        slot={ci,t}; break;
      }
      if(slot) break;
    }
    if(!slot) slot=fb;
    if(!slot){ leftover.push(x); continue; }
    courtIv[slot.ci].push([slot.t, slot.t+dur]);
    placed.push({id:x.id, classId:x.classId, court:slot.ci+1, time:slot.t, type:x.type, round:x.round});
    for(const nm of names) pcount[nm]=(pcount[nm]||0)+1;
  }
  return {placed, leftover};
}
// Bygg hela turneringens planering (deterministiskt utifrån stegar + valda finaldagar).
function buildFullPlan(){
  const days=getDays();
  const assign={}; days.forEach(d=>assign[d.date]=[]);
  const finalDayByClass={};
  visibleClasses().forEach(cls=>{
    if(!cls.matches.some(m=>!m.manual)) return;
    const fd=classFinalDay(cls); finalDayByClass[cls.id]=fd;
    const fi=days.findIndex(d=>d.date===fd);
    const lastIdx=fi<0?days.length-1:fi;
    // Tillåtna dagar t.o.m. finaldagen (juniorer ej helg).
    let avail=[];
    for(let i=0;i<=lastIdx;i++){ if(cls.type==="youth" && isWeekend(days[i].date)) continue; avail.push(i); }
    if(!avail.length) avail=[lastIdx<0?0:lastIdx];
    const A=avail.length, R=totalRounds(cls);
    // Startdag (position i avail) för varje omgång – jämnt fördelat, finalen sist.
    const startPos=r=> R<=1 ? A-1 : Math.min(A-1, Math.round(r*(A-1)/(R-1)));
    // Fördela varje omgångs matcher över dagarna från omgångens startdag fram till
    // dagen före nästa omgångs start – så att inga mellanliggande dagar står tomma i
    // onödan. Finalomgången ligger enbart på sin egen (final)dag. Omgångsordningen
    // bevaras alltid (alla matcher i omgång r ligger före omgång r+1).
    for(let r=0;r<R;r++){
      const ms=cls.matches.filter(m=>!m.manual && !isByeMatch(m) && m.round===r).sort((a,b)=>a.index-b.index);
      if(!ms.length) continue;
      const from=startPos(r);
      const to = r<R-1 ? Math.max(from, startPos(r+1)-1) : from;
      const span=[]; for(let k=from;k<=to;k++) span.push(avail[k]);
      if(!span.length) span.push(avail[Math.min(from,A-1)]);
      ms.forEach((m,idx)=>{ assign[days[span[idx%span.length]].date].push({id:m.id, classId:cls.id, type:cls.type, round:r}); });
    }
    cls.matches.filter(m=>m.manual).forEach(m=>{ assign[days[avail[A-1]].date].push({id:m.id, classId:cls.id, type:cls.type, round:99}); });
  });
  const out={ byDay:{}, extraByDay:{}, courtsByDay:{}, overriddenByDay:{}, leftoverByDay:{}, finalDayByClass, hasLeftover:false };
  const MAXC=8, pc=state.planCourts||{};
  days.forEach(d=>{
    const ms=assign[d.date];
    const override = pc[d.date]!=null ? Math.max(1,Math.min(MAXC,pc[d.date])) : null;
    out.byDay[d.date]=[]; out.leftoverByDay[d.date]=[]; out.overriddenByDay[d.date]=(override!=null);
    out.courtsByDay[d.date]=override!=null?override:Math.max(1,state.courts);
    out.extraByDay[d.date]=out.courtsByDay[d.date]-Math.max(1,state.courts);
    if(!ms.length) return;
    let best, usedCourts;
    if(override!=null){
      usedCourts=override; best=packPlanDay(d.date, ms, usedCourts);
    } else {
      // Rekommendera minsta antal banor från grundantalet som rymmer alla matcher.
      usedCourts=Math.max(1,state.courts);
      for(let c=Math.max(1,state.courts); c<=MAXC; c++){ best=packPlanDay(d.date, ms, c); usedCourts=c; if(!best.leftover.length) break; }
    }
    out.byDay[d.date]=best.placed; out.courtsByDay[d.date]=usedCourts;
    out.extraByDay[d.date]=usedCourts-Math.max(1,state.courts);
    out.leftoverByDay[d.date]=best.leftover;
    if(best.leftover.length) out.hasLeftover=true;
  });
  return out;
}
// Överför en dags planering till det riktiga schemat.
function transferPlanDay(date){
  if(dayLocked(date)){ alert("Dagen är låst i schemat. Lås upp den först för att skriva över."); return; }
  const plan=buildFullPlan();
  const entries=plan.byDay[date]||[];
  if(!entries.length){ alert("Inga planerade matcher denna dag."); return; }
  if(realMatches().some(m=>m.day===date) && !confirm(`${dayShort(date)} har redan matcher i schemat. Skriv över med planeringen?`)) return;
  realMatches().forEach(m=>{ if(m.day===date){ m.day=null;m.court=null;m.time=null; } });
  const extra=(plan.courtsByDay[date]||state.courts)-state.courts;
  if(extra!==0) state.extraCourts[date]=extra; else delete state.extraCourts[date];
  entries.forEach(e=>{ const r=findMatch(e.id); if(r){ r.m.day=date; r.m.court=e.court; r.m.time=e.time; } });
  save(); render();
  const lo=(plan.leftoverByDay[date]||[]).length;
  if(lo) alert(`Obs: ${lo} match(er) fick inte plats ${dayShort(date)} ens med extra bana(or).`);
}
// Överför hela turneringens planering (hoppar över låsta dagar).
function transferWholePlan(){
  const plan=buildFullPlan();
  const locked=getDays().filter(d=>dayLocked(d.date));
  if(locked.length && !confirm(`${locked.length} låst(a) dag(ar) hoppas över. Fortsätt?`)) return;
  if(!confirm("Överför HELA planeringen till det riktiga schemat? Befintligt schema på olåsta dagar skrivs över.")) return;
  getDays().forEach(d=>{
    if(dayLocked(d.date)) return;
    realMatches().forEach(m=>{ if(m.day===d.date){ m.day=null;m.court=null;m.time=null; } });
    const extra=(plan.courtsByDay[d.date]||state.courts)-state.courts;
    if(extra!==0) state.extraCourts[d.date]=extra; else delete state.extraCourts[d.date];
    (plan.byDay[d.date]||[]).forEach(e=>{ const r=findMatch(e.id); if(r){ r.m.day=d.date; r.m.court=e.court; r.m.time=e.time; } });
  });
  save(); render();
  if(plan.hasLeftover) alert("Obs: vissa matcher fick inte plats – se röd markering i planeringen.");
}
function renderPlanner(){
  const days=getDays();
  if(!days.length){ app.innerHTML=`<div class="card"><h2>Auto-planering</h2><p class="muted">Ange turneringens datum under <b>Klasser &amp; deltagare</b> först.</p></div>`; return; }
  const classes=visibleClasses().filter(c=>c.matches.some(m=>!m.manual));
  const plan=buildFullPlan();
  const clsRows=classes.map(c=>{
    const opts=days.filter(d=> c.type==="youth" ? !isWeekend(d.date) : true)
      .map(d=>`<option value="${d.date}" ${classFinalDay(c)===d.date?'selected':''}>${d.dow.slice(0,3)} ${d.short}</option>`).join("");
    return `<tr>
      <td style="text-align:left"><span class="cdot" style="background:${classColor(c)}"></span>${c.name}</td>
      <td><span class="badge ${c.type}">${c.type==='youth'?'Ungdom':'Senior'}</span></td>
      <td><b>${totalRounds(c)}</b> omg.</td>
      <td><select data-fd="${c.id}">${opts}</select></td></tr>`;
  }).join("");
  const dayCards=days.map(d=>{
    const entries=(plan.byDay[d.date]||[]).slice().sort((a,b)=>(a.time-b.time)||(a.court-b.court));
    const extra=plan.extraByDay[d.date]||0;
    const courtsUsed=plan.courtsByDay[d.date]||state.courts;
    const overridden=plan.overriddenByDay[d.date];
    const leftover=plan.leftoverByDay[d.date]||[];
    const courtOpts=Array.from({length:8},(_,i)=>`<option value="${i+1}" ${courtsUsed===i+1?'selected':''}>${i+1} ban${i+1>1?'or':'a'}</option>`).join("");
    const rows=entries.map(e=>{
      const c=getClass(e.classId); const r=findMatch(e.id); const m=r?r.m:null;

/* ----- Tab: Deltagarlista (per person, utifrån namn) ----- */
function participantIndex(filterId){
  const map=new Map(); // namn -> Set(klassnamn)
  const classes = filterId ? state.classes.filter(c=>c.id===filterId) : visibleClasses();
  for(const c of classes){
    for(const line of c.participants){
      for(const part of String(line).split("/")){
        const nm=stripRank(part);
        if(!nm) continue;
        if(!map.has(nm)) map.set(nm,new Set());
        map.get(nm).add(c.name);
      }
    }
  }
  return [...map.entries()]
    .map(([name,set])=>({name, classes:[...set]}))
    .sort((a,b)=> a.name.localeCompare(b.name,"sv"));
}
// Byt ut ett individnamn i en sträng (dubbelpar delas på "/"), behåll ev. rank "(n)".
function replaceIndivName(str, oldName, newName){
  if(str==null) return str;
  return String(str).split("/").map(part=>{
    const t=part.trim();
    const rm=t.match(/\s*(\(\d+\))\s*$/);
    const rank=rm?(" "+rm[1]):"";
    return stripRank(t)===oldName ? (newName+rank) : t;
  }).join(" / ");
}
// Döp om en spelare överallt: deltagarlistor, matcher, vinnare, mästare.
function renamePlayer(oldName,newName){
  oldName=(oldName||"").trim(); newName=(newName||"").trim();
  if(!newName || oldName===newName) return;
  for(const c of state.classes){
    c.participants=c.participants.map(p=>replaceIndivName(p,oldName,newName));
    for(const m of c.matches){
      m.p1=replaceIndivName(m.p1,oldName,newName);
      m.p2=replaceIndivName(m.p2,oldName,newName);
      if(m.winner) m.winner=replaceIndivName(m.winner,oldName,newName);
    }
    if(c.champion) c.champion=replaceIndivName(c.champion,oldName,newName);
  }
  save(); render();
}
// Alla riktiga matcher där en person deltar – inkl. matcher där motståndaren
// ännu inte är klar (t.ex. seedad spelare i omgång 2 som väntar på vinnare).
function playerMatches(name, filterId){
  const res=[];
  const classes = filterId ? state.classes.filter(c=>c.id===filterId) : visibleClasses();
  for(const c of classes) for(const m of c.matches){
    if((m.p1 || m.p2) && !isByeMatch(m) && playersOf(m).includes(name)) res.push({m,c});
  }
  // Sortera per deltagare efter klass (klassindex), sedan matchordning inom klassen
  // (matchnummer om det finns, annars omgång/plats), och sist på dag/tid.
  return res.sort((a,b)=>{
    const cc=classCatNo(a.c)-classCatNo(b.c); if(cc) return cc;
    const na=matchNumber(a.m), nb=matchNumber(b.m);
    if(na!=null && nb!=null && na!==nb) return na-nb;
    if((na==null)!==(nb==null)) return na==null?1:-1;   // numrerade matcher först
    if(a.m.round!==b.m.round) return a.m.round-b.m.round;
    if((a.m.index||0)!==(b.m.index||0)) return (a.m.index||0)-(b.m.index||0);
    const da=(a.m.day||"9"), db=(b.m.day||"9");
    return da<db?-1:da>db?1:((a.m.time||0)-(b.m.time||0));
  });
}
// Antal spelade matcher (matcher med registrerat resultat/vinnare) för en person.
function playedMatchCount(name, filterId){ return playerMatches(name, filterId).filter(x=>x.m.winner).length; }

// Distinkta deltagarnamn (för namnval).
function allParticipantNames(){
  const set=new Set();
  for(const c of state.classes) for(const line of c.participants) for(const part of String(line).split("/")){ const nm=stripRank(part); if(nm) set.add(nm); }
  return [...set].sort((a,b)=>a.localeCompare(b,"sv"));
}
// Har den dag som önskemålet avser passerat? (jämförs mot dagens datum)
function requestDone(r){
  const today=isoDate(new Date());
  if(r.type==="unavail") return r.day ? r.day < today : false;
  const ref = r.day || (state.tournament && state.tournament.end);   // max/dag: hela turneringen om ingen dag
  return ref ? ref < today : false;
}

  return `${L('Max','Max')} ${n} ${L('match(er) per dag','match(es) per day')}${r.day?` (${dayLong(r.day)})`:''}`;
}

   </div>`;
  document.getElementById("reqType").onchange=e=>{
    ui.reqType=e.target.value;

  const resetReqForm=()=>{ ui.reqEdit=null; ui.reqPlayer=null; ui.reqLevel=null; ui.reqType=null; };

    if(!player){ alert(L("Ange deltagarens namn.","Enter the player's name.")); return; }
    const level=document.getElementById("reqLevel").value==="force"?"force":"wish";
    // Behåll id om vi redigerar, annars nytt önskemål.
    const r={ id: ui.reqEdit || ("r"+uid()), player, level, type };
    if(type==="unavail"){
      r.day=document.getElementById("reqDay").value||null;
      r.from=parseInt(document.getElementById("reqFrom").value,10);
      r.to=parseInt(document.getElementById("reqTo").value,10);
      if(!r.day){ alert(L("Välj en dag.","Choose a day.")); return; }
      if(r.to<=r.from){ alert(L("Sluttiden måste vara efter starttiden.","End time must be after start time.")); return; }
    } else {
      r.max=Math.max(1,parseInt(document.getElementById("reqMax").value,10)||1);
      r.day=document.getElementById("reqDay").value||null;
    }
    if(ui.reqEdit){
      const i=state.requests.findIndex(x=>x.id===ui.reqEdit);
      if(i>=0) state.requests[i]=r; else state.requests.push(r);
    } else state.requests.push(r);
    resetReqForm(); save(); render();
  };
  const reqCancel=document.getElementById("reqCancel");
  if(reqCancel) reqCancel.onclick=()=>{ resetReqForm(); render(); };
  // Lista – aktiva först, klara (passerade) sist och genomstrukna.
  const list=(state.requests||[]).map(r=>({r, done:requestDone(r)}))
    .sort((a,b)=> (a.done-b.done) || String(a.r.player).localeCompare(String(b.r.player),"sv"));
  const box=document.getElementById("reqList");
  if(!list.length){ box.innerHTML=`<p class="small muted">${L('Inga önskemål registrerade ännu.','No requests registered yet.')}</p>`; return; }
  const escA=s=>String(s).replace(/"/g,"&quot;");
  box.innerHTML=`<table class="results" style="width:100%"><thead><tr>
      <th style="text-align:left">${L('Deltagare','Player')}</th><th style="text-align:left">${L('Önskemål','Request')}</th>
      <th>${L('Nivå','Level')}</th><th>${L('Status','Status')}</th><th style="text-align:left">${L('Schema','Schedule')}</th><th></th></tr></thead><tbody>
    ${list.map(({r,done})=>{
      const strike=done?'text-decoration:line-through;color:#9a927f':'';
      const lvlBadge=r.level==="force"
        ? `<span class="badge" style="background:#f6d9d5;color:#b5362b">${L('Tvingar','Require')}</span>`
        : `<span class="badge" style="background:#e6eef7;color:#2f5c86">${L('Önskar','Wish')}</span>`;
      const cm=done?[]:requestConflictMatches(r);
      const tip=cm.map(m=>`#${matchNumber(m)??'?'} ${dayShort(m.day)} ${m.time!=null?fmtMin(m.time):''}`).join(", ");
      const confCell=cm.length
        ? `<span class="badge" style="background:${r.level==='force'?'#fde9e9':'#fdf1df'};color:${r.level==='force'?'#b5362b':'#a56a00'}" title="${escA(tip)}">⚠ ${L('Krockar','Conflict')} (${cm.length})</span>`
        : `<span class="muted small">${done?'':'✓ '+L('ingen krock','no conflict')}</span>`;
      return `<tr>
        <td style="text-align:left;${strike}">${r.player}</td>
        <td style="text-align:left;${strike}">${requestText(r)}</td>
        <td>${lvlBadge}</td>
        <td>${done?`✓ ${L('Klar','Done')}`:`<span class="muted">${L('Aktiv','Active')}</span>`}</td>
        <td style="text-align:left">${confCell}</td>
        <td style="white-space:nowrap">
          <button class="btn ghost mini ${ui.reqEdit===r.id?'':''}" data-editreq="${r.id}" title="${L('Redigera','Edit')}">✏️</button>
          <button class="btn gray mini" data-delreq="${r.id}" title="${L('Ta bort','Delete')}">🗑</button></td></tr>`;
    }).join("")}
    </tbody></table>`;
  box.querySelectorAll("[data-editreq]").forEach(b=>b.onclick=()=>{
    const r=(state.requests||[]).find(x=>x.id===b.dataset.editreq); if(!r) return;
    ui.reqEdit=r.id; ui.reqType=r.type; ui.reqPlayer=r.player; ui.reqLevel=r.level;
    render();
    const card=document.querySelector('.card[style*="2f80c9"]'); if(card) card.scrollIntoView({behavior:'smooth',block:'center'});
  });
  box.querySelectorAll("[data-delreq]").forEach(b=>b.onclick=()=>{
    if(ui.reqEdit===b.dataset.delreq){ ui.reqEdit=null; ui.reqPlayer=null; ui.reqLevel=null; ui.reqType=null; }
    state.requests=state.requests.filter(x=>x.id!==b.dataset.delreq); save(); render();
  });
}

function resultsHTML(day){
  const played=realMatches().filter(m=>m.day===day&&m.winner&&m.p1&&m.p2);
  const upcoming=realMatches().filter(m=>m.day===day&&!m.winner&&m.p1&&m.p2);
  let h=`<div class="card"><h2>Resultat – ${dayShort(day)}</h2>`;
  if(!played.length) h+=`<p class="muted">Inga färdigspelade matcher registrerade denna dag.</p>`;
  else{
    h+=`<table class="results"><thead><tr><th>Nr</th><th>Tid</th><th>Bana</th><th>Klass</th><th>Match</th><th>Resultat</th><th>Vinnare</th></tr></thead><tbody>`;
    played.sort((a,b)=>(a.time||0)-(b.time||0)).forEach(m=>{
      const c=getClass(m.classId);
      h+=`<tr><td>${matchNumber(m)??'-'}</td><td>${m.time!=null?matchLabel(m):'-'}</td><td>${m.court||'-'}</td><td>${c.name}</td>
        <td>${dispName(m.p1)} – ${dispName(m.p2)}</td><td>${m.score||'WO'}</td><td><b>${dispName(m.winner)}</b></td></tr>`;
    });
    h+=`</tbody></table>`;
  }
  h+=`</div>`;
  if(upcoming.length){
    h+=`<div class="card"><h2>Ospelade matcher kvar denna dag</h2><table class="results"><tbody>`;
    upcoming.sort((a,b)=>(a.time||0)-(b.time||0)).forEach(m=>{
      const c=getClass(m.classId);
      h+=`<tr><td>${matchNumber(m)??'-'}</td><td>${m.time!=null?matchLabel(m):'-'}</td><td>Bana ${m.court||'-'}</td><td>${c.name}</td><td>${dispName(m.p1)} – ${dispName(m.p2)}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  return h;
}
